body:
  text: 卷第一恨賦去故郷賦倡婦自悲賦并序哀千里賦青苔賦并序石刼賦并序水上神女賦泣賦待罪江南思北歸賦別賦蓮華賦并序丹沙可學賦并序卷第二赤虹賦并序四時賦金燈草賦橫吹賦并序扇上綵畫賦傷友人賦并序麗色賦翡翠賦江上之山賦燈賦知己賦并序空青賦學梁王􅇠園賦并序卷第三侍始安王石頭從征虜始安王道中貽􅀽常侍就謝主簿宿銅爵妓學魏文帝從冠軍行建平王登廬山香爐峯望荆山歩桐䑓從建平王遊紀南城秋至懐歸古意報􅀽功曹度西塞望江上諸山劉僕射東山集􅀉丘三公陸東海譙山集燈夜和殷長史贈煉丹法和殷長史感春冰遥和謝中書二首無錫縣歷山集無錫舅相送御帝別吳中禮石佛赤亭渚度泉嶠出諸山之頂遷陽亭採石上菖蒲遊黃蘗山還故國傷内弟劉常侍從蕭驃􅀐新帝壘效阮公詩十五首清思詩五首卷第四惜晚春應劉秘書卧疾怨别劉長史應劉豫章别秋夕納凉奉和採菱郊外望秋荅殷愽士冬盡難離和丘長史外兵舅夜集當春四韻同王左丞池上酬劉記室雜體三十首序古離別李都尉從軍班婕妤詠扇魏文帝遊宴陳思王贈友劉文學感遇王侍中懷德嵆中散言志阮歩兵詠懷張司空離情潘黃門述哀陸平原羇宦左記室詠史張黄門苦􅀨劉太尉傷亂盧侍郎感交郭􅀪農遊仙孫廷評雜述許徴君自叙殷東陽興曯謝僕射遊覽陶徴君田居謝臨川逰山顔持進侍宴謝法曹贈別王徴君飬疾􅀽太尉從駕謝光禄郊遊鮑參軍戎行休上人怨别悼室人十首卷第五􅀽友人傳報􅀽叔明書與交友論隱書奏記􅍗南徐州新安王到主簿日事詣右軍建平王􅀍黜爲吴興令辭牋詣建平王到功曹叅軍牋詣驃􅀐竟陵王拜正貟外郎表拜中書郎表卷第六始安王拜征虜將軍丹陽尹章始安王拜征虜將軍南兖州刺史章建平王譲右將軍荆州刺史表建平王拜右衛將軍荆州刺史章建平王散五刑教建平王謝賜石硯等啓建平王謝王環刀等啓建平王慶明帝疾和禮上表建平王慶安城王拜封表建平王聘隠逸教建平王慶改號啓建平王慶少帝登祚章建平王答王太后正位章建平王慶江皇后正位章建平王太妃周氏行狀建平王譲鎮南徐州刺史啓建平王之南徐州刺史辭闕表卷第七勑爲朝賢荅劉休範書尚書符慰勞雍州文蕭驃􅀐讓封第二表第三表蕭領軍讓司空并敦勸啓蕭領軍拜侍中刺史章蕭驃􅀐録尚書事到省表蕭驃􅀐謝甲仗入殿表蕭驃􅀐讓豫司二州表蕭驃􅀐發徐州三五教蕭驃􅀐上頓表蕭驃􅀐築新亭壘埋枯骸教蕭驃􅀐謝􅀍侍中慰勞表蕭驃􅀐慶平賊表蕭驃􅀐解嚴輸黄􅃏表蕭驃􅀐讓太尉増封第三表蕭驃􅀐讓太尉増封表蕭驃􅀐讓油幢表卷第八蕭太尉上便冝表讓太傅楊州牧表蕭重讓楊州表後讓太傅楊州牧表蕭􅀍侍中敦勸表蕭􅀍尚書敦勸重讓表蕭讓劒履殊禮表蕭拜太尉楊州牧表蕭太尉子姪為領軍江州兖州豫州淮南黃門謝啓蕭太􅀓謝追贈父祖表蕭太􅀓東耕教蕭太􅀓辭輿駕親幸表蕭讓前部羽葆鼓吹表謝開府辟召表蕭上銅鐘芝草衆瑞表卷第九蕭讓太􅀓相國齊公十郡九錫表第二表􅀍百僚敦勸受表蕭拜相國齊公十郡九􅃬章蕭相國讓進爵爲王第二表蕭相國拜齊王表齊王謝冕旒諸法物表齊王讓禪表遣太使廵詔賜赦交州詔斷募士詔封江冠軍等詔大赦詔北伐詔王僕射爲左僕射詔王撫軍爲安東吴興詔曲赦丹陽等四郡詔王僕射領太子􅉟事詔何􅉟事爲吏部尚書詔王侍中爲南蠻校尉詔王光禄爲征南湘州詔栁僕射爲南兖州詔王僕射加兵詔立學詔王鎭軍爲中書令右光禄詔張令爲太常領國子􅀕酒詔蕭冠軍進􅃅征虜詔禇侍中爲征北長史詔卷第十齊太祖髙皇帝誄宋故尚書左丞孫􅃡墓誌文宋故安成王右常侍劉喬墓誌文宋故銀青光禄大夫孫夐墓誌文齊故御史中丞孫詵墓誌文齊故司徒右長史檀超墓誌文蕭驃􅀐􅀕石頭戰亡文蕭太􅀓東耕呪文草木頌十五首并序金荆相思豫章栟櫚杉檉楊梅山桃山中石榴木蓮石上菖蒲黄連署預杜􅀂藿香雲山讃四首并序王太子隂長生白雲秦女雜三言五首并序搆􅁚䑓訪道經鏡論語恱曲池愛逺山應謝主簿騷體劉僕射東山集學騷山中椘辭六首自序梁江文通集目録
