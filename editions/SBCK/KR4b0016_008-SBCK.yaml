body:
  text: 蕭太尉上便宜表臣公言臣聞經􅀖緯治去華爲急體國字民循素乃安聖誥遺風具騰丹􅁽賢言末流備宣青史何嘗不翦削浮奢銷遣文繪然後頌音載興澤洽式廣楚駕百馬民雜國彫秦脩萬􅀐敎亡業墜刻桷丹楹禮有常序朱幡皂蓋古無濫秩縹衣綸綬漢置前􅀉制服恠物周設常刑皆節俗約訓反撲還風肅政􅀺心􅁵一民志故禮奢寧儉宣尼之髙風以義止利孟軻之宏規􅀂乃文彩利劒道鑒其元彫蟲􅂐刻丗炤其淺雖儒墨異學名法各治至於遵本捨末其槩一也故荀韓之立典君晏之制書賈陸之鴻筆嚴徐之博辭食貨興志鹽鐡生論莫不異􅀃而同儉乖議而共治然丗淪物起道缺事遷蓋源起西秦波􅀍東漢一魏不變二晉未革所從來者遠矣洎髙祖武皇帝業髙縣㝢化格區宙菲躬謙度方􅇷重華納麓之勤約情僞操乃取文命卑官之義去金錦之巧無惟帳之飾唯脩逺圖綏國之術祈勸力耕濟丗之規是以政平刑偃紫階斯廓大祖文皇帝恭巳明臺之上聽政衢室之下九官咸靜萬績惟凝亦復務抑華詡思裁奓太輿馬翠翟之麗尠登乎外禁瑶碧綺組之玩罕設於内宫故大德立而五路謐鴻名建而四民寧者也自頃政敎日替敦敎月虧誰惟歷稔亦日淹紀至乃帝臺傾海外之寳王城盡天下之祕象席珠履一躡而即􅀵鏤琴綵瑟再撫而巳損褧衣隨塵而罷羅􅃑從風而棄百民染其聲奢萬姓􅀍其馳蕩故闤闠之里冨者竊梁楚之乗伎巧之家豪者襲王公之服於是有文靡虚麗驕邪不典之噐精纎空飾妙蠱非常之玩農夫勤耨不充浮􅇊之資􅁞女務織無給􅀧刻之費將恐去實就華未知所届背源從流不識其止求國冨兵強寧可得乎今江南所宅正漢魏兩州之地戸口所檢裁文景三郡之民舊齊故魯鞠爲茂草全趙盛魏豺狼所噑陛下方欲鳴鑾中土朝服濟河不改斯術則未見其可也臣謬屬大任竊同憂泰日晏宵分實忘飢寢草治其莠職此爲先輙具條便宜可以安􅀖利民者事事如右率以聞見謹簡聖聽􅀂其咸允謹請勑付外施行讓太傅楊州牧表崇絶之寵降自白日殊甚之禮墜於青雲祗畏驗盛􅀂奪䰟鑒廵席無容當軒改色中謝臣聞天地之大德曰生聖人之大寳曰位將以啓廓靈緯崇􅀣神紀百司備列貴賤之分旣炳九官咸賛升降之際可明故皇極不爽國歩斯㤗雖金嬀各政姬華異治未有革序變倫而能流英發耀者也臣才慙右賢功愧上烈平趙夷魏之氣無宣於國書濟河登山之威未亮於左史旣罕龍韜金匱之効又乏楹間帷中之績衛主寧謂提橫流匡危不足生細民故小節時顯於艱難大勲無紀乎廊廟而乘軺服冕荷蕭張之賞􅄏城裂域受曹鄧之爵不能翊敎緝政􅁵濟氓隱賛􅀖弘化飾整朝輝是以德少寵多輿人立規才薄位厚處士興議故玉燭未調道治猶鬱者臣之爲媿也不悟陛下復停日月之華凝煙露之􅃳擢臣􅃈姿鑒臣陋誠前恩未曠後寵已襲上公祕􅃏聲振都鄙文劒彫舄禮殊軒殿深襃之逮方今爲絶大賚之降比古爲超臣亦何功當處斯忝伏願道邈先帝理鏡衆寂􅀍氣順方􅆂生􅀗慶特輟䇿書時停鴻􅁽則人歌僉平物抱至歡蕭重讓楊州表臣某言臣以功狹賞峻丗誥所讟才弱寵隆道經所講故冩䰟誓膽庶留天曯圖驕慮滿獲守私吝不能青蘋引風陽燧要景復降綸􅁽徽采兼明影迹交戰氷煙相薄中謝竊聞周夏異章􅀇素各禮儒道二宗名墨兩敎咸以馭俗爲急僉以得人爲寳於是尊官上品乃貽玉振之賢鴻等懋列爲取金聲之彦或有濟丗夷難之略煇燿内氓導江䟽山之勤纒結中㝢深德􅄛溢大功振驚然後超居國右鬱處朝端故九職惟宣六典式序丹青所以傳其藹磬琯所以揚其音也臣才蔽識淺非集譽於鄕曲榮降寵臻乃假翼於皇極遂事等話言之􅀉任鈞符􅀒圖之重職惣表裏地聮機務位班昔良知闕前脩居官不聞其風處秩焉見其政寰域之治未緝街縣之訟方興繒販之士無薦管庫之家寂寞四維不闡五敎罕聞安可以底慎財賦交正庶士者也今輟和毗道仄身賛業尚㨿晦橈􅀗蔽璇圖况異禮更飾襃命復崇名超列辟爵擬群后上仁居之猶􅆂慙德臣實空儒伊何以勝旣誣人文將黷玄緯凌歷飛流之青懼失正和晦裂蜺霧之災且濫庶物臣是以窹􅄰永歎憂國慮私者也伏聞陛下裁天賦品制地平施使曠丗之典不遂臻於末躬逈代之軌無頓􅀍於茲日素心丹魄皦然靡疚矣不任憂迫之情後讓太傅楊州牧表臣公言臣再辭非謙重讓靡飾實以爵髙中丗歷古所難寵冠上俗緜代誰易詳圖辨箴如鏡如水撿崖覽志匪彫匪文䰟祈夢請駐心挂氣陛下猶降以璽書之榮􅀍以丹碧之采頓然變容一慮九逝中謝臣以爲寒暑繇乎平分晦明驗乎天道咎譽起於微薄得吝生於小庇故金衡旣陳錯髮之異必縣銅墨咸設分撮之殊已傾聖哲不能爽􅀑神莫由避况臣鄙槩早盈陋才乆溢第超庶后禮絶群班仰賛東序之賓平叅北宫之政窮􅄹極滿於斯爲甚鑒兹降替淵氷非譬所以坐洞房而不悟下輕帷而嘆息也古之馭敎當有道焉量能而受賞撰智而錫位深乃裂組逺故分珪前人以爲稱首昔人以爲美詠自非上德橫乎天地髙績格于區宇烈譽馥於一時茂名鬱乎當丗者豈有降今日而莫先哉臣爰􅀩殊􅀉六稔遂交及荷惣任二燿忽周未能塞謗生民􅀗免僮訟何盛勲之足題詎深烈之可銘乎而因委忝濫踰溢倫等朱軒躍馬光出電入貂冠紫綬寵藹霞炤臣聞闔宗奉國猶非報殉方將身侍鑾華雪齊魯之侵地手執羈勒騖燕趙之逺郊然後追迹范張濯纓汾射臣之志也華爵盛典非所敢寧伏炤右廵將流聖察無使匹槩血誠不諒於璿扆宏芬英猷遂蕪於里聽豈伊庸臣獨去其庇亦曰海隅咸􅀍其利焉蕭􅀍侍中敦勸表臣公言即日侍中臣惠基給事黃門侍郎臣王僧珍至朱蓋乗雲􅀇軒肅霧墜高天之旨集微臣之軀神爽懼然歛影無地中謝臣􅀄長血心未啓素槩辭從意空言隨事盡不能降陛下一時之恩借俄頃之炤遂枉近侍貂簮軾庭臣自亮無庸何以集此退咎慊誠悲枉垂光進戒朝訓虧兹盛序感慮躑躅榮結夢寐臣檢古少例廵令逾疑豈有妄叨天功虚竊上賞近謬國華坐取隆貴人見其過外惜皇猷内畏私眚昔西京鼎秩漢丗權家丹墀網戸擊鍾連􅀐何常不以驕滿貽戻謙冲要福者哉臣不能遵煙洲而謝􅄮伯迎雲山而揖許由激昻榮華之間沈潜印組之内光飾旣超寵􅂕亦逺江左巳來罕見其倫今位冠朝端通侯萬戸結􅁚弭於前衝奏金管於後陣都野宗其榮盛視聽敬其炎貴臣一旦居之誰以爲不忝者乎而陛下猶崇以異禮者是增臣之戾也况復肅延華勸實深窘迫伏願俯矜單志賜遂前請則丗寢橫議臣􅀩緩青蕭􅀍尚書敦勸重讓表臣公言臣五冩丹翹冝蒙凝炤一降王人遂無蠲察復遣尚書臣岱兼侍中臣奐等奉宣慈􅂕重賜勉誨鏡伏廻環憫黙失圖心􅅎交懅淵谷匪譬中謝臣自􅀄􅀍詔迄于今時載慙載疑以悚以厲豈非深懼鴻典永憂末躬故琴瑟徒鳴不傅廣樂之響燈燼空舉焉續經星之耀何則卓乎小者不足以任太守于蔽者不可以語通臣噐乏淵源識暗機務倫濟夷險毎慿璿曆之逺龕折氛蜺輙資群才之効臣寧有採竒鑒隱之能網國提民之功乎不謂過延渥洽謬攀河漢榮宗蒀葐寵華暐映藉聲探議共知其幸况傳保之崇殷周特貴牧司之􅀉魏晉稱重上昭妙德次擬英勲有踰兹序尠不紊裂今陛下方闢金門之聽調繡扆之政何得去禮廢雅近於臣始旣無前章孰表後丗臣才孤位峻待罪無日矣情哀理感事盡於斯伏願一運天景微見藿心則物不逃形臣何恨焉不勝燋憂狼狽之至蕭讓劒􅂂殊禮表臣公言近仰跼威􅂕辭移理奪故欲冐忝傳識必避殊禮不悟復凝令詔雕飾非常鏡睇未周金火交慮中謝臣聞寵以昭賢不濫才外之華熒以麗身豈謀分表之渥哲后所以僉授貞臣所以慎荷故行珪行玉尚無輕頒一爵一號猶冝詳品況劒舄升陛賛唱異儀殆爲對越神體抗禮天極漢魏舊載唯斯稱重雖英衮簉朝賢武滿丗􅀩此典者乃曠古時降耳諒由功饒賞結名高噐深金蟬綠綬未藹其采瓊珮朱紱不足宣其榮方加以􅂂殿優以勿趨至弟爲上公貴爲皇王佇望慈禮猶邈如也臣何燀業兼昔人且令所慮受以懼覆悔豈復聞殊旨增其憂迮抱此愚欵以殯爲請伏願天鑒順臣所守則雖殁九幽傳榮萬葉矣蕭拜太尉楊州牧表􅀇文旣降雕牒增輝禮藹前英寵華昔典仰震威容俯慙陋識心䰟戰慄􅀂殞􅀂殯中謝臣景能驗才無假外鏡撰巳練志乆測内涯故讓不飾迹辭非謙距寸亮尺素頻觸瑶纊丹情實理備塵珠冕而神居寂阻九重嚴絶徒懷漢臣伏闕之誠競無魯人廻日之感所以廻懼鴻威後奔殊令者也旣而永鑒隆魏􅃡思宏晉國之大政在功與位故民紐亂不處輿臺之下去勲捨德寧班衮司之上咸以休對性業裁成噐􅂕詎有移風變範剋耀倫序者乎臣績不炤忠豈冝國名爵赫曦僶俛優忝陛下乆超以異禮之榮越次殊常之秩雖寢寐矜戰曲垂哀亮而璽冊冲正愈賜砥礪今便肅順天誥恭聞睿典審躬酌私必跋危撓將恐氓俗由此方擾􅁤訓以之交蕪臣豈不勉智罄忠也未知所以報奉淵聖輸感霄極取諸微躬長爲慙荷蕭大尉子姪爲領軍江州兖州豫州淮南黃門謝啓臣公言臣頻結崇􅃂亟延上爵休恩動俗烈榮振古鴻品清飾巳藹金圖秀鼎號銘共茂瑶􅂐永言戚慮鑒寐殷心況乃秩洽朝門慶霑國珮弱息臣諱嶷映晃等文不昭典武不定功出内帷閫升降貂綬或振迹領􅀱職賛禁錡或騰光江甸任鈞屏翼河兖衝要旣濫北門之管淮豫險捍又謬西偏之􅀉兄子臣鸞忝守近畿嫡孫臣某載華省闥皆倐忽晷景頻煩升荷雖咸罄愚識恪居匪替豈足以少塞神渥裁酬皇眷􅅝黷一盈慙厲彌積談天之辨不能爲臣陳辭雕龍之文無以爲臣飾愧靜然肅念徘徊交集不任憂感沐浴之情蕭太􅀓謝追贈父祖表臣公言即日兼謁者僕射姓名奉宣詔書追贈臣亡祖某太常卿亡父某爲散􅀐常侍特進左光祿大夫寵煇泉扄恩凝松石奉渥銘心祗光慟慮中謝臣行阻祗􅀇躬早荼棘如創之痛具日不追終身之恤霜露彌慼雖慙曾輿喬木之敬實抱仲路華轂之哀自謬藉珪金空貽組紱爵侈於公禄盈於私何嘗不靜欷其結黙慕交深不悟睿孝動天昭性曠古惠􅀍逺紀澤演慶丗丹請靡諒峻􅁽愈凝大榮集身尚驚異施况寵洽山拍特振殊造銷骨瀝命猶不勝謝不任鯁泗荷珮之誠蕭大傅東耕敎三府二州綱紀夫寳農賤貨綵炤周縢廵耕去販光炎漢籙故能業滋都野産殷􅃶縣吾任屬弘􅀉思闡冶源慮以感情以宵嘆今􅀇司調氣青祗佇節陳旣柔服方秀電爍有期桐萌無逺便當躬速紺耦道先列辟事均暫勞迹在永豫可剋日備辦詳典施行蕭太傅辭輿駕親幸表臣公言近以神輿將降昌啓丹辭重􅀍還旨未垂闓允謙尊彌光襃優愈臨慙疚旣積敢忘謙請臣乗幸藉私豈曰無僣攀霞鏡月非復常所此必讓德信在於兹但恩嚴交泊固守莫從免黙恭典伊榮加戚寧容爰枉鸞駕式驚臣府訪心驗已諒以不夷求物校迹誓無此義且古今異飾紫青變禮取諸臣躬未覿其安伏願陛下賜止冕輅時停雲駕則俗踐知方臣蹈厚㤗蕭讓前部羽葆鼓吹表臣聞國容軍禮旌羽昭其華品騎第乗鸞㽔藹其飾所以炎燿仙都崇麗神境丗敎以之垂彩民聽以之流文故勒岫銘海之功鞞革冩其詠龕難夷􅀖之業簫管凝其聲朱鷺􅀇雲旣錫上德華山芳樹以頒竒勲爰及台賢位高藩戚名㳂恩炤寵垂私賞皆爲發吹後陣豈曰兼奏前軒兹典罕行此禮實曠臣竊服巳􅀪叨光無限才局秩逺常䘖燿安可二葆同整􅀟弄頓驚覽躬惕然特貽厚謬伏願明爍日月靡忘情鑒將停盛飾遂臣慊心則􅆂惠旣饒恭錫多矣謝開府辟召表臣公言近􅀍詔旨賜令臣府自辟僚賢竊聞治以才爲寳敎以人爲貴激風揚㽔賔資山東之英凝華重馥良在􅀜西之彦近以闡耀丗經發麗朝序今州䇿郡聘兹禮尚堙台召􅉗辟斯文亟曖豈非盛美難嗣故曠寂先芬者哉臣謬賛國機職冝水鑒未能澄刑炤藝廌品任宫旣乖覆業彌慼深􅀉仰屬皇心遥覃察政洞俗弘此懿典崇臣逺寵輙祗睿恩謹宣巖壑庶幽居之士蘿薜可卷竒武異文無絶於古蕭上銅鐘芝草衆瑞表臣公言臣聞􅁚際懸通豈以明昧岨運幽崖遥鏡不以人􅂕異謀威書壁誥旣信其綵綠鱗丹字彌驗其文是以業藹鴻經則煙露呈炤精昭景緯則川岳發華故寳鼎白雲瑞集軒丗芝房赤鴈祥委漢年􅀇石鴻鐘逺炳晉室玉璧彛噐近耀皇宗自大明乗規㤗始疊矩朱鬐素毳之至史不絶書竒葉珍柯之獻府無虚月今懋曆啓圖􅂕基再固頃歲以來禛應四塞近獲豫州刺史劉懷玲解稱所統建寧郡建寧縣昌村民於万山中採藥忽聞異響從石上得銅鐘一枚長二尺一寸逺像古鑄近乖今製又州界之内樹生連理二木隔澗縢枝相通越壑跨水合爲一榦方之舊􅀃彌復爲貴宣城所統臨城縣山中􅀗草一株交柯攅莖紫蓋黃裏貞潤暐曄自然天華採掇歷時質色不變炳據有徴近􅀗吳興太守臣王奐云十一月二十九日解所統長城縣令臣張撝解稱其月二十五日甘露降縣東界下山之隂又東太守臣腦解所統武進令臣紀法宗云十一月十日解稱其月二十四日甘露降於彭山松􅀣至九日又降如􅀄臣以祥緯雜沓星燭波連斯乃􅂕迹深覃睿􅂨敻感理應冩順祗無􅆂祕稽往徴古僉欣升㤗瑶光日闡玉繩永休謹拜表遣兼長史叅軍臣
