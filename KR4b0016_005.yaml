front:
  text: 梁江文通集卷第五
  hash: sha256:4fb00588e57c6c5c0234fdd59aff3ac35af0f979bd5e0c39db9a39fe84b72a2f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4b0016_SBCK_005-1a}
body:
  text: 袁友人傳友人袁炳字叔明陳郡陽夏人其人天下之士幼有異才學無不覽文章俶儻清贍出一時任心觀書不為章句之學其篤行則信義惠和意罄如也常念蔭松柏詠詩書志氣跌宕不與俗人交俯眉暫仕曆國常侍貟外郎府功曹臨湘令粟之入者悉散以贍親其為節也如此數百年來有此人焉至乃好妙賞文獨絶於丗也又撰晉史竒功未遂不幸卒官春秋二十有八與余有青雲之交非直銜杯酒而已嗟乎斯才也斯命也天之報施善人何如哉何如哉報袁叔明書僕知之矣高臯為别執手未期浮雲色曉悵然魂飛前辱贈書知命僕息心越地採藥稽山友人幸甚去歲迫名茂才冬盡不獲有報引領於邑情詎可及足下推僕者不一二談也僕聞狂士之行有三竊嘗志之其竒者則以紫天為宇環海為池倮身大笑𬒳髮行歌其次則堅坐崩岸僵卧深窟朝餐松屑夜誦仙經其下則辭榮城市退耕巖谷塞徑絶賔杜墻不出然者皆羞為西山之餓夫東國之黜臣而况其鄉黨乎或有社稷之士入而忘歸則爭論南宫之前衛主於邪伏身北闕之下納君於治至乃一説之竒驚畏左右一劒之功震栗鄰國夫能者唯橫議漢庭怒髮燕路且猶不數而况於鄰里乎若僕之行止已無可言矣材不肖文質無所直徒以結髮遊學備聞士大夫言曰在國忠處家孝取與廉交友義故拂衣於梁齊之館抗手於楚趙之門且十年矣容貌不能動人智謀不足自逺竟慙君子之恩卒離飢寒之禍近親不言左右莫教涼秋隂隂獨立間館輕塵入戶飛鳥無迹命保琴書而守妻子其可得哉故國史小官也而子良為之執戟下位也而子雲居之僕非有輕車驃騎之略交河雲險之功幸以盜竊文史之末因循卜祝之間故俯首求衣斂眉寄食耳若十口之隸去於飢寒從疾舊里斥歸故鄉箕坐高視舉酒極望雖五侯交書群公走幣僕亦在南山之南矣此可為智者道難與俗士言也方今仲秋風飛平原彯色水鳥立於孤洲蒼葭變於河曲寂然淵視憂心辭矣獨念賢明蚤丗英華殂落僕亦何人以堪久長一旦松柏𬒳地墳壟刺天何時復能銜杯酒者乎忽忽若狂願足下自愛也與交友論隱書淹者海濱窟穴弋釣為伍自度非竒力異才不足聞見於諸侯每承梁伯鸞卧於會稽之墅高伯逹坐於華隂之山心常慕之而未能及也嘗感子路之言不拜官而仕無青組紫紱龜紐虎符之志但欲史曆巫卜為丗俗賤事耳而彯然十載竟不免衣食之敗何則性有所短不可韋絃者有五一則體夲疲緩臥不肻起二則人間應修酷懶作書三則賓客相對口不能言四則性甚畏動事絶不行五則愚婞妄發輒被口語而無一長豈可處人間耶知短而不可易者所謂輪椎定也猶如雞鶩之有毛不能得鸞鳯之光采矣况今年已三十白髮雜生長夜輾轉亂憂非一以溘至之命如星殞天促光半路不攀長意徒自欺取筋駑髓冷殊多災恙心頑質堅偏好冥默既信神農服食之言久固天竺道士之説守清淨煉神丹心甚愛之行善業度一丗意甚美之今但願拾薇藿誦詩書樂天理性斂骨折步不踐過失之地耳猶以妻孥未奪桃李須隂望在五畒之宅半頃之田鳥赴簷上水匝階下則請從此隱長謝故人若乃登峨嵋度流沙飱金石讀仙經嘗聞其驗非今日之所言也誰謂難知青鳥明之貴布筆墨然亦焉足道哉奏記詣南徐州新安王伏惟明公殿下列譽椒壁飛聲沖漢爰求儒雅傍招異人削赤野之玉翦燕山之金至如淹者東國之徒步耳方斂影逃形匡坐編蓬之下遂遭煙露餘彩日月末光惟恩知泰變色薰心淹聞齊石既撫無待巴人之唱檀臺已搆寧俟不才之木淹幼乏鄉曲之譽長匱斤藻之德豈宜炫璞鄭氏獻鳳楚門哉願避職吏緩其召書到主簿日事詣右軍建平王淹乃庸人素非竒士既慙鄒魯儒生之德又謝燕趙俠客之節徒以結髮衛次暫聞仁義常欲永辭冠劒弋釣畎壑而身輕恩重猥奉末光枉白璧之惠降黑貂之私因兹感激未能自反負金羇於淮吳從後軍於河楚竟不能曜丹臒騰英聲絶白雲負蒼梧至可知矣不謂咸池再暉瑶光重照開高天之慈布厚地之施承命以驚巡走且失淹聞古人為報常有意焉至乃一説之效齊王動色一劒之感趙王解衣孤心回槩有殞自天𬒳黜為吳興令辭箋詣建平王淹本遷徙之徒非有儒墨之能亦以轉命溝間待殯巖下誤得步修榥循高軒伏層檻坐曲池承翠河之潤降璇日之光載筆奉后盛飾立朝於山東百姓亦已殊甚雖蓐螻蟻拭黃塵不足以塞惠而小人狼狽為鬼為蜮山淵所容衣劒不貸黥赭幽團皆非報責仰遭大道之行草木勿踐輟鑊斂火吹魂拾骨濯以河漢之流曝以秋陽之景叢然黔首豈不戴天竊思伏皂九載齒録八年以春以秋且思且顧竟不能抑黑質楊赤文抽精膽報慈光而自為擁腫之異木卒成踴躍之妖金所謂孽由已作匪降自天猶沭造化餘靈宥以遐邑方蒙𬒳霜露裹糧洲島鑿山楹為室永與黿鼉為群猶蹶者不妄起肓者不妄視况罪溢朔方尚駐一等之刑咎過朱崖猶緩再重之施金石無知何以識答昔河濟荆吳必獲陪從京輔關轂長奉帷席德音在耳話言如昨淹乃梁昌自投東極晨鳥不飛遷骨何日一辭城濠旦夕就逺白雲在天山川間之眷然西顧涕下若屑詣建平王上書昔者賤臣叩心飛霜擊於燕地庶女告天振風襲於齊臺下官每讀其書未嘗不廢卷流涕何者士有一定之論女有不易之行信而見疑貞而為戮是以壯夫義士伏死而不顧者以此也下官聞仁不可恃善不可依謂徒虛語乃今知之伏願大王暫停左右少加矜察下官本蓬戶桑樞之人布衣韋帶之士退不飾詩書以驚愚進不賣聲名於天下日者謬得升降承明之闕出入金華之殿何嘗不局影凝嚴側身扄禁者乎竊慕大王之義復為門下之賔備鳴盜淺術之餘豫三五賤伎之末大王惠以恩光顧以顔色實佩荆卿黃金之賜竊感豫讓國士之分矣嘗欲結纓伏劍少謝萬一剖心摩踵以報所天不圖小人固陋坐貽謗缺迹墜昭憲身限幽圄履影弔心酸鼻痛骨下官聞虧名為辱虧形次之是以每一念來忽若有遺加以涉旬月迫季秋天光沉隂左右無色身非木石與獄吏為伍此少卿所以仰天捶心泣盡而繼之以血者也下官雖乏鄉曲之譽然嘗聞君子之行矣其上則隱於篇肆之間卧於巖石之下坎則結綬金馬之庭高議雲臺之上退則虜南越之君係單于之頸俱啓丹册並圖青史寧爭分寸之末􅔡錐刀之利哉下官聞積毀銷金積讒磨骨逺則直生取疑於盜金近則伯魚𬒳名於不義彼之二才猶或如是况在下官焉能自免昔上將之耻降侯幽獄名臣之羞史遷下室至如下官當何言哉夫以魯連之智辭祿而不反接輿之賢行歌而忘歸子陵閉關於東越仲蔚杜門於西秦亦良可知也若使下官事非其虛罪得其實亦當鉗口吞舌伏匙首以殞身何以見齊魯竒節之人燕趙悲歌之士乎方今聖歷欽明天下樂業青雲浮洛榮光塞河西洎臨洮狄道北距飛狐陽原莫不浸仁沐義昭景飮醴而下官抱痛圓門含憤獄戶一物之微有足悲者仰惟大王少垂明白則梧丘之魂不愧於沉首鵠亭之鬼無恨於灰骨不任肝膽之切敬因執事以聞到功曹參軍箋詣驃騎竟陵王竊惟明使君鉞下道耀神源德鑄靈極誕􅉼天聽資河照聖譽拂宏外芳激震中故衡梁孕秀璿機流品變瑶光之暉贊玉燭之色功邁翊殷績起匡漢是以赤瑕瓊寶之文睇影而敻集青亂遺風之乘㟓光而逺至如民者蓋不足算所志不出繒販所學不遺祝筮業異儒墨行乖曾史既乏修短之術又慙啓塞之辨不能伏軾蹲衡驚燕趙之郊黃金橫帶馳淄繩之幣語默罕緒圎方靡樹謬以一氣之微邀百載之會躬奉英睿身蒙青㬦故以潤厚纍璧恩重兼金不悟懸黎降景靈河㵼潤復獲執羈蘭陳迎笏桂序漏越之琴竊莊文之價缺齧之劒盜須哀之名心羞秦媵志慮楚犢抱魄踊躍憂集如燻鐫感何日銘報焉期拜正貟外郎表臣遇鄉逺迹由學未徒不瑩雕龍之采寧照玄豹之飾自過𬒳光私濫蒙恩幸屢度經冬亟移春序皇緯如紐慙飛塵之效璿基方峻謝寒露之勤故宜伏影軒間卷氣衡下猶蒙供事紫楹春役丹殿巡魄擎概榮渥不悟震離徹邃阿景洞幽復升官清閨列版嚴闥蕞識何算爰忝叔則之仕菲質焉樹乃謬仲容之職猥枉青艧增光空質心懅末塵情慙洞戶佇首矯迹以銘以奏拜中書郎表榮鬱兩臨恩俊交鏡悄然攬魂乃懼乃逝臣聞汝潁之金或揚采於四豪江淮之珠已馳光於七貴皆聲不妄美第豈庇立未有伎慙湘輿蒙送目之賞工謝綵輪竊歸風之價臣幼乏篆刻長睽圖史智罕效官志闋從政方遽永振風長憂凌雨不悟遭社鳴之屬河清之會玄雲素霞必駕蓬萊白毳騂鱗咸蒙解遂仕通物任官登郎椽此實耀靈之私照而微臣之厚幸也仰惟皇衢大融氣品呈觀西傾棧山東鯷航海故竒士端威異人罄折皆相望北闕待詔南宫而臣學無利博文有忮害乃彯𥚑頓屣伏黃扉之右曵纓轉笏居青璅之前訪德於姑射聞道於崆洞伊臣之願過為信矣昔望都才麗爵乏上班長岑聞靡身終下祑愚臣方古悠然已泰內燭徘徊眇不識屆梁江文通集卷第五
