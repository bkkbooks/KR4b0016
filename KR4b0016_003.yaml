  text: 梁江文通集卷第三
  hash: sha256:9be9e0d8ccc2b4fcbca146db2db9a04543cafd3be253c06314624083b57cba70
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4b0016_SBCK_003-1a}
body:
  text: 詩侍始安王石頭緒官承盛丗逢恩侍英王結劒從深景撫袖逐曽光暮情鬱無已流望在川陽平原忽超逺參差見南湘何如塞北隂雲鴻盡來翔擥鏡照愁色從坐引憂方山中如未夕無使桂葉傷從征虜始安王道中秉笏從帷幕仄身豫休明君子未獲晏小人亦自營結軒首凉野驅馬傃寒城容裔還鄕櫂逶迤去國旌山氣直百里山色與雲平喬松日夜竦紅霞旦夕生徒慙恩厚槩空抱春施名仰願光威逺歲晏返柴荆貽袁常侍昔我别楚水秋月麗秋天今君客吳坂春色縹春泉憂怨生碧草沅湘含翠烟鑠鑠霧上景懵懵雲外山渉江􅔡何望留滯空採蓮駐情光氣下凝怨琴瑟前珠貝性明潤蘭玉好芳堅不以宿昔岨懷愧期暮年就謝主簿宿季月寒氣重滋蘭錯無芳北風漂夜色河凝暠如霜悵哉心神晩燭㓕此深堂菱衣如可贈寧濕岨雲梁銅爵妓武王去金閣英威長寂寞雄劒頓無光雜佩亦銷爍秋至明月圎風傷白露落清夜何湛湛孤燭映蘭幕撫影愴無從惟懷憂不薄瑶色行應罷紅芳幾爲樂徒登歌舞臺終成螻蟻郭學魏文帝西北有浮雲繚繞華隂山惜哉時不遇入夜值霜寒秋風聒地起吹我至幽燕幽燕非我國窈窕爲誰賢少年歌且止歌聲斷客子從冠軍行建平王登廬山香爐峯廣成愛神鼎淮南好丹經此峯具鸞鶴往來盡仙靈瑶草正拿赩玉樹信葱青綘氣下縈薄白雲上沓冥中坐瞰蜿虹俛伏視流星不㝷遐恠極則知耳目驚日落長沙渚曾隂萬里生籍蘭素多意臨風黙含情方學栢松隱羞逐市井名幸承光誦末伏恩託後旌望荆山奉謁至江漢始知楚塞長南閩繞桐栢西途出魯陽寒郊無留影秋日懸清光悲風撓重林雲霞肅川漲歳晏君如何零淚染衣裳玉柱空掩露金樽坐含霜一聞苦寒奏再使艶歌傷歩桐臺客子畏霜雪憂至竟悠哉綺帷生網羅寳刀積塵埃思君出漢北鞍馬登楚臺歲綵合雲光平原秋色來寂聽積空意凝望信長懷蕙芬自有美光景詎徘徊山中忽緩駕暮雪將盈階從建平王遊紀南城恭承此嘉德末官至南荆斂袵依光采端笏奉仁明再逢緑草合重見翠雲生江甸知禮冨漢渚聞敎清君王澹以思樹羽望楚城年積衣劒滅地逺宫舘平錦帳終寂寞綵瑟祕音英丹沙信難學黃金不可成遷化毎如兹安用貴空名流宕慘中懷凝意方自驚願借若木景長照憂人情秋至懷歸悵然集漢北還望岨山田沄沄百里壑參差萬里山楚關帶秦隴荆雲冠吳煙草色斂窮水木葉變吳川秋至帝子降客人傷嬋姢試訪淮海使歸路成數千蓬驅未止極旌心徒自懸若華想無慰憂至定傷年古意報袁功曹從軍出隴北長望隂山雲涇渭各流異恩情於此分故人贈寳劒鏤以瑤華文一言鳯獨立再說鸞無群何得晨風起悠哉凌翠氛黃鵠去千里垂涕爲報君渡西塞望江上諸山南國多異山雜樹共冬榮潺湲夕澗急嘈噆晨鵾鳴石林上參錯流沫下縱橫松氣鑑青藹霞光鑠丹英望古一凝思留滯桂枝情結友愛逺岳採藥好長生常畏佳人晩秋蘭傷紫莖海外果可學歳暮誦仙經劉僕射東山集蕭蕭雲色滋惟愛起長思喬木嘯山曲征鳥怨水湄共惜玉樽暮願使光隂遟紳裳視絶雲銜意方此時誦飾江皐駕終從海濵詩寄丘三公昔我學冠劒逢君在三川何意風雨激一訣異東西音先菊秀空應奪蘭芳幾時堅常恐握手畢黯如光絶天安得明月珠擥涕寄吳山陸東海譙山集杳杳長役思思來使情濃恒忌光氛度籍蕙望春紅青莎𬒳海月朱華冐水松輕氣曖長岳雄虹赫逺峯日暮崦嵫谷參差綵雲重永願白沙渚遊衍遂相從丹山有琴瑟不爲憂傷容燈夜和殷長史冬盡綵葉暮金石亦懷傷冰鱗不能起水鳥望川梁客子依永夜寂寞幽意長卧歇丹丘采坐失曽泉光結眉慘成慮銷憂非羽觴此心兾可緩清芷在沅湘贈煉丹法和殷長史琴髙遊會稽靈變竟不還不還有長意長意希童顔身識本爛熳光曜不可攀方驗叅同契金竈煉神丹頓捨心知愛永郤平生歡玉牒裁可卷珠蘂不盈簞譬如明月色流采映歳寒一待黃冶就青芬遟孤鸞感春冰遥和謝中書二首江皐桐始華斂衣望邊亭平原何寂寂島暮蘭紫莖芬披好草合流爛新光生冰雪徒皦潔此焉空守貞暮意歌上眷悵哉望佳人掔洲之宿莽命爲瑶桂因觀書術不變學古道恒真若作商山客寄謝丹水濵無錫縣歷山集愁生白露日恐起秋風年竊悲杜蘅暮擥涕弔空山落葉下楚水別鶴噪吳田瘴氣隂不極日色半虧天酒至情蕭瑟慿樽還惘然一聞清琴奏歔泣方留連况乃客子念直視絲竹間無錫舅相送御帝別心逺路已逈意滿辭未陳曽風漂别蓋北雲竦征人柸酒憐歳暮志氣非上春若無孤鳥還瀝泣何所因吳中禮石佛㓜生太浮詭長思多沉疑疑思不慙炤詭生寧盡時敬承積刼下金光鑠海湄火宅歛焚炭藥草匝惠滋常願樂此道誦經空山坻禪心暮不雜寂行好無私軒騎乆已訣親愛不留遟憂傷漫漫情靈意終不淄誓㝷青蓮果永入𣑽庭期赤亭渚吳江泛丘墟饒桂復多楓水夕潮波黒日暮精氣紅路長光寒盡鳥鳴秋草窮瑶水雖未合珠霜竊過中坐識物序晏卧視歳隂空一傷千里極獨望淮海風逺心何所類雲邊有征鴻渡泉嶠出諸山之頂岑崟蔽日月左右信艱哉萬壑共馳騖百谷爭往來鷹隼旣厲翼蛟魚亦曝鰓崩壁迭枕卧嶃石屢盤廻伏波未能鑿樓船不敢𨳩百年積流水千歳生青苔行行詎半景余馬以長懷南方天炎火䰟兮可歸來遷陽亭擥淚訪亭候兹地乃閩城萬古通漢使千載連吳兵瑶磵夐嶄崒銅山鬱縱橫方水埋金艧圓岸伏丹瓊下視雄虹照俯看綵霞明桂枝空命折煙氣坐自驚劒逕羞前檢岷山慙舊名伊我從霜露僕御復孤征楚客心命絶一願聞越聲採石上菖蒲瓊琴乆塵蕪金鏡廢不看不見空閨裏縱橫愁思端緩歩遵汀渚楊枻泛波瀾竇至煙水流緑緩桂􅉼丹慿酒意未恱半景方自歎每爲憂見及杜若詎能寛兾採石上草得以駐餘顔赤鯉儻可乗雲霧不復還遊黃蘖山長望竟何極閩雲連越邊南州饒竒恠赤縣多靈仙金峯各虧日銅石共臨天陽岫照鸞采隂谿噴龍泉殘㞦十代木廧崒萬古煙禽鳴丹壁上猨嘯青崖間秦皇慕隱淪漢武願長年皆負雄豪威棄劒爲名山况我葵藿志松木橫眼前所若同逺好臨風載悠然還故國漢臣泣長沙楚客悲辰陽古今雖不舉兹理亦冝傷山中信寂寥孤景吟空堂北地三變露南簷再逢霜竊值寰海闢仄見圭緯昌浮雲抱山川遊子御故鄕遽發桃花渚適宿春風塲紅草涵電色緑樹鑠煙光髙歌傃關國微歎依笙篁請學碧靈萆終歲自芬芳傷内弟劉常侍金璧自蕙質蘭社信嘉名丹綵旣騰迹華蕚故揚聲伊余方罷秀難息向君榮誰疑春光􅉴何遽秋露輕逺心惜近路促景怨長情風至衣䄂冷况復蟪蛄鳴白露㳂漢沼明月空漢生長悲離短意惻切吟空庭注欷東郊外流涕北山埛從蕭驃騎新帝壘鯢妖毀王度虹氣岨王猷上宰軫靈略宏威肅廣謀綿嶮胄戈堞乗嶠架烽樓燕兵歌越水代馬思吳州金笳夜一逺明月信悠悠雲色𬒳江出煙光帶海浮𨳩襟夾蒼宇拓逺局溟洲折日承丹谷總駕臨青丘仄待颷霧晏方從畎壑遊效阮公詩十五首歳暮懷感傷中夕弄清琴戾戾曙風急團團明月隂孤雲出北山宿鳥驚東林誰謂人道廣憂慨自相㝷寧知霜雪後獨見松竹心十年學讀書顔華尚美好不逐丗間人闘雞東郊道富貴如浮雲金玉不爲寳一旦鵜鴂鳴嚴霜𬒳勁草志氣多感失泣下沾懷抱白露淹庭樹秋風吹羅衣忠信主不合辭意將訴誰獨坐東軒下雞鳴夜已晞緫駕命賔僕遵路起旋歸天命誰能見人蹤信可疑飄飄恍惚中是非安所之大道常不驗金火毎如斯忼慨少淑貌便姢多令辭宿昔秉心誓靈明將見期願從丹丘駕長弄華池滋隂陽不可知鬼神惟杳冥暫試武帝貌一見李后靈同情淪異物有體入無形賢聖共草昧仁智焉足明變化未有極恍惚誰能精若木出海外本自丹水隂群帝共上下鸞鳥相追㝷千齡猶旦夕萬丗更浮沉豈與異鄕士瑜瑕論淺深夏后乗兩龍髙㑹在帝臺榮光河雒出白雲蒼梧來侍御多賢聖升降有群才四時有變化盛明不徘徊髙陽邈已逺竚立誰語哉昔余登大梁西南望洪河時寒原野曠風急霜露多仲冬正慘切日月少精華落葉縱橫起飛鳥時相過搔首廣川隂懷歸思如何常願反𥘉服閑歩潁水阿宵月輝西極女圭映東海佳麗多異色芬葩有竒采綺縞非無情光隂命誰待不與風雨變長共山川在人道則不然消散隨風改少年學擊劒從師至幽州燕趙兵馬地唯見古時丘登城望山水平原獨悠悠寒暑有往來功名安可留擾擾當途子毀譽多埃塵朝生輿馬間夕死衢路濵藜藿應見棄勢位乃爲親華屋爭結綬朱門競彈巾徒羡草木利不愛金碧身至德所以貴河上有丈人華樹曜北林芬芳空自宣秋至白雲起蟪蛄號庭前中心有所思虚堂獨浩然安坐詠琴瑟逍遥可永年假乗試行遊北望髙山岑翩翩征鳥翼蕭蕭松栢隂感時多辛酸覽物更傷心性命有定理禍福不可禁唯見雲際鵠江海自追㝷夕雲映西山蟋蟀吟桑子零露𬒳百草秋風吹桃李君子懷苦心感慨不能止駕言逺行遊驅馬清河涘寒暑更進退金石有終始光色俯仰間英艶難乆恃至人貴無爲裁䰟守寂寥唯有馳騖士風塵在一朝輿馬相跨躍賔從共矝驕天道好盈缺春華故秋凋不知北山民商歌弄塲苗清思詩五首趙后未至麗隂妃非美極情理儻可論形有焉足識帝女在河洲晦映西海側隂陽無定光雜錯千萬色終歲如瓊草紅華長翕赩師曠操雅操延子聆竒音玄鶴徒翔舞清角自浮沉明琯東南逝精絲西北臨白雲瑶池曲上使淚淫淫秋夜紫蘭生湛湛明月光偃蹇靈芝來容裔紫華堂林木不拂蓋淇水寧漸裳倐忽南江隂照曜北海陽從此長往來萬丗無感傷白露滋金瑟清風蕩玉琴空閨饒逺念虚堂生夜隂兹夕一何哀明月没西林丗人重時暮道士情亦深頼乗青鳥翼徑出玉山岑至德不可傳靈龜不可侣草木還根蔕精靈歸妙理我學杳冥道誰能測窮巳須待九轉成終㑹長沙市梁江文通集卷第三
