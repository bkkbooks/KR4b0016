body:
  text: 勑為朝賢答劉休範書昔媯道鼎昌干羽未能戢姬德昭宣長旌猶卷舒焚衣毀冕有自來矣皇宋靈武誕命道鬱終三后連光四聖沓軌或經天緯地搆紫靈之符調風偃海隆黃旗之祚莫不頌滿金石聲彯宇宙者也暨我太宗明皇帝惟嶽降聖重耀函夏延禮壁臺訪道衢宰平陽之后卷迹慙靈空同之君斂功謝德是以綵雲祥風之瑞布濩區中梯山棧火之俗欵徼請吏跨啇軼夏洗周滌漢道澤優衍猶不道封禪遐靈在天餘惠無氓主上文明金相穆然玉色履璧之禎獲圭之應著在紀歲仁浸汙河惠愛秋草想亦君之所聞也重以先帝靈略潛通英轡逺取受話言必忠貞方肅之臣奉風聲必虔恭匪懈之士明時琴瑟鼎鉉之盛且𬒳於寧丗而忽覿來書以惋以慨君為齊梁楚越之主鼎貴一時金玉滿堂文馬千駟爵授湯沭冠蓋於道惟名尊崇誰與為雄而出言效尤吐音入戾舉旗類社志竊神禁稱兵斂衆遂窺外關今朝無闕政頓構凌上之節室無孽竪坐生莫大之舋鴟梟赭衣號興徒黨主萃淵藪寧滋之甚不臧不軌不忠不義未有若斯者也宗枝之釁逺則吳楚見禽於一壁盤石之孽近則江荆面縛於小將此成敗蘭艾之鑒又亦君之所知也聞彼此飲鼠舞之異早見物徴河北隴上之謡已露童詠所謂妖由人作孽不可逃然桓侯之患良助寒心今羽林黃頭駱驛爭引熊渠佽飛首尾電發伏波樓船掩江蔽汜渡遼甲卒充野布隰加以先天蓋丗之略蕩海拔山之威任輔沛陳羽林鷁鵃露動龍驤精騎風驅然後六師雲起九軍星連霓旌外江虹艗中水金甲映平陸鐡馬照長原蹴南嶽而永慨瞰九孤而懷恐伐罪弔民復驗於兹甫刑三千唯此為大僕才等不羈志瀝丹欵故奏禍福行矣悵然袁禇劉肅等疏尚書符起都官軍局符蘭臺侍御史大夫尊冠賤履君臣斯位愛順惡逆成敗可憢未有慿凌我江郊侵軼我河縣而不流魂漂骨丹宗血祀者也沈攸之寂寥無文起自甲卒邀我百戰之軍乘彼一捷之幸鐫山裂地紐紫要金擁旗蕃伯便無北面之禮受符方屏即有專征之興箕賦深斂毒𬒳郢南枉法矯刑毒聞荆西鬼怪其性故從始而遂終狼戾其志乃沿少而得老山陵不奔移𬒮為慶踐祚無賀按劒稱豫遂乃關馳送書亭照妖火此而可賖孰不可宥今遣陳承叔彭文之等敢徑三萬前驅電耀吕安國任侯伯桓崇祖曹虎頭等樓艦五萬騎射蛟中流茍元賔郭文孝程隱雋等輕舸二萬高旌蔽日周盤龍張文嘉薛道淵等鐡馬五千龍驤後陳凡此諸帥莫不氣薄日月精變虹霓或飲羽石梁或超踰門樓索鐡拔距孤視萬旅顧眄則前後生風喑嗚别左右激電然鑾戎薄臨驍虎百萬六軍徐軌五輅遲斾丹艦發照素甲生波樓煩白羽投鞍成嶽漁陽黑騎浴鐡為群於是高山與深谷共湮紫芝與白艾同滅不亦惜乎惜乎符至之日幸加三省其驅逼寢手之人鋒陳塢壁之主若有救命軍門一無所問或能因罪立績賞不示私斬祛射𬒮唯功是與購募之科具列如上信如白水激然無二臺明詳旨飛火普加宣才文書千里馳驛慰勞雍州文皇帝謝鎮軍寧蠻二府雍州文武士庶等夫忠為令德或感槩殺軀信實美行或殉義蹈節而沈攸之小竪反覆稱逆西藩袁粲劉康潛使相扇遂擁據石頭並圖廟社粲康既從王憲蒼黎同慶攸之孤州蟻聚勢必燼滅刺史張敬義氣雲騰秣馬星驅全羽十萬殄兹氛鯨曾不旋踵彼州南陽白水將相遺風忠義之士霜戈電發但戎車暫動念原未寧冬寒卿皆無恙蕭驃騎驤封第二表臣某言寫瀝愚丹巳續前表猥降前詔未垂鏡恕一省驚慙再悸魂府靜躬自察啓居匪地中謝臣聞日薄星回昊天無以爽其節山盈川沖厚地不能虧其度豈不靈鑄言限神極無失况丗道恆淪人彛剽奪數滿必沿虛飾小故辭大臣才非古賢任鈞左戚祚開山河兼金疊組爵奓常班寵溢前逹以榮以渥且慙且􅌤雖嘉銘鼎之恭更懼循墟之速矧乃三司業貴上將地崇惣録務廣河汾寄深圭宇方啓劒衛增肅既驚朝野足震城邑殷周冨士猶難其人漢魏多才亦罕兼職且麟閣之臣尚有位不及鉉全器之侯猶或任不並台名爵無假前丗之雄規車旗勿濫中葉之英軌况鴻誥鬱集懋册頓萃諒非虛薄輕所膺符今殷夏既聲封國式固故天地燀爠日月更輝陛下停若鏡之明流如雲之愛方求士於板巖宜思賢於屠肆而私臣以闈廟寵臣以帷鼎位兼文武職惣內外非所以發夢渭濵儲精河藪鐫金刻石既不可詮輿歌里頌其謂臣何仰緣大道方行蒼祗宅氣威靈所燭九功咸詠寧於庸臣獨隔恩耀誓守愚衷重扣雲日如蒙恩宥實生之幸不任慊欵之風第三表臣某言臣再抽慊請辭為理屈側守圭漏伏望衷鑑而震緯嚴祕𢙿悰徒懸優奬之降非復常旨肅奉驚懅曛曉如失中謝臣照册訪古訟史稽昔以為敷道之寄管物成務惣録之重匡績毗風莫不下協河嶽上踵光緯先王所以長丗後睿所以字氓讃金圖之要輔樞曆之機者也臣本瑣姿不慕聞逹昔值英丗頻遘時來感激光私未能自返烏可超乘厚任妄據髙圖天道既平鬼神好謙臣亦何人而獨斯處所以不恤色忤頻犯鴻威者正以方圓之景巳滿丹彩之色難加政能緯俗匪務傍職坐而燮道必在其人若臣武未燭鞬􅐤之分文不藹樽爼之間德非時秀道乖物宗虛飾疲伍空貽上位則天變彰於飛流地眚見于震壓驚蕩民聽蕪沮物議綸言之出不追金石之謬巳逺豈唯敗錦傷經毀鼎覆餗而已哉自非西京上績東都名勳河右群賢江左諸彥寧有誣叨天爵以為巳功者也昔南楚偏君鄢郢小政執圭柱國尚不輕授况車軌共文四𬈑同宅而以鄙蔽超居金鉉殊任鬱起臣心憂魄悚視丹如緑伏願陛下暫停冕纊少察愚實鑒臣靦情愍臣孤志廣天下之惠可匹夫之諒中則國步永清門下永無謬誤不任憂駭之情蕭領軍讓司空并敦勸啓臣某言臣沿心之請丹識以傾詔旨沖絶便賜斷表伏聞當遺王人猥垂奬勸仰天光休俯增驚厲中謝臣以為槐鉉之任百王攸先具司是屬冠冕式贍化曜昌輝連基政務事深崇替迹豫興衰故道富一時則風行明令才乏適權則山摧河泣既撓汨蒼祗將紊毀身國臣進退惟疑再三自顧實以陋情悲忘寵極但畏軼超疲五乃參鼎軸無德而貴豈敢偷存才怯任重物所不恕故弱識𥚹槩頻布前辭枯木朽株永隔蠲恕豈特大車方塵小雅有廢而巳哉將據致冦之悔取鑒於茲矣且皇華之命居上之鴻私鳳舉之招為下之殊榮國勳必書史不謬牘况臣連牧圉嶽董率職方既鑠近古垂耀中葉揆望揣實為泰巳甚而乃復降朱輪之使方枉青册之勸寤寐悁灼諒無以任輒重素誠冒覬神照伏願皇靈特垂開愍賜停正台之職并光勸之使餘所榮忝誓不敢辭肅恭外屏祈回恩授則於臣慊欵復為惠造不任憂戴匪惶之情蕭領軍拜侍中刺史章上書皇帝陛下即日詔書以臣為侍中驃騎大將軍開府儀同三司班劒三十人等持節都督如故峻命在庭光册充軒虹驂聳服朱轙佇蓋夤對以懅心影若傾中謝臣功乏至道不足以題象魏績非振民無可以書廟閣半漏未晏中鍾而驚實忌微庸起乘盛服竊疑國寵頓萃末躬今寰海順典瓊都咸光調御惟新鎔製就始良宜整變憲經詮明典緯九河式耀三辰載晰不悟陛下皇靈曲溢大賚斯降而鴻賞之行乃於臣始非所以騰振遙風激昻品流輿人之誦具聞其黷頻露慊祈未阻鑒順今使虔禮青軒謹躬丹墀憂符怵怡慙屬兼軫不任屏營之情蕭驃騎録尚書事到省表臣某言臣自妄蒙異寵輕荷殊爵晝􅉴猶聳夜艾方驚誠以設器瑶陛取監沖滿懸魄金波徴驗虧闕兹乃天數去盈人經好退后所以裁成萬品下所以各慎百司未有逹才易貫尅負永業者也且量力之誥實炯前書辭科之誨且昭昔牒况臣徒竭弱質忠貞未懟猶叨令恩山嶽非重故慙屬交喪頻煩表疏必謂巡崖之慊不忽氣亮之清可期不悟皇明神邈鴻奬彌深雖守丹愚競絶蠲恕今輒耀纓上序鏘珮中軒德輕施重左右生華志盡輸謝終愧報效不任下情蕭驃騎謝甲仗入殿表臣某言臣即日𬒳勑賜給甲仗五十人入禁儀武殿飾冠疇典局此盛恩五情銘載臣聞國之利器在祀與戎蘭錡之設實允儲方故官騎辰居羽林天部瞰城龍塞言伏鬼方臣股肱之力不足以染丹青橫草之勤寧可以鏤金石而魚服象弭一旦虛授誕錫金圭方兹為茍黃河如帶比金非賞故異寵之襲心魄共驚不丗之服祗同輝雖攀靈河漢駿奔明哲慙迹駭衷無情以處蕭驃騎讓豫司二州表臣某言臣傾心駐氣不蒙睿感憂讋交鏡中寐再驚中謝臣聞國曆惟耀則藩伯緝其才朝緯伊序則方率司其度用能璿紐弗虧民教可變者也臣自少器業無聞弘大誤變燕鼎超慿吳舟託翰負組假翼要瓊質圖玄素文寫青艧爵冨諸公任高群彥銓梁既失輻誚所湊雖庂影毗道茍身贊德朝徽不昭民聽具溢豈非性力知限鑒度有崖乘兹而處猶懼紊辱之恥况此以任何堪湧溢之賜且董督條興蓋非盛古至乃河襄𥘉授或體兼上才江表廣任或功為物首臣績陋於國不勤睿朝寵集若是非所尅敢終抱寸襟重露愚見伏願天鑄廣裁地靈厚載特垂蠲渥使不矜盈則藿質蓬性庶無矯奪不任匪晏之情蕭驃騎發徐州三五教州府紀綱沈攸之背慢靈極稽誅之日久矣况稱兵江漢之上圖釁廟闕之下惡熾罪盈民靈所絶朝廷以尅辰纂嚴令輿夙駕吾任先責逺義兼常慨挺刃投𬒮信見其時方當水斬龍蛟陸斷犀兕雖烈士銜志壯夫投槩然雲羅既舒冝廣威防所統郡縣便普三五咸依舊格以赴戎麾主者飛火施行蕭驃騎上頓表臣某言伏見明詔鑾輿便御親六師臣又謬惣群師竊聞金火告耀昏明代卷雲電溉湊經綸相襲所以草昧縣宇昭晣區宙况乃逆徒阻兵器掩西服雖蟻衆鼠竊勢必禠散然尋仞難貸原煙易滅臣受算內楹稜威外閫按甲視夕沾襟待旦翦此凶渠庶匪曠旬但遂玉輅躬臨雲蹕親駕悚悚慨交心實百常憤今便嚴率所統尅此月二十六日出次戎郊故巳望江源以軫歎想荆山而增厲矣進止之宜更聽勑旨不任悚企匪寧之心蕭驃騎築新亭壘埋枯骸教府州綱紀夫汝南稱慈諒由掩胔廣漢流仁實存殯朽近柔製兹營崇堞浚塹古墟曩隧時有湮移深松茂草或到刋剃慿壙動懷巡隍增愴宜並為收改毀奠祀主局詳辨施行蕭驃騎謝𬒳侍中慰勞表臣某言即日侍中祕書監臣戢至奉宣詔旨慰勞便受國中帷練甲外壘旍麾蔽景輿徒競氣人懷秋嚴士蓄霜斷晦魂已掩氛竪未懸稽鉞佇威寢興震慨今王人臨郊皇華降庭輝耀望實將激威武戴鶡之夫迎光蹀恩投石之師攀照竦惠楚纊越醪方茲慙潤臣忝屬閫私彌抱渥洽不任下情蕭驃騎慶平賊表臣某言狂賊沈攸之棄天犯紀毀禮滅緯外陵南畿內壘西夏讋讋涵氣咸百讎憤賴皇威遐制璿圖廣馭四海競順其會如林仰綴宗稷之靈俯輯士民之效故嚴效裁交妖鋒折首凱期既孱樂飲在晨斯乃紫曆方永蒼氓同慶臣備符寵私時深抃舞不任踴躍之情蕭驃騎解嚴輸黃鉞表臣某言逆沴電熾凶妖霧舒志夫禋天情巳類社故乃馳羽江郊騖燧山甸雖藏智審其點戮􅉼識判其奔沮然兵扈難輕義險冝備故膺寵無辭奉鉞不謙今元凶既殪醜徒自紊祲靄方卷郢氛巳廓樂琯登肆禮衣曵朝不冝復假殊服取缺彛則輒上還王府永戢祕館蕭驃騎讓太尉增封第三表臣某言以鉉司崇貴衮位淵嚴非德非功無忝無濫故誓魂肆請舒衷仰謁不能曲流兹照遂乃徒洽恩奬周覽未交靈爽以懼中謝臣歷古沿圖循逺訪繪未嘗不麗選台妙簡槐采者也魯鄭之賢戚曹蕭之勳彥吳鄧之盛功王鍾之素業孔明之居蜀茂弘之在晉皆僉曰伊人是以處無懦色臣官逢昌丗運漸時明頻煩紫渥綢繆璿命身薄施厚感厲愈深遂貟機繩之託猥集衡梁之任風軌不樹徽猷罕宣無以式翦冦兆載弭姦義致虹沴阻於上京霓妖扇於下國實賴藩伯鞠旅侯甸入守攙槍旬始煙祛霧卷故皇道威稜之由神緯昭昌之效臣豈有探敻察幽之智攻城野戰之力哉今迹無小功事貽大賞愧寤終朝慙夢流夜咨此庸弱何以任忝伏惟淮泗猶梗趙魏未賔中源久蕪神州方翳思樂盛猷願厲聲頌將陪雲驂以北守扈朝服以濟師乃為少雪庸誠微謝天眷耳寧容遽竊茂爵輕頒鴻名者乎伏願聖渥遐覃賜以矜宥霈焉垂仁穆然惠德血祈旦亮慊志夕滿雖蹈庇戾猶深抃躍蕭驃騎讓太尉增封表臣某言撰心求私精衷請亮情不感神理無動天詔飾既降辭表是絶朱紱方臻金鉉未宥魄慮再馳詵然改席臣局志久戰淺槩已領具煩寸管備黷尺史曠旬浹景祈指遂宜猶謂設品分職實以仰銓壁緯列寵縣榮故乃俯酌瑶陛迹聮盈缺道協興降上睿所以僉舉前英所以詳能今若弟隨私貴爵與私冨紊蕩經邦斷折民紀豈可還風中葉逖聽遐代者也臣才乏往賢績謝古列妖鋒孽火將炎天地幸郊甸或靜江山以閟文軒華劒既榮既峻侯桂食又盈又滿祿高誚厚任重責深弱節兼誠誓思不淺伏願隆慈特垂明愍臣奉國猶家慮公若私秉軸之鈞心希在治不任懇懇之情蕭驃騎讓油幢表臣某言奉詔賜車一乘竊以國容方穆旗章式序朝禮求清儀服咸貫故象革建鑣尚炯明圖朱箱玄蓋猶照漢篆皆旌羽勿差功庸匪濫臣忝爵山重蒙榮海深襲恩祗册巳慙𥘉筮浮祿素位方疚心路鑒古以惕巡丗罔然不宜假文丹愋空飾皂轖仰思至道俯恤物僣伏願聖逺特停華渥書愚上請追深纍懼不任下情梁江文通集卷第七
