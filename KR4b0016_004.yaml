body:
  text: 詩惜晚春應劉祕書煙景抱空意衡杜綴幽心心憂望碧葉涵影顧青林風光多樹色露華翻蕙隂水苔方下蔓石蘿日上尋霞衣已具帶仙冠不持簮徒為多委鬱精魄還自臨始獲瓊歌贈一點重如金山中有雜桂玉歷乃共斟卧疾怨别劉長史四時煎日夜玉露催紫芬始懷未廽歎春意秋方驚涼草散螢色夏樹斂蟬聲慿景魂且謐卧堂怨已生承君客江潭先愁鴻鴈鳴吳山饒離袂楚水多別情金堅碧不滅桂華蘭有英無輟代上朝豈惜鏡中明但見一葉落衰恨方始平應劉豫章別清塵播嶠岫逺𬒳修代髙行乃厲天俗態攬明懋散才賢裂分堯甸音田於時秋永永江漢起殘煙獵獵風剪樹颯颯露傷蓮霞出海中雲水發江上泉浸淫泉懷浦泛濫雲辭山洲渚一揚𬒮殞意元氣前願效卷施草春華冬復堅秋夕納涼奉和刑獄舅蕭條晚秋景旻雲承景斜虛堂起青藹崦嵫生暮霞空居寂以欷左右自幽歌騎星謝屐尾濯髮慙陽阿年歇玄圃壁歲減天津波金簫哀夜長瑶琴怨暮多四時通信黯春風日夜過楚水徒有蘭憂至竟如何採菱秋日心容與涉水望碧蓮紫菱亦可採試以緩愁年參差萬葉下泛漾百流前髙彩隘通壑香氣麗廣川歌出棹女曲儛入江南絃梁黿非逐俗駕鯉乃懷仙衆美信如此無恨出清泉郊外望秋答殷博士白露掩江皋青滿平地蕪長夜亦何際銜思久踟蹰企余重蘭貝清才富金瑜獨艷始東山擅麗終西都雲精無永滯水碧豈慙濡屬我嵫景半賞爾若光𥘉折麻異離群紉蕙非索居頻贈既雅歌還懷諒短書冬盡難離知丘長史間居深悵悵颸寒拂中閨寶禮自千里縑書果君題山川吐幽氣雲景抱長懷兹別亦為逺潮瀾鬱東西汀皋日慘色桂暗猿方啼攬意誰姹際屑涕在心乖杜蘅念無沫石蘭終不暌兾惣歲暮駕遊衍蒼山蹊外兵舅夜集丹林一葉舊碧草從此空煙光拂夜色華舟蕩秋風斂意悵何已極望情思中瑶瀾寂以晏若采能幾終暮心亦誰寄江皋桂有叢當春四韻同左丞雷萌山中草雲煦江上花左煙漾璇景輕風泛淩霞我有幽蘭念銜意矚里斜友人殊未還獨慰簷前華池上酬劉記室戚戚憂可結結憂視春暮紫荷漸曲池皋蘭覆徑路蔥蒨亘華堂葐蒀雜綺樹為此久佇立容易光隂度水館次久羽山葉下暝露懷賞入舊襟恱物攬新賦惜我無雕文報章慙復素雜體三十首夫楚謡漢風既非一國魏製晉造固亦二體譬猶藍朱成彩雜錯之變無窮宫角為音靡曼之態不極故娥眉詎同貌而俱動於魄芳草寧共氣而皆恱於魂不其然歟至於代之諸賢各滯所迷莫不論甘則忌辛好丹則非素豈所謂通方廣恕好逺兼愛者哉乃致公幹仲宣之論家有曲直安仁士衡之評人立矯抗況復殊於此者乎文貴逺賤近人之常情重耳輕目俗之恆蔽是以邯鄲託曲於李竒士季假論於嗣宗此其效也然五言之興諒非敻古但關西鄴下既以罕同河外江南頗為異法故玄黃經緯之辨金碧浮沉之殊僕以為亦各具美兼善而已今作三十首詩斆其文體雖不足品藻淵流庶亦無乖商攉云尓古離别逺與君別者乃至鴈門關黃雲蔽千里遊子何時還送君如昨日􅉉前露已團不惜蕙草晚所悲道里寒君行在天涯妾身長別離願一見顔色不異瓊樹枝兔絲及水萍所寄終不移李都尉從軍陵少卿樽酒送征人踟蹰在親宴日暮浮雲滋握手淚如霰悠悠清水天嘉魴得所薦而我在萬里結友不相見袖中有短書願寄雙飛燕班婕妤詠扇紈扇如圜月出自機中素畫作秦王女乘鸞向煙霧彩色丗所重雖新不似故竊愁涼風至吹我玉階樹君子恩未畢零落在中路魏文帝遊宴丕子桓置酒坐飛閣逍遙臨華池神飈自逺至左右芙蓉披緑竹夾清水秋蘭𬒳幽崖月出照園中冠珮相追隨客從南楚來為我吹參差淵魚猶伏浦聽者未云罷高文一何綺小儒安足為肅肅廣殿隂雀聲愁北林衆賔還城邑何用慰我心陳思王贈友植子建君王禮英賢不吝千金璧雙闕指馳道朱宫羅弟宅從容氷井臺清池映華薄涼風蕩芳氣碧樹先秋落朝與佳人期日夕望青閣褰裳摘明珠徙倚拾蕙若眷我二三子辭我麗金艧延陵輕寶劒季布重然諾處富不忘貧有道在葵藿劉文學感懷禎公幹蒼蒼山中桂團團霜露色霜露一何緊桂枝生自直橘柚在南國因君為羽翼謬蒙聖主私託身文墨職丹綵既已過敢不自雕飾華月照芳池列坐金殿側微臣固受賜鴻恩良未測王侍中懷德粲仲宣伊昔值丗亂秣馬辭帝京既傷蔓草別方知枤杜情崤函蕩丘墟兾闕緬縱橫倚棹泛涇渭日暮山河清蟋蟀依素野嚴風吹枯莖鸛鷁在幽草客子淚已零去鄉三十載幸遭天下平賢主降嘉賞金貂服玄纓侍宴出河曲飛蓋遊鄴城朝露竟幾何忽如水上萍君子篤恩義柯葉終不傾福履既所綏千載垂令名嵆中散言志康叔夜曰余不師訓潛志去俗塵逺想出宏域高步超常倫靈鳯振羽儀戢景西海濵朝食琅玕實夕飮玉池津處順故無纍養德乃入神曠哉宇宙惠雲羅更四陳哲人貴識義大雅明疪身莊生悟無為左氏守其真天下皆得一名實久相賔咸池響爰鶋鐘鼓或愁辛栁惠善直道孫登庶知人寫懷良未逺感贈還書紳阮步兵詠懷籍嗣宗青鳥海上遊鸒斯蒿下飛浮沉不相冝羽翼各有歸飄飄可終極滉漾安是非朝雲乘變化光耀代所希精衛銜木石誰能測幽微張司空離情華茂先秋月映簾櫳懸光入丹墀佳人撫鳴琴清夜守空帷蘭徑少行迹玉臺生網絲庭樹發紅彩閨草含碧滋延佇整綾綺萬里贈所思願垂湛露惠信我皎日期潘黃門述哀嶽安仁青春速天機素秋馳白日美人歸重泉悽愴無終畢殯宫已肅清松柏轉蕭瑟俯仰不能弭尋念非但一撫襟悼寂寞恍然若有失明月入綺窗髣佛想蕙質銷憂非萱草永懷寄夢寐夢寐復冥冥何由覿爾形我慙北海術爾無帝女靈駕言出逺山徘徊泣松銘雨絶無還雲華落豈留英日月方代序寢興何時平陸平原羇官機士衡諸后降嘉命恩紀𬒳微身明發眷桑梓永歎懷密親流念辭南澨銜怨別西津驅馬遵淮泗旦夕見梁陳服義追上列矯迹厠官臣朱黻咸旄士長纓皆俊民契闊承華內綢繆踰歲年日暮聊惣駕逍遙觀洛川殂殁多拱木宿草凌寒煙遊子易感慨躑躅還自憐願言寄三鳥離思非徒然左記室詠史思太沖韓公淪賣藥梅生隱市門百年信荏苒何為苦心魂當學衛霍將建功在河源圭組賢君眄青紫明主恩終軍才始逹賈誼位方尊金張服貂冕許史乘華軒王侯貴片義公卿重一言太平多歡娛飛蓋東都門顧念張仲蔚蓬蒿滿中園張黃門苦雨協景陽丹霞蔽陽景緑泉涌隂渚水鸛巢層甍山雲潤柱礎有淹興春節愁霖貫秋序燮燮涼葉奪戾戾颸風舉高談玩四時索居慕儔侣青苕日夜黃芳蕤成宿楚歲暮百慮交無以慰延佇劉太尉傷亂琨越石皇晉遘陽九天下橫氛霧秦趙值薄蝕幽并逢虎據伊余荷寵靈感激徇馳騖雖無六竒術兾與張韓遇寧戚扣角歌桓公遭乃舉荀息冒嶮難實以忠貞故空今日月逝愧無古人度飲馬出城濠北望沙漠路千里何蕭條白日隱寒樹投𬒮既憤悶撫枕懷百慮功名惜未立玄髮已改素時哉茍有會治亂惟冥數盧侍郎感交諶子諒大厦須異材廊廟非庸器英俊著丗功多士濟斯位眷顧成綢繆乃與時髦匹姻媾久不虧契闊豈但一逢厄既已同處危非所恤常慕先逹槩觀古論得失馬服為趙將壃場得淸謐信陵佩魏印秦兵不敢出慨無握中䇿徒慙素絲質羇旅去舊京感遇踰琴瑟自顧非杞梓免力在無逸更以畏友朋濫吹乖名實郭弘農遊仙璞景純崦山多靈草海濵饒竒石偃蹇尋青雲隱淪駐精魄道人讀丹經方士煉玉液朱霞入窗牖曜靈照空隙傲倪摘木芝凌波採水碧眇然萬里遊矯掌望煙客永得安期術豈愁𪷟汜迫孫廷評雜述楚子荆太素既已分吹萬著形兆寂動茍有源因謂殤子夭道喪涉千載津梁誰能了思乘扶搖翰卓然凌風矯靜觀尺捶義理足未常少冏冏秋月明慿軒詠堯老浪迹無蚩妍然後君子道領略歸一致南山有綺皓交臂久變化傅火乃薪草亹亹玄思清胸中去機巧物我俱忘情可以狎鷗鳥許徴君自敘詢玄度張子暗內機單生蔽外象一時排冥筌冷然空中賞遣此若喪情資神任獨往採藥白雲隈聊以肆所養丹葩曜芳蕤緑草隂間敞苕苕寄勝景不覺凌虛上曲􅎉激鮮飈石室有幽響去矣從所欲得失非外奬至哉操斤客重明固已朗五難既灑落超迹絶塵網殷東陽興曯仲文晨遊任所萃悠悠藴真趣雲天亦遼亮時與賞心遇青松挺秀蕚惠色出芳樹極眺清波深湎映石壁素營情無餘滓拂衣釋塵務求仁既自我玄風豈外慕直置忘所宰蕭散得遺慮謝僕射遊覽堒叔原信矣勞物化憂襟未能整薄言遵交衢惣轡出臺省凄凄節序高寥寥心悟永時菊耀巖阿雲霞冠秋嶺眷然惜良辰徘徊踐落景卷舒雖萬緒動復歸有靜曾是迫桑榆歲暮從所秉舟壑不可攀忘情寄匠郢陶徴君田居潛淵明種苗在東臯苗生滿阡陌雖有倚鋤倦濁酒聊自適日暮巾柴車路暗光已夕歸人望煙火稚子候簷隙問君亦何為百年會有役但願桑麻成蠶月得紡績素心正如此開徑望三益謝臨川遊山靈運江海經邅回山矯備盈缺靈境信淹留賞心非徒設平明登雲蜂杳與廬霍絶碧障長周流金潭恆澄徹洞林帶晨霞石壁映𥘉晣乳竇既滴瀝丹井復寥泬嵓萼轉竒秀崟岑還相蔽赤玉隱瑶溪雲錦𬒳沙汭夜聞猩猩啼朝見鼯鼠逝南中氣候暖朱華凌白雪幸遊建德鄉觀竒探禹穴身名竟誰辨圖史終摩滅且泛桂水潮映月遊海澨攝生貴處順將為智者説顔特進侍宴延年延之大微凝帝宇瑶光正神縣揆日粲書史相都麗聞見列漢搆仙宫開天製寶殿桂棟留夏飈蘭橑停冬霰青林結冥𪷟丹巘披蔥蒨山雲備卿藹池卉具靈變重陽集清氛下輦降玄宴鶩望分寰隧曬目盡都甸氣生川嶽隂煙滅淮海見中坐溢朱組步櫩簉瓊辨禮登佇睿情樂闋延皇眄測恩躋愈逸沿牒懵浮賤承榮重兼金巡華過盈瑱敢飾輿人詠方慙渌水薦謝法曹贈别惠連昨發赤亭渚今宿浦陽汭而拙切方作雲峯異豈伊千里別芳塵未歇席零淚猶在𬒮入聲停艫望極浦弭棹岨風雪風雪既經時夜永起懷思泛濫北湖遊苕亭南樓期點翰詠新賞開祑瑩所疑摘芳愛氣馥拾蘂憐色滋色滋畏沃若人事亦消鑠子矜怨勿往谷風誚輕薄共秉延州信無慙仲由諾靈芝望三秀孤雲情所託所託已殷勤祗足攪懷人今行嶀􅌘外銜恩至海濵覿子未僝聚或云覿子杳未僝凝涕在何辰雜珮雖可贈踈華竟無陳無陳心悁勞旅人豈遊遨幸及風雪霽青春滿江臯解纜候前侶還望方鬱陶煙景若離逺末響寄瓊瑶王徴君養疾窈藹瀟湘空翠澗淡無滋寂歷百草晦歘吸鵾雞悲清隂往來逺月華散前墀煉藥曯虛幌泛瑟卧遙帷水碧驗未黷金膏詎能緇北渚有帝子蕩漾不可期悵然山中暮懷痾屬此詩袁太尉從駕淑陽源宫廟禮哀敬枌邑道嚴玄恭潔由明祀肅駕在祈年詔徒登季月戒鳯藻行川雲斾象漢徒宸網擬星懸朱棹麗寒渚金鍐映秋山羽衛藹流景綵吹震沉淵辨詩測京國履籍鑒都廛氓謡響玉律邑頌𬒳丹弦文軫薄桂海聲教燭冰天和惠頒上笏恩渥浹下筵幸侍觀洛後豈慕巡河前服義方無沫展歌殊未宣謝光祿郊遊莊希逸肅舲出郊際徙藥逗江隂翠山方藹藹青浦正沉沉涼葉照沙嶼秋榮冒水潯風散松架險雲鬱石道深靜然鏡綿野四睇亂曾岑氣清知鴈引露華識猿音雲裝信解黻煙駕可辭金始整丹泉術終覿紫芳心行光自容裔無使弱思侵鮑參軍戎行昭明逺豪士枉尺璧宵人重恩光徇義非為利軌羈輕去鄉孟冬郊祀月殺氣起嚴霜戎馬粟不暖軍士氷為漿晨上城臯坂磧礫皆羊腸雲隂籠白日大谷晦蒼蒼息徒稅征駕倚劍臨八荒鷦鵬不能飛玄武伏川梁鎩翮由時至感物聊自傷竪儒守一經未足識行藏休上人怨別惠休湯氏西北秋風至楚客心悠哉日暮碧雲合佳人殊未來露彩方泛艷月華始徘徊寶書為君掩瑶瑟詎能開相思巫山渚悵望陽雲臺膏爐絶沉燎綺席生浮埃桂水日千里因之平生懷悼室人十首佳人永暮矣隱憂遂歷兹寶燭夜無華金鏡晝恆微桐葉生緑水霧天流碧滋蕙弱芳未空蘭深鳥思時湘醽徒有酌意塞不能持適見葉蕭條巳復花菴鬱帳裏春風蕩􅉉前還燕拂垂涕視去景催心向徂物今悲輒流涕昔歡常飄忽幽情一不弭守歎誰能慰夏雲多雜色紅光鑠㽔鮮苒弱屏風草潭拖曲池蓮黛葉鑑深水丹華香碧煙臨綵方自弔攬氣以傷然命知悲不絶恆如注海泉駕言出徑衍兾以滌心胸復值煙雨散清隂帶山濃素沙匝廣岸雄虹冠尖峯出風舞森桂落日曖圓松還結生不念楚客獨無容秋至搗羅紈淚滿未能開風光肅入戶月華為誰來結眉向珠網瀝思視青苔鬢局將成葆帶減不須摧我心若涵煙葐蒀滿中懷窗塵歲時阻閨蕪日夜深流黃夕不織寧聞梭杼音涼藹漂虛座清香蕩空琴蜻引知寂寥蛾飛測幽隂乃抱生死悼豈伊離別心皓皓氣薄暮蔌蔌清衾單階前水光裂樹上雪花團庭鶴哀以立雲雞肅且寒方東有苦淚承夜非膏蘭從此永黯削萱葉焉能寬杼悲情雖滯送往意所知空座幾時設虛帷無久垂暮氣亦何徑嚴風照天涯夢寐無端際敞恍有分離意念每失乖徒見四時虧神女色姱麗乃出巫山湄逶迤羅𬒮下鄣日望所思佳人獨不然戶牖絶錦綦感此增嬋姢屑屑涕自滋清光淡且減低意守空帷二妃麗瀟湘一有乍一無佳人承雲氣無下此幽都當追帝女迹出入泛靈輿奄映金淵側遊豫碧山隅曖然時將罷臨風返故居梁江文通集卷第四
