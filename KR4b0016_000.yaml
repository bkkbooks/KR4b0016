body:
  text: 卷第一恨賦去故鄉賦倡婦自悲賦并序哀千里賦青苔賦并序石劫賦并序水上神女賦泣賦待罪江南思北歸賦別賦蓮華賦并序丹沙可學賦并序卷第二赤虹賦并序四時賦金燈草賦橫吹賦并序扇上綵畫賦傷友人賦并序麗色賦翡翠賦江上之山賦燈賦知己賦并序空青賦學梁王兔園賦并序卷第三侍始安王石頭從征虜始安王道中貽袁常侍就謝主簿宿銅爵妓學魏文帝從冠軍行建平王登廬山香爐峯望荆山步桐臺從建平王遊紀南城秋至懷歸古意報袁功曹度西塞望江上諸山劉僕射東山集寄丘三公陸東海譙山集燈夜和殷長史贈煉丹法和殷長史感春冰遙和謝中書二首無錫縣歷山集無錫舅相送御帝別吳中禮石佛赤亭渚度泉嶠出諸山之頂遷陽亭採石上菖蒲遊黃蘗山還故國傷內弟劉常侍從蕭驃騎新帝壘效阮公詩十五首清思詩五首卷第四惜晚春應劉祕書卧疾怨别劉長史應劉豫章别秋夕納涼奉和採菱郊外望秋答殷博士冬盡難離和丘長史外兵舅夜集當春四韻同王左丞池上酬劉記室雜體三十首序古離別李都尉從軍班婕妤詠扇魏文帝遊宴陳思王贈友劉文學感遇王侍中懷德嵆中散言志阮步兵詠懷張司空離情潘黃門述哀陸平原羇宦左記室詠史張黃門苦雨劉太尉傷亂盧侍郎感交郭弘農遊仙孫廷評雜述許徴君自敘殷東陽興曯謝僕射遊覽陶徴君田居謝臨川逰山顔持進侍宴謝法曹贈別王徴君飬疾袁太尉從駕謝光祿郊遊鮑參軍戎行休上人怨别悼室人十首卷第五袁友人傳報袁叔明書與交友論隱書奏記詣南徐州新安王到主簿日事詣右軍建平王𬒳黜為吳興令辭箋詣建平王到功曹參軍箋詣驃騎竟陵王拜正貟外郎表拜中書郎表卷第六始安王拜征虜將軍丹陽尹章始安王拜征虜將軍南兖州刺史章建平王讓右將軍荆州刺史表建平王拜右衛將軍荆州刺史章建平王散五刑教建平王謝賜石硯等啓建平王謝王環刀等啓建平王慶明帝疾和禮上表建平王慶安城王拜封表建平王聘隱逸教建平王慶改號啓建平王慶少帝登祚章建平王答王太后正位章建平王慶江皇后正位章建平王太妃周氏行狀建平王讓鎮南徐州刺史啓建平王之南徐州刺史辭闕表卷第七勑為朝賢答劉休範書尚書符慰勞雍州文蕭驃騎讓封第二表第三表蕭領軍讓司空并敦勸啓蕭領軍拜侍中刺史章蕭驃騎録尚書事到省表蕭驃騎謝甲仗入殿表蕭驃騎讓豫司二州表蕭驃騎發徐州三五教蕭驃騎上頓表蕭驃騎築新亭壘埋枯骸教蕭驃騎謝𬒳侍中慰勞表蕭驃騎慶平賊表蕭驃騎解嚴輸黃鉞表蕭驃騎讓太尉增封第三表蕭驃騎讓太尉增封表蕭驃騎讓油幢表卷第八蕭太尉上便冝表讓太傅楊州牧表蕭重讓楊州表後讓太傅楊州牧表蕭𬒳侍中敦勸表蕭𬒳尚書敦勸重讓表蕭讓劒履殊禮表蕭拜太尉楊州牧表蕭太尉子姪為領軍江州兖州豫州淮南黃門謝啓蕭太傳謝追贈父祖表蕭太傳東耕教蕭太傳辭輿駕親幸表蕭讓前部羽葆鼓吹表謝開府辟召表蕭上銅鐘芝草衆瑞表卷第九蕭讓太傳相國齊公十郡九錫表第二表𬒳百僚敦勸受表蕭拜相國齊公十郡九錫章蕭相國讓進爵為王第二表蕭相國拜齊王表齊王謝冕旒諸法物表齊王讓禪表遣太使巡詔賜赦交州詔斷募士詔封江冠軍等詔大赦詔北伐詔王僕射為左僕射詔王撫軍為安東吳興詔曲赦丹陽等四郡詔王僕射領太子詹事詔何詹事為吏部尚書詔王侍中為南蠻校尉詔王光祿為征南湘州詔栁僕射為南兖州詔王僕射加兵詔立學詔王鎮軍為中書令右光祿詔張令為太常領國子祭酒詔蕭冠軍進號征虜詔禇侍中為征北長史詔卷第十齊太祖髙皇帝誄宋故尚書左丞孫𬗟墓志文宋故安成王右常侍劉喬墓志文宋故銀青光祿大夫孫敻墓志文齊故御史中丞孫詵墓志文齊故司徒右長史檀超墓志文蕭驃騎祭石頭戰亡文蕭太傳東耕呪文草木頌十五首并序金荆相思豫章栟櫚杉柳楊梅山桃山中石榴木蓮石上菖蒲黃連署預杜若藿香雲山讃四首并序王太子隂長生白雲秦女雜三言五首并序搆象臺訪道經鏡論語恱曲池愛逺山應謝主簿騷體劉僕射東山集學騷山中椘辭六首自序梁江文通集目録
