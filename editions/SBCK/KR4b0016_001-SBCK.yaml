body:
  text: 賦恨賦試望平原蔓草縈骨拱木歛䰟人生到此天道寧論於是僕本恨人心驚不已直念古者伏恨而死假如秦帝按劒諸侯西馳削平天下同文共規華山爲城紫淵爲池雄圖旣溢武力未畢方架黿鼉以爲梁廵海右以送日一旦䰟斷宫車晩出􅀂廼趙王旣虜遷於房陵薄暮心動昧旦神興别艶􅁎與美女䘮金輿及玉乗置酒欲飲悲來填膺千秋萬歳爲恨難勝至如李君降北名辱身􅁈抜劒擊柱弔影慙䰟情徃上郡心存鴈門烈帛繫書誓還漢恩朝露溘至握手何言􅀂夫明妃去時仰天太息紫臺稍逺關山無極揺風忽起白日西匿隴鴈少飛岱雲寡色望君王􅀆何期終蕪絶􅀆異域至乃敬通見抵罷歸田里閉關却掃塞門不仕左對孺人顧弄稚子脫略公􅀸跌宕文史齎志没地長懷無已及夫中散下獄神氣激揚濁醪夕引素琴晨張秋日蕭索浮雲無光鬱青霞之竒意入脩夜之不陽或有􅀌臣危涕孽子墜心遷客海上流戍隴隂此人但聞悲風䫻起泣下霑􅁭亦復含酸茹歎銷落湮沉􅀂乃􅀐疊迹車屯􅁤黃塵匝地歌吹四起無不煙斷火絶閉骨泉裏已矣哉春草暮􅀆秋風驚秋風罷􅀆春草生綺羅畢􅀆池舘盡琴瑟滅􅀆丘壟平自古皆有死莫不飲恨而吞聲去故鄕賦日色暮􅀆隱吳山之丘􅇕北風㭊􅀆絳花落流水散􅀆翠􅶼踈愛桂枝而不見悵浮雲而離居廼凌大壑越滄淵沄沄積􅤆水橫斷山窮隂匝海平蕪帶天於是泣故􅀜之已盡傷故國之無際出汀州而解冠入溆浦而􅂢視協韻聽蒹葭之蕭瑟知霜露之流滯對江皐而自憂弔海濵而傷歳撫尺書而無恱􅀝樽酒而不持去室宇而逺客遵蘆葦以爲期情嬋娟而未罷愁爛漫而方滋切趙瑟以橫涕吟燕笳而坐悲少歌曰芳洲之草行欲暮桂水之波不可渡絶丗獨立􅀆報君子之一顧是時霜翦蕙􅀆風摧芷平原晩􅀆黃雲起寧歸骨於松栢不買名於城市若濟河無梁􅀆沉此心於千里重曰江南之杜蘅􅀆色以陳願使黃鵠􅀆報佳人橫羽觴而淹望撫玉琴􅀆何親瞻層山而蔽日流餘涕以沾巾恐髙臺之易晏與螻蟻而爲塵倡婦自悲賦并序漢有其録而亡其文泣蕙草之飄落憐佳人之埋暮廼爲辭焉粤自趙東來舞漢宫瑶序金陳桂枝嬌風素壁翠樓明月徒秋謌聲忽散傷人復愁君王更衣露色未稀侍青鑾以雲聳夾丹輦以霞飛願南山之無􅂩指壽陵以同歸俄而緑衣坐奪白華卧進屑骨不憐抵金誰􅈔九重已關髙門自蕪青苔積􅀆銀閣澁網羅生􅀆玉梯虚度九冬而廓處遥十秋以分居傷營魂之已盡畏松栢之無餘歸故鄕之末光實夫君之晩滋去栢梁以淹袂出桂苑而歛眉視朱殿以再暮撫嬪華而一疑於是怨帝關之遂岨悵平原之何極霜繞衣而葭冷風飄輪而景􅉴御思趙而不顧馬懷燕而未息泣逺山之異峯望浮雲之雜色􅀂使明鏡前􅀆碎􅀌鴈之錦翼廼爲詩曰曲臺歌未徒黃壤哭已親玉玦歸無色羅衣㑹成塵驕才雄力君何怨徒念薄命之苦辛哀千里賦蕭蕭江隂􅀆荆山之岑北繞瑯琊碣石南馳九疑桂林山則異嶺竒峯橫嶼帶江雜樹億尺紅霞萬重水則逺天相逼浮雲共色沄沄無底溶溶不測其中險如孟門豁􅀂長河參差巨石縱橫􅀛鼉若乃夏后未鑿秦皇未闢㟻岩生岸迆􅆔成迹馳湍走浪漂沙擊石伊孟冬之初立出首夏以歸來自出國而辭友永懷慕而抱哀魂終朝以三奪心一夜而九摧徒望悲其何及銘此恨於黃埃於時鴻鴈旣鳴秋光亦窮水黯黯􅀆蓮葉動山蒼蒼􅀆樹色紅思雲車兮沅北望蜺裳􅀆澧東惜重華之已没念芳草之坐空旣而悄愴成憂憫黙自憐信規行之未曠知矩歩之已難雖河北之爽塏猶橘柚之不遷及年歲之未晏願匡坐於覇山青苔賦并序余鑿山楹爲室有苔焉意之所之故爲是作云嗟青苔之依依􅀆無色􅀋而可方必居閑而就寂以幽意之深傷故其處石則松栝交隂泉雨長注絶磵俯視崩壁仰顧悲凹嶮􅀆唯流水而馳騖遂能﨑屈上生班駮下布異人貴其貞精道士恱其廻趣咀松屑以高想捧丹經而永慕􅀂其在水則鏡帶湖沼錦匝池林春塘秀色陽烏好隂青郊未謝􅀆白日照路貫千里􅀆綠草深廼生水而揺蕩遂出波而沉􅁋假青條􅀆捴翠借黃花􅀆舒金遊梁之客徒馬疲而不能去兎園之女雖蚕飢而不自禁至於脩臺廣廡幽閤閑楹流黃以織琴瑟且鳴户牖秘􅀆不可見履􅃑動􅀆覺人聲廼蕪階翠地繞壁􅀧墻春禽忠􅀆蘭莖紫秋蟲吟􅀆蕙實黃晝遥遥而不暮夜永永以空長零露下􅀆在梧楸有美一人􅀆欷以傷若廼崩隍十仞毀冢萬年當其志力雄俊才圖驕堅錦衣被地鞍馬耀天淇上相送江南採蓮妖童出鄭美女生燕而頓死艶氣於一旦埋玉玦於窮泉寂􅀆如何苔積網羅視青蘪之杳杳痛百代􅀆恨多故其所􅍗必感所感必哀哀以情起感以怨來魂慮斷絶精念徘􅆦者也彼木蘭與豫章旣中繩而獲夭及薜荔與蘪蕪又懷芬而見表至哉青苔之無用吾孰知其多少石刼賦并序海人有食石刼一名紫􅡖蚌蛤􅀋也春而發華有足異者戲書爲短賦我海􅀂之小臣具品色於滄溟旣鑪天而銅物亦噏化而染靈比文豹而無恤方珠蛤而自寧兾湖濤之蔽迹願洲渚以淪形故其所廵左委羽右窮髮日照水而東昇山出波而隱没光避伏而不耀智埋􅁳而難發何弱命之不禁遂永至於夭閼已矣哉請去海人之仄陋充公子之嘉客儻委身於玉盤從風􅀨而可惜水上神女賦江上丈人遊宦荆吳首衞國望燕途歷秦􅀜出宋都遍覽下蔡之女具恱淇上之妹未有粉白黛黒􅀑神之所無也廼造南中渡炎洲逕玉磵越金流路逶迤而無軌野忽漭而尠儔山反覆而叅錯氷澆灌而縈薄石五采而橫峯雲千色而承蕚日炯炯而舒光雨屑屑而稍落紫莖繞逕始叅差紅荷縁水纔灼爍忽而精飛視亂意走心移綺靡菱蓋悵望黃枝一麗女􅀆碧渚之崖曖曖也非雲非霧如烟如霞諸光諸色雜卉雜華的的也􅁚珪􅁚璧若虚􅀂實綾錦共文瑶貝合質逐乃紅唇冩朱真眉學月美目艶起秀色爛發窈窕暫見偃蹇還没冶異絶俗竒麗不常青娥羞艶素女慙光􅀏李后於漢主耻西施於越王神飜覆而愉恱志離合而感傷女遂俯整玉軼仰肅金鑣或採丹葉或拾翠條守明璣而爲誓解琅玕而相要情乍合而還散色半親而復嬌聳軿車於水際亭雲霓於山椒奄人祇之仿像共光氣而寂寥於時也綵霞繞繞􅀸雲縵縵石瓊文而翕赩山龍鱗而炤爛苔緑根而攅集草紅葩而舒散日炫晃以朧光樹葳㽔而䓗粲無西海之浩蕩見􅀂木之千㝷非丹山之赫㬢聞琴瑟之空音理洞徹於俗聽物驚恠於丗心恨精影之不滯悼光晷之難惜閱有無於俄頃驗變化於咫尺視空同而失貌察倐忽而亡迹野田田而虚翠水湛湛而空碧廼唱桂櫂凌衝波背橘浦向椒阿硉矹木石洪漭蛟鼉顧御僕而情饒廵左右而怨多弔石渚而一欷悵沙洲而少歌茍懸天􅀆有命永離决􅀆若何退以爲妙聲無形竒色非質麗於嬪嬙精於琴瑟㝷漢女而空佩觀清角而無疋嬪楊不足聞知􅇪牙焉能委悉何如明月之忌􅀇雲秋露之慙白日愁知形有之留滯非英靈之所要術也泣賦秋日之光流􅀆以傷霧離披而殺草風清泠而繞堂視左右而不臑具衣冠而自涼黙而登高谷坐景山􅀝桐栢對石泉直視百里處處秋烟閴寂以思情緒留連江之永矣蓮欲紅南有喬木葉以窮心􅀩􅀩􅀆恍惚魄漫漫􅀆西東詠河兖之故俗眷徐楊之遺風眷徐楊􅀆阻􅀜梁詠河兖􅀆路未央道尺折而寸斷䰟十逝而九傷欷潺湲􅀆沬䄂泣嗚唈􅀆染裳若夫景公齊山荆􅀸燕市孟甞聞琴馬遷廢史少􅀸悼躬夷甫傷子皆泣緒如絲詎能仰視鏡終古而若斯况余輩情之所使哉待罪江南思北歸賦伊小人之簿􅇊奉君子而輸力接河漢之雄才擥日月之英色絶雲氣而厲響􅀒青天而撫翼德􅀍命而不渝恩潤身而無極何䂓矩之守任信愚陋而不肖愧金碧之琳瑯慙丹艧之照曜樊天綱而自離徒夜分而誰弔遭大道之隆盛雖草木而勿履誤銜造於逺國出顛沛之願始去三輔之臺殿辭五都之城市惟江南􅀆丘墟遥萬里􅀆長蕪帶封狐􅀆上景連雄虺􅀆蒼梧當青春而離散方仲冬而遂徂寒蒹葭於余馬傷霧露於農夫跨金峯與翠鑾渉桂水與碧湍雲清泠而多緒風蕭條而無端猨之吟􅀆日光逈􅎜之啼􅀆月色寒究烟霞之繚繞具林石之㠝岏於是臨虹蜺以築室鑿山楹以爲柱上暠暠以臨月下􅁋􅁋而愁雨奔水潦於逺谷汩木石於深嶼鷹隼戰而櫓巢黿鼉佈而穴處􅀂季冬之嚴月風揺木而騷屑􅀇雲合而爲凍黃烟起而成雪虎踡跼而斂歩蛟􅇪尼而失穴至江籬􅀆始秀或杜衡􅀆􅀄滋桂含香􅀆作葉藕生蓮􅀆吐絲俯金波􅀆百丈見碧沙􅀆來往霧葐蒀􅀆半出雲雜錯􅀆飛上石炤爛􅀆各色峯近逺􅀆異􅁚及廻風之揺蕙天潭潭而下露木蕭梢而可哀草林離而欲暮夜燈光之寥逈歷隱憂而不去心湯湯而誰告魄寂寂而何語情枯槁而不反神飜覆而亡據夫以雄才不丗之主猶儲精於沛鄕竒略獨出之君尚婉戀於樊陽潘去洛而掩涕陸出吳而增傷况北州之賤士爲炎土之流人共魍魎而相偶與蠨蛸而爲鄰秋露下􅀆􅀧劒舄青苔生􅀆綴衣巾歩庭廡􅀆多蒿􅁄顧左右􅀆絶親賔憂而塡骨思􅀆亂神願歸靈於上國雖坎軻而不惜身别賦黯然銷䰟者唯别而已矣况秦吳􅀆絶國復燕宋􅀆千里或春苔􅀆始生乍秋風􅀆暫起是以行子腸斷百感悽惻風蕭蕭而異響雲漫漫而竒色舟凝滯於水濵車逶迤於山側棹容與而詎前馬寒鳴而不息掩金觴而誰御橫玉筯而沾軾居人愁卧脫􅀂有亡日下壁而沉彩月上軒而飛光見紅蘭之受露望青楸之罹霜廵層楹而空掩撫錦幕以虚凉知離夢之躑躅意別䰟之飛楊故别雖一緒事乃萬族至若龍馬銀鞍朱軒繡軸悵飲東都送客金谷琴羽張􅀆簫鼔陳燕趙歌􅀆傷美人珠與玉􅀆艶暮秋羅與綺􅀆嬌上春驚駟馬之素沬聳淵魚之赤鱗造擕手而衘涕各寂寞而傷神乃有劒客慙恩少年報士韓國趙厠吳宫燕市割慈忍愛離􅀖去里瀝泣共訣刎血相視驅征馬而不觀見行塵之時起方銜感於一劒非買價於泉裏金石震而色變骨肉悲而心死或乃邊郡未和􅀒羽從軍遼水無極鴈山􅃤雲閨中風暖陌上草薫日出天而耀景露下地而騰文鏡朱塵之炤爛襲青氣之烟煴攀桃李􅀆不忍別送愛子􅀆沾羅裙至如一赴絶國詎相見期視喬木􅀆故里訣北梁􅀆永辭顧左右􅀆魄動視親賔􅀆淚滋可班荆􅀆増恨唯樽酒􅀆敘悲值秋鴈􅀆飛日當白露􅀆下時怨復怨􅀆逺山曲去復去􅀆長河湄又若君居淄右妾家河陽同瓊珮之晨照共金鑪之夕香君結綬􅀆千里惜瑶草之徒芳慙幽宫之琴瑟晦高臺之流黃春閨閟此青苔色秋帳含兹明月光夏簟青􅀆晝不暮冬缸凝􅀆夜何長織錦曲􅀆泣已盡廻文詩􅀆影獨傷儻有華隂上士服食還仙術將妙而猶學道巳寂而未傳守丹竈而不顧錬金鼎而方堅駕鶴上漢驂鸞騰天暫遊萬里少別千年惟丗間􅀆重別謝主人􅀆依然下有芍藥之詩佳人之歌桑中衞女上宫陳娥春草碧色春水渌波送君南浦傷如之何乃至秋露如珠秋月如珪明月白露􅀆隂景徃來與子之別思心徘徊是以別方不定別理千名有別必怨有怨必盈使人意奪神駭心折骨驚雖淵雲之墨妙嚴樂之筆精金閨之諸彦蘭臺之群英賦有凌雲之稱辨有雕龍之聲詎能摹暫離之狀冩永訣之情者乎蓮華賦并序余有蓮華一池愛之如金宇宙之麗難息絶氣􅂓書竹素儻不滅焉撿水陸之具品閱山海之異名珍爾秀之不定乃天地之精英殖東國之流詠出西極而擅名方翠羽而結葉比碧石而爲莖蘂金光而絶色藕冰拆而玉清載紅蓮以吐秀披絳華以舒英故香氛感俗淑氣叅靈躑躅人丗茵蒀祗􅁳青桂羞烈沉水慙馨於是生乎澤陂出乎江隂見綵霞之夕照覿雕雲之晝臨旣翕赩於洲漲亦映曖於川潯奪夜月及熒光掩朝日與赩火出金沙而延曜􅀍渌波而覃拖冠百草而絶群出異􅀋之衆夥故仙聖傳圖英隱流記一爲道沴二爲丗瑞發靑蓮於王宮驗竒花於陸地若其江淡澤芬則照電爍日池光沼緑則明璧洞室矅長洲而瓊文映青崖而火質或慿天淵之清峭或殖䟽圃之􅀩密故河北櫂歌之姝江南採菱之女春水厲􅀆楫潺湲秋風駃􅀆舟容與著縹芰􅀆出波擥緗蓮􅀆映渚迎佳人􅀆北燕送上客􅀆南楚知荷華之將晏惜玉手之空佇廼爲謡曰秋鴈度􅀆芳草殘琴柱急􅀆江上寒願一見􅀆道我意千里逺􅀆長路難若其華實各名根葉異辭旣號芙渠亦曰澤芝麗詠楚賦艶歌陳詩非獨瑞草爰兼上藥味靈丹沙氣驗青㬦乃可棄劒海岫龍舉雲蕚􅀞臺殿􅀆霞蔚圖縑縞􅀆炳爍永含靈於洲渚長不絶􅀆川壑丹沙可學賦并序咸曰金不可鑄僕不信也試爲此辭精思云爾惟雲塲之少折乃人逕之多憂雖瑶笙及金瑟雜翠帳與丹幬吞悲欣於得失銜哀樂於春秋煥如星絶黯如火滅星絶難光火滅可傷故從師而問道兾幽路之或晹測神宗之無緩踐雲根之不賖信名山及石室驗青傾與丹沙撝五難之重滯擥九仙之輕華故抱魄寂處凝神空居泯邈深晝窈鬱重虚覘炫燿而可見聽沉寥而有餘於是乗河漢之光氣􅀐烈星之綵色輟隂陽於形有傅變化於心識浮恍惚而無涯泛靈恠而未極架日月之精照騫蛟龍之毛翼遂乃氣穆肅而神奔骨窈窈而􅀑恠綴葳蕤而成冠􅀧雜錯而爲珮出􅊺泣而遐鶩貫􅄥鴻而上厲鳳之來􅀆蔽日鸞之集􅀆爲群左昆吾之炎景右崦嵫之􅀸雲爛七采之炤燿漫五色之煴烟非丗俗之質見焉􅀑神之甞聞旣而曖碧臺之錯落燿金宫之玲瓏幻蓮華於繡闥化蒲桃於錦屏赩丹光而電烻䬃翠氛而杳􅁳軒僘惘於􅁈虹階侘際於奔鯨惑龍宫之殿稱迷忉利之宫名故靈偃蹇􅀆姣服女嬋姢􅀆可觀秀青色之泯靡熳美目之波瀾襞日月之纂組襲星􅀫之羅紈百味酒􅀆靈之集河供鯉􅀆靈之安却文甫之玉質􅀏陳王之妙顔所以樂精􅀇於太一妙宫徴於清都簫含聲而逺近琴吐音而有無奏神鼓於玉􅃑舞靈衣於金􅅂韻躑躅而易變律參差而難圖非南風之能擬詎濮水之可摹於是流瀁不一遨曹無邊娥眉旣散鍾鼓都􅂢乗綵霞於西海駟行雨於丹淵山差池而鏡壑水清明而抱天山含玉以永歲水藏珪以窮年擬􅀂木以冩意拾瑶草而悠然遂乃凝虚飲一守仙閉方智寂術盡魄兀心亡白生不能􅀜其􅀃惠子無以挫其芒源其耻市朝之失道疾讒嬖之不祥却文綵之媱冶去利劒之鏗鎗懅生死於半氣惜百年於一光故以鑄金爲器丹沙爲漿慙􅈔旣盡妖怨當忘吾師以爲可學而公子謂之不良歟靈丘竹賦登﨑嶇之碧巘入朱宫之玲瓏臨曲江之廻盪望南山之䓗青鬱奉華之石岸赩夏彩於沙汀逺亘紫林祕埜近匝玉苑禁垌於是緑筠繞岫翠篁緜嶺參差黛色陸離紺影上謐謐而留間下微微而停靖􅀩朱霞之丹氣曖白日之素景故非英非蘂非香非馥而珍跨仙草寳踰靈木夾池水而檀栾繞園塘而橚植旣間霜而無凋亦中暑而增肅毎冠名於華戎將擅竒於水陸况有朝雲之舘行雨之宫窓崢嶸而緑色戶踟蹰而臨空綺䟽蔽而停日朱簾􅄏而留風􅀍􅌲簵之窈蔚結篠蕩之溟􅄥或産鳷鵲之右或居寒露之東此皆金輿之所出入瑶輦之所周通梁江文通文集卷第一江文通文集校補烏程蔣氏密韻樓藏明翻宋書棚本江文通集中有校補蓋馮己蒼依元人鈔本手校而葉石君過錄者也明刻亦源於宋豈明人校刻不免竄改致失其眞歟今迻錄校語附於卷後江集當以此爲致佳之本矣庚申六月無錫孫毓修記卷一倡婦思悲賦露色未晞稀哀千里賦嶄㟻岩生岸靑苔賦春禽思忠兮水上神女賦日炯炯而光舒舒光待罪江南思北歸賦寒蕪蒹葭于余馬涉桂水與􅇥碧湍鷹隼戰而橧櫓巢蛟夔尼而共失穴共魍魎而相偶偶作憂而塡谷骨丹砂可學賦騎烈列星之綵色骨􅆼窕窈而見怪却交文甫之玉質卷二赤虹賦騎傅稟傳說之一星金燈草賦紫縈榮晨光橫吹賦赤赮紫駮至于貝胄具曹􅁚弭之威傷友人賦庶同嵇尙駕從篤徒之哀握隨隋珠而比麗卜十圖兮炤籍信朝口之徒􅉴昊擥覽秋實於西苑貴楊蕤􅺙於後烈麗色賦露霧辭楚而容裔莫不輟鏡徙徒倚春蠶度繭網不覿觀其容江上之山賦巖岍兮穴空鑿亦緯繙繣而已遷雖不敏而無操懆空靑賦䃕確磪堅英卷三就謝主簿宿北風縹漂夜色寧濕阻岨雲梁燈夜和殷長史客子依仿永夜感春冰遙和謝中書流瀾爛新光生暮意歌上春眷遊黃蘖山殘屼㞦十代木還故國請學碧山草靈萆傷内弟劉常侍蘭杜社信嘉名從蕭驃騎新亭帝壘卷四惜晚春應劉秘書玉瀝歷乃共酌應劉豫章別裂分分郊外望秋答殷博士雲稍精無永滯冬盡難離和丘長史山川吐幽氣當春四韻同左丞刻左上僅空一字淡烟漾璇景班媫妤好詠扇王侍中懷德崤函蕩丘墟阮步兵詠懷飄飄可終年極張黃門苦雨有渰弇興春節盧侍郞感交勉􅊵力在無逸許徵君自序苕苕寄意勝勝景謝臨川遊山山嶠矯備盈缺幸遊見建德鄕謝法曹贈別子衿矜怨勿往凝睇涕在何辰王徵君養疾微刻本無微字鮑參軍戎行執軌覊輕去鄕悼室人十首湘醽徒有約酌漱漱䔩蓛淸衾單卷五報袁叔明書平原彯影色與交友論隱書而飄彯然十載此空格在輒被語句下刻空三格心頑質堅頑校作性斂眉骨折奏記詣南徐州新安王長匱芹斤藻之德到主簿日事詣右軍建平王從後軍車於河楚竟不能曜丹臒雘被黜爲吳興令辭牋詣建平王山川間聞之詣建平王上書隱於簾篇肆之間昔上將之恥絳降侯到功曹參軍牋詣驃騎竟陵王旣乏之脩短之術馳淄澠繩之幣身蒙靑雘㬦拜正員外郞表由學末未徒奉春役丹殿卷六始安王拜征虜將軍丹陽平章爽泗元鈔空四格無此二字始安王拜征虜將軍南兗州刺史章職右南刻脫建平王拜右衞將軍荆州刺史章祇祑漳土士建平王謝賜石硯視等啟建平王慶改號啟旣覯昭招晨建平王慶江皇后正位章翬翠珩炤品黎玄滲湊仁建平王讓鎭南徐州刺史啓頻瀉四析折卷七勑爲朝賢答劉休範書道鬱刻本脫終尙書符喑嗚則别左右激電投救命軍門皦激然無二蕭領軍讓司空幷敦勸啓蕭領軍拜侍中刺史章此二篇馮氏云元鈔本失落未校蕭驃騎上頓表親駕悚悚蕭驃騎築新亭壘埋枯骸教並爲收改蕭驃騎讓太尉増封第三表未嘗不麗選刻本脫台吳鄧之盛功中原源久蕪卷八蕭太尉上便宜表管君晏之制書約性撝僞操思裁奢奓忲太讓太傅揚州牧表祗畏險驗盛刻本脫凝煙露之潤蕭重讓揚州表乃假翼於皇極管庫之寮家寂寞尙㨿晦撓橈臣實空懦儒蕭被侍中敦勸表巡今令逾疑視聽敬其炎貴蕭被尙書敦勸重讓表燈燼罕空舉蕭讓劍履殊禮表且今令所慮受蕭拜太尉揚州牧表而神居寂阻寧班衮司之上臣績不炤刻脫蕭大尉子姪爲領軍江州兗州豫州淮南黃門謝啟臣頻結崇寵籠蕭太傅謝追贈父祖表星􅉴日不追澤演慶丹刻慶字下有世字謙刻本脫請靡諒蕭太傅東耕教產殷刻作絃縣蕭太傅辭輿馬駕親幸表刻作紫靑變禮蕭讓前部羽葆鼔吹表常䘖刻作燿謝開府辟召表臣府自辟刻作僚賢刻作賓資山東之英旣乖刻作覆業蕭上銅鍾芝草衆瑞表炳柄據有徵刻本脫東太守臣朏腦解所統武進令臣刻作紀法宗卷九蕭讓太傅相國齊公十郡九錫表秬鬯彤弓第二表恃險與輿馬具曰日遺氓被百僚敦勸受表諸侯方放命伊摯叔旦且之爵呂牙申伯明之賞齊王謝冕旒諸法物表光先宅曲阜粉枌璽爭輝遣大使巡詔若無津際漈斷募士詔且旦滋長逋逸封江冠軍等詔皆績繢幹兩宣謐抄無此字北伐詔無勞遂遠兵駱驛繼旣進肅淸河洛路曲赦丹陽等四郡詔昧旦且求政王光祿爲征南湘州詔冲素之刻脫褚侍中爲征北長史詔思懷淹掩暢卷十齊太祖高皇帝誄叫怨然靑墀街號燿盛國圖方匿匱淫祀若旍瀉家提國襄衍文任卷文武陰圖食昴昂樊稚斵櫬彼皇維玄英最節宋故尙書左丞孫緬墓誌文齊影儒口喆宋故安成王右常侍劉喬墓誌文雲意霜拍美懋徒鐫蕭太傅東耕祝呪文山桃引露霧如電白雲蕭簫瑟玉池上秦泰女搆􅁚臺流梵音兮至南案溟訪道經信若人兮先覺鏡論語憲嬀禹而折法山中楚辭欷㳂油川流帶石兮蔽日白魂兮歸來抄本魂字上空三格牲出入歌辭山中楚辭下祝詳史具禮備樂荐有牲在陳有鼓在懸騰燭􅁚星奔水􅀋電郊燎速駕馭彼乘駽以伺質明以佇神宴薦豆呈毛血歌辭時恭時祀有物有則伊我上聖實挹明德犧􅁚交陳鬱尊四塞黍唯嘉穀酒唯玄默薦通蒼祗慶覃黎黑願靈之降祚家佑國奏宣列之樂歌辭殷崇配天界尊明祀瑞合汾陰慶同泰畤靑幕雲舒丹殿霞起二曜維新五精吿始于以享之景福是履江文通集後序余先人避地蕭山因而老焉視蕭山不啻桑梓也所居之東一里許曰江寺蓋梁左衞將軍文通別業其子昭玄捨爲浮屠前有夢筆橋乃後人想像其陳迹爲之文不足徵殆千年矣頃歲余領國子學閱崇文閣舊書得江文通集欣然曰夢筆之驗其在是乎錄以示僧有成輩咸願刻之以傳余按文通濟陽考城人今考城已不知有文通矣唯蕭山故居獨存毋乃文通爲東海郡丞或吳興令時往來所寓耶逸事寥寥不可考矣然名藍上人猶能追慕前脩紀錄製作爲可尙已自今潘水之涘豈無懷錦韜筆褒然文鳴者出焉則文通過化餘澤久而益溥亦有成諸同袍樂善之著也工吿訖功謹誌于左至正四年良月初吉中大夫蘄州路總管兼管内勸農事趙翁跋戊子秋仲之晦初得元人抄本至季秋之十二日始校完元本多樂府三章此本不知何以删去而元本所缺此本又以意塡增文理荒悖可笑今盡之凡者元本所無也旁注者元本如而文可兩通者也孱守老人旁注字今未過錄銅劍讚一卷梁江淹撰永明初始造舊宮鑿東北之地皆平岡迤隴尤多古冢墓有人得銅劍長尺五寸余旣借看歎其古異客有謂余曰古時乃以銅爲兵乎其可得而聞不余笑而應曰此證據甚多殆不俟言卿旣欲知輒具言之余按山海經曰昆吾之山其上多赤銅郭璞注曰此山出金如火以之切玉如割泥也周穆王時西戎獻之尸子所爲昆吾之劍也越絕書曰赤墐之山破而出錫若邪之谿涸而出銅歐冶鑄以爲純鉤之劍又汲冡中得一銅劍長三尺五及今所記干將者亦皆非鐵明古者以銅錫爲兵器也周書稱穆王時征犬戎得昆吾之劍火浣布長尺有咫又有鍊銅赤刀割玉如泥焉又左傳僖公十八年鄭伯始朝于楚楚賜之金旣而悔之盟曰無以鑄兵故以鑄三種杜預注云楚金利故也古者以銅爲兵故禹貢云荆揚貢金三品余以爲古者語質而難解今者語文而又了獨詩云元􅀛􅁚齒其實􅁚牙也書曰厥包橘柚乃黃柑也金品上則黃中則赤下則黑黑金是鐵赤金是銅黃金是金黃金可爲寶赤金可爲兵黑金可爲器韓子稱昔智伯繇之伐趙襄子初晉陽襄子金將盡問於張孟談孟談對曰吾聞董安于治晉陽也公室悉以銅爲柱質君可發而用之於是發之有餘金矣謂此據蓋可知焉又昔夏后氏使九牧貢金鑄九鼎於荆山之下于昆吾氏之墟白若甘攙之地圖其山川奇怪以形於鼎使民知神姦不逢其害以定其祥鼎成三足而方不炊而自沸不舁而自藏不遷而自行九鼎旣成定之國都桀有昏德鼎遷於商殷紂暴虐鼎遷於周每人主休明鼎雖小而重其姦回昏亂雖大而輕及周顯王三十二年姬德大衰乃淪入泗水秦始皇之初見於彭城二十七年始皇東遊大發徒出之而不能得焉後漢武帝賓禮百神于汾陰得大鼎時人以爲九鼎其詳不可得而審也且荆軻刺秦王之日七首擊銅柱銅柱火出則古者非􅀡以銅爲七首亦以爲殿柱也且始王之世長狄十二見於臨洮身長三丈足跡六尺於是始皇斂天下之兵鑄而􅁚之故西京賦云高門有閌列坐金狄是也又造阿房之宮其門悉用鎡石鎡石噏鐵以防外兵之入焉以此推之明知春秋迄於戰國戰國至於秦時攻爭紛亂兵革互興銅旣不充給故以鐵足之鑄銅旣難求鐵甚易是故銅兵轉少鐵兵轉多年甚一年歲甚一歲漸染流遷遂成風俗所以鐵工比肩而銅工稍絕二漢之世逾見其微及漢建安二十四年魏文帝爲太子時鑄三寶刀二七首天下百鍊之精利而悉是鑄鐵不能復鑄銅矣按張華博物志亦稱鑄銅之工不復可得唯蜀地羌中時有解者由此言之斯妙久絕余謂不復能鑄銅者正當不能使利如霜雪光似雲霞陸斬犀兜水斷蛟龍豈復不能鑄銅鑪鋺燈耶然今太極殿前兩大銅鏡卽周景王鑄也製作精巧獨絕晚世今之作必不及古猶今鏡不及古鏡今鐘不及古鐘矣昔余爲吳興令鑿池又獲銅箭鏑數十枚時有人復於彼山中伐木得銅斧一口古銅鑄爲兵豈爲一據故備言其詳以發子之蒙矣古貴銅賤銅非獨此事按皇覽帝王冢墓記稱吳王闔閭冢銅槨三重汞池六尺玉鳧之流扁諸之劍三盤郢魚腸之劍在焉秦始皇冢亦以銅槨水銀爲江河關東賊發之至銅槨而取銅深大不可多得因此穴塞漢陳思王冢時奢侈皆生葬取愛幸奴婢蓄穀爲銅窗以通殉葬者氣息兼以水火守冢給呼召數十年乃不復聞聲矣晚世之葬無復此例然猶自大奢大富大盛或傾一國之財或竭一家之寶或爭爲宏麗或競相高尙前漢奢於後漢魏時富於晉世中原旣夷至於江左時天下凋喪制度日衰富貴之家猶或厚葬然論古論曩亦減損千萬倍矣世愈貧狹哀禮愈薄又往古之事棺皆不用釘悉用細腰其細腰之法長七寸廣三寸厚二寸五分狀如木秤兩頭大而中央小仍鑿棺際而安之因普漆其外一棺凡用細腰五十四枚大略如此亦可謂至巧矣其法旣絕亦有銅釘銅釘之體皆如今柘釘形也銅釘旣滑多被發掘自義熙以來乃以柘代銅爰及明器之屬亦多減省必不得已乃用烏牙焉相與皆用素棺不得施漆及自棺之外一無所設旣由貧富之懸兼以避患之及耳故爲此讚以明古今銅鐵之兵忍刃葬送之事焉乃成讚曰悠悠開闢或聖或賢蚩尤鑄銅爲兵幾年天生五才實此爲先旣古旣曩誰測誰傳紛綸百代事無不異况迺金鐵國之利器風胡專精歐冶妙思於昔則出於今則祕聞之釋經萬物澹薄在古必厚在今必惡徒侈徒異徒鏟徒削聊舉一槪以明鴻略右銅劍讚一卷陳留靑雲寺伯宇記康熙二年仲春望後五日孫凱之示余校正本對錄孫本係故友馮已蒼所藏從元抄本校者也其銅劍讚馮以意附之耳馮遭酷令所誅書籍盡散今見其書如見故人不勝悵歎云南陽葉石君記
