front:
  text: 梁江文通集卷第六
  hash: sha256:b6388a8e69874369c61713671795182e48f83d093ea4a2ca2839583f2e1b9242
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4b0016_SBCK_006-1a}
body:
  text: 始安王拜征虜將軍丹陽尹章旣耀軒禮􅉼蕤龔恩爽泗􅌤黙中謝臣少識猶晦哀辛方襲藉以毓采上霄搏華中漢飲惠延光偭爵假息不悟瑶離降映繩河低文遂翊言􅀜禁徒弟京部進憲􅀩淺塵紊徒盈還迷懅悚風製罔􅀣循伏憂欷滅虜燋衷不勝荷佩之情始安王拜征虜將軍南兖州刺史章絢服騰炤懋冊凝芬夤對迷墜慙泣交集中謝臣職右南謝蒲鞭之政任重臨淄無遣獄之化自分金帝􅀜叅風尹訟璧緯裁復圭露詎淹不悟旻靈拂采霄景汰色復交書河楚置傳江吳環章清潤旂文肅路寵艶内維榮炫外圉方梗名慮有陋莩識沖生􅌤氣安以輸謝不勝荒震屏營之情建平王讓右將軍荆州刺史表茂寵廼臨炫奪彛典廵恩鏡飾攪情震慮中謝臣聞該秩詔序匪賢莫能孚其職端維裂陜非功無或濫其選所以輪鞅國典締結民紐五威咸平四精或訓者也臣踐行迷方試業敝緒徒以綴采宗莩承渥帝席執圭戴筆亟荷岀内至乃曵組河縣蔑馴羽之化鳴環京轂謝擇鱗之政聲績兩無風化􅀟缺而􅀛紐未剔璽書頻降復改􅁽湘區分瑞衡服競無賈琮交部之廉終乏郭伋并壤之信固以􅁩沓民明湫隘身諷不悟皇靈再煇河海重渥遂踰恒采妄賁異等荆門務要方城任積水交沅灃山通岷峨􅁭帶百縣縈抱七州上德懋勲尠居斯地寧臣膠所冝膺荷是以燋薄䰟色驚迫心影謹刷睿情置露弱志伏願陛下停旒弛琪暫炤􅃈曲則鑄才式􅀪練物惟逺王度旣清􅀩識以㤗不勝慙懅屏營之情建平王拜右衛將軍荆州刺史章珪冊停徽車旗寫曜襲禮炫􅂨迎恩震色中謝臣聞爵以能委命以績降亦有􅀇雲結吹襃成燻之厚朱箱累轍崇試宰之高而臣紐組頒守要玉備政績廢江區聲隘河部浮榮曠年叨光賖日諒以具察輿歌取鏡民誚不悟皇德至凝亭物帷幄復使承官楚封祗祑漳士任班河兾事亞崤陜橫術輻湊殷氓訟積寧曰明哲疇尅勝􅀉雖瀝丹局終懼􅀩咎不任銘戴匪處之情建平王散五刑敎府州國紀綱吾謬紲朝組廼班恩命重渥華蕃踐寵懋甸永言政惠良攪情寐况舊楚地曠前郢氓殷水帶枉渚山匝魯陽自頃田邑榛故封井萊蕪財賦方屈犴獄寔繁思所以厚風􅁵俗變瑟改調自五歲刑已下未連臺者一皆原遣文武彈坐亦悉復職主局依舊施散薄紓此懷建平王謝賜石硯等啓臣言奉勑賜石硯及法書五卷天旨又以臣書小進更使勤習敬閱籕􅂐側觀硯功張衛慙竒金瓊羞麗臣夙乏翰能素謝篇伎空賁恩輝徒隆慈飾方停煙墨永砥學玩仰結聖造伏銘私荷不任下情建平王謝玉環刀等啓奉勑賜玉環刀等五種珍噐贐伏􅀩猥降飾軼采朱跨影懸魄崑岡歸琛闕山慚寳謹襲緹素以充握睇垂光旣深銘佩更積不任下情建平王慶明帝疾和禮上表臣聞慶動至玄則昌衢敦序敎孚上雲則紫㝢交㤗故祁寒辱暑無以變其和沴火凝隂不能徙其氣伏惟陛下至德逺稜實天縱聖仁鑄蒼岳道括寰海故丹陵之君疑金泥而謝賢嬀墟之后眷龍圖而慚德頌聲蔽逵歌思匝道而望景暫虧輪光少曖玉欞逹和金幌輟念百祠未遑四嶽匪處吉蠲爲慶神御方休瑞廣文齡祥深武日具惟􅉼敎倡愉兼薦臣班戚奉慈實自慶舞不勝恱豫之情建平王慶安城王拜封表麗采繩河映蕚璿圃淑問夙孚令儀早晣撰告􅀱辰昭膺輝序國維冨禮皇􅂗凝衛具生屬慶懷識戴躍臣􅉼恱楚邊魂馳􅀜闕不任下情建平王聘隱逸敎府州國紀綱夫嬀夏已没大道不行雖周惠之冨猶有魚潭之士漢敎之隆亦見棲山之夫迹絶雲氣意􅀒青天皆待絳螭􅋮首翠虬來儀是以遺風獨扇百代餘烈激厲後生斯乃王敎之助古人之意焉吾稅駕舊楚憇乗汀潭挹於陵之操想漢隂之高而山川遐乆流風無沬養志數人並未徴采善操將弃良用慨然宜速詳舊禮各遣纁招庶暢此幽􅁭以旌蓬蓽建平王慶改號啓竊以皇衢永謐則玉曆惟禎國慶方夷則繩澤式茂故五鳳協年甘露應號况今道潤􅄛溢頌祉載繁嘉生蠲慶風雲瑞節旣覯招晨方鑄昌化延守一隅無以自屇不勝荒情建平王慶少帝登祚章上書皇帝陛下伏承肇嗣天震雲飛璿極戎夏歸服民靈以戴中射臣聞黃旗䊸藻瑞益於􅁎帝紫雲垂蓋効異於劉后實乃深賜天􅂨廣映祗迹伏惟陛下騫英駕圣􅉼靈縱睿矩心明裁䋲道喆時遥裔雒符雜沓河紀是以􅈾符寶宫輯命珍殿誼洗云宻德徽媯夏濬發鴻原長楴鄴緯方絢声金圖騰華玉曆波揜下氓炎􅄤上漢臣㳂莩締寵誠兼親屏禮升之日守官楚甸不􅀗勉躬儲外奉顓行間魂泣江郊心泫京國不任悲仰哽慰之情建平王答王太后正位章上書王太后殿下伏承以令日淑辰曾光樞景慶芬祗外禮蔚寰中中射臣聞道懋弟昌鄴廣祉盛藻秩攸臻憲章斯飾伏惟殿下柔明固天夙資龔懿芬蕙翔聲端簡散譽冠采摰姙騰燿徽姒丹陵藴德玄丘棲聖煙煴國牒衍溢民聽􅉼道席敎且詠且洽臣忝任蕃圉無由隨例闕廷不勝荒情建平王慶江皇后正位章上書皇后殿下伏承以嘉月蕙時膺曜宸正翠珩炤品榆組在飾休遍函夏譽殷靈昧中謝伏惟殿下岳曜靜德式懷謙順升降圖傳左右詩史夙鏡茂資早摛芳訓故以騰馥祕閨冩問中帷今靈緯載升崇正輝典衛敎紫庭麗􅁤華屋聲激綺組風􅅯家􅀖􅀺玄湊仁雲祗宅慶遠邇有聞莫不傾渥臣限外任無由恭列軒屏不勝荒情建平王太妃周氏行狀竊聞􅀱服之譽非黃冠能敷王食之問寧早衣所述諒畏襃美於君后􅀍空名於鼎貴然有漢臣誄行晉史書德者亦云實而巳焉伏見國太妃禀靈惟岳集慶自逺丗擅淮汝族冠疇代故以載曜聲書式炳縢牒矣太妃誕離明之正和涵雲露之中氣凝采齠歲賁章笄年􅀂廼彤管女圖之學纂組綺縞之工升降䖍謙之儀柔靜居順之節莫不中道若性不嚴而成故譽滿闈閻聲聞軒殿以元嘉某年歸于故司徒宣簡王旣而弟高坦倫祑踰外品青軒華轂用光國煇素壁丹墀寔隆家貴具惟姻娣靡不式贍而居尊以簡訓卑以弘躬謹蘭閨身撝椒第若衞娥之烱行樊羸之映操方之蔑如也大明二年宣簡王薨太妃藉悲用禮撫孤用慈柔懿之德愈彰肅敬之問日􅀍雖文伯之母言不踰閾莒相之主行存乎勤無以過也大明某年拜建平王太妃是時今王春秋方冨德業未隆藉兹金響終能玉播故綺襦出宰弱冠升朝者亦太妃劬勞之訓也謂天蓋高降年不永以太豫元年二月三日薨于荆州之内寢凡厥逺邇以哀以歎今祖行有期泉穸無逺素旂望路綵旌思歸所以垂宣徽容髣髴金石者謹詳牒行狀具以申言建平王讓鎮南徐州刺史啓臣言臣誓惟殃釁頻瀉四析慊慊狂愚兾􅀩哀弔而聖㫖懸嚴便賜斷表神乖意失音影何地吞悲茹號情膽載絶臣荒昧神氣爰自㓜禀分踰鼎貴秩高外州臣乏素能或所不任况在憂年必取黜辱特爲􅄏非常之恩借權製之義紊禮㓕經實翦治本臣又能身祈命請一感天地躑躅表啓心容已􅌤猶疑大道之行墨縗不興孝治天下通䘮獲遂陛下覆􅀍仁明品物無漏豈於微臣獨不蠲鑒燋鯁在躬輙復塵觸伏願暫輟聽覽少憐苫草則臣死之日猶生之年臨啓恍惚䰟識無主不勝殞越怵息之心建平王之南徐州刺史辭闕表臣過承寵靈閔􅀧假日徒抱皇慈無充橫草而品第廼崇軒服逾峻顧兹􅌤窮彌覯荒昧今便奉官外甸卷迹徐山託慕宸嚴載惟感戀哀疾不獲詣闕不任窮鯁之情梁江文通集卷第六
