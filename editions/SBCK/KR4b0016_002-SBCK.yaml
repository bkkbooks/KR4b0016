body:
  text: 赤虹賦并序東南嶠外爰有九石之山乃紅塵十里青㠋百仞苔滑臨水石險帶溪自非巫咸采藥群帝上下者皆歛意焉於時夏蓮始舒春蓀未歇肅舲波渚緩拽汀潭正逢巖崖相炤􅀨雲爛色俄而雄虹赫然暈光耀水偃蹇山頂舄弈江湄僕追而察之實􅀨日隂陽之氣信可觀也又憶昔登鑪峯上手接白雲今行九石下親弄綘蜺二難再感而作賦曰迤邐碕礒􅀆大極之連山鰅鱅虎豹􅀆玉虺騰軒孟夏茵蒀􅀆荷葉承蓮悵何意之容與􅀆兾暫緩此憂年失代上之異人遟山中之虚迹掇仙草於危峯鐫神丹於崩石視鱣岫之吐翕看黿梁之交積於是紫油上河絳氣下漢白日無餘碧雲卷半殘􅀨蕭索光烟艶爛水學金波石似瓊岸錯􅀛鱗之崚崚繞蛟色之漫漫俄而赤蜺電出蚴蚪神驤曖昧以變依俙不常非虚非實乍隂乍光赩赫山頂炤燎水陽雖圖緯之有載曠代識而未逢旣咨嗟而躑躅􅂓周流而從容想畨禺之廣野意丹山之喬峯禀傳􅀃之一星乗夏后之兩龍彼靈物之詎幾象火滅而山紅餘形可覽殘色未去耀萎􅅋而在草映靑䓗而結樹昏青苔於丹渚曖朱草於石路霞晃朗而下飛日通籠而上度俯形命之窘􅈰哀時俗之不固定赤舄之易遺乃鼎湖之可慕旣以爲朱鬐白毳之駕方曈一角之人帝臺北荒之際弇山西海之濵流沙之野折木之津雲或恠綵煙或異鱗必雜蜺之氣隂陽之神焉四時賦北客長欷深壁寂思空牀連流圭窬淹滯綱絲蔽戸青苔繞梁春華虚艶秋月徒光臨飛鳥而魂絶視浮雲而意長測代序而饒感知四時之足傷􅀂乃旭日始暖蕙草可織園桃紅􅀧流水碧色思應都􅀆心斷憐故人􅀆無極至若炎雲峯起芳樹未移澤蘭生坂朱荷出池憶上國之綺樹想金陵之蕙枝􅀂夫秋風一至白露團團明月生波螢火迎寒眷庭中之梧桐念機上之羅紈至於冬隂北邊永夜不曉平蕪際海千里飛鳥何甞不夢帝城之阡陌憶故都之臺沼是以􅎮琴情動戞瑟涕落逐長夜而心殞隨白日而形削故秦人秦聲楚音楚奏聞歌更泣見悲已疚實由䰟氣愴斷外物非救叅四時而皆難况僕人之末陋也金燈草賦山華綺錯陸葉錦名金燈麗草鑄氣含英若其碧莖凌露玉根升霜翠葉暮媚紫榮晨光非錦􅄢之可學詎瓊瑾之能方廼御秋風之獨秀值秋露之餘芬出萬枝而更明冠衆蘤而不群旣艶溢於時暮方炤麗於霜分是以移馥蘭畹徙色曲池軼長洲􅀆杜􅀂跨幽渚􅀆芳籬映霞光而爍爚懷風氣而參差故植君玉臺生君椒室炎蕚耀天朱英亂日永緒恨於君前不遺風霜之蕭瑟藉綺帳與羅袿信草木之願畢橫吹賦并序驃􅀐公以劒卒十萬禦荆人於外郊鐡馬煩而人聳色綵旄耀而士銜威軍容有橫吹僕感而爲之賦云北隂之竹􅀆百尺而不見日石硿礲而成􅁚山沓合而爲一雲逕逕而􅀌去風時時而寒出木斂柯而攅抏草騫葉而蕭瑟故左﨑嶬右硱磳樹嵓㠋水泓澄鎮雄蛟及雌虺獨鴟與單鷹白山顥赤山赩匝流沙經西極原陸窈灌莽深人聲絶馬迹沉寂然四顧增欷累吟雖欲止而不能禁此竹方可爲噐廼出天下之英音於是帶以泯色扣以瓊文潤如沉水華若浮雲赤紫駮星含露分其聲也則鞅鬱有意摧萃不群超遥衝山﨑曲抱津緜羃順序周流衘吕故西骨秦氣悲憾如懟北質燕聲酸極無巳斷絶百意繚繞萬情吟黃烟及白草泣虜軍與漢兵於是海外之雲處處而秋色河中之鴈一一而學飛素野黯以風暮金天赩以霜威衣􅃑動􅀆霧入冠弓刀勁􅀆馬毛寒五方軍􅀆出不及雜色􅀐􅀆徃來還瞻如雲􅀆志如星山可動􅀆石可銘功一堅􅀆迹不奪魂旣英􅀆􅀑亦靈奏此吹􅀆有曲可歌盡而淚續重一命而若烟知半氣之如燭美人戀而嬋媛壯夫去而躑躅故感魂傷情獲賞彌倍妙器竒製見貴歷代所以韻起西國響流東都浮江繞泗歷楚傳吳故函夏以爲寳飾京􅀜以爲戎儲至于具曹􅁚弭之威織文魚服之容鄞山錫刃耶溪銅鋒皆陸斷犀􅁚水斬蛟龍載雲旗之逶迤扈屯􅀐之溶溶啾寥亮於前衡嘒陸離於後陣視眄眩而或近聽嘹嘈而逺震奏白登之二曲起􅀜山之一引吐哀也則瓊瑕失綵衘樂也則鈆堊生潤採菱謝而自罷緑水慙而不進代能識此聲者長㓕􅁋而何􅈔扇上綵畫賦臨淄之雅女宋鄭之妙工織素麗於日月傳畫明之綵虹洛陽之伎極江南之巧窮故飾以赤野之玉文以紫山之金空青出峨嵋之阻雌黃出嶓􅃁之隂丹石發王屋之岫碧髓挺青蛉之岑粉則南陽鈆澤墨則上黨松心山乃嶄巖鬱峍路必􅺋㟿﨑嶔馭龍所不逺至駕鳯未之前㝷乃雜族以爲此扇爲君翳素女與玉琴玉琴􅀆散聲素女􅀆弄情旻天􅀆舒縹暮雲􅀆含頳䆫中暖􅀆露始滴池上凝􅀆月又明玉琴􅀆珠徽素女􅀆錦衣促織􅀆始鳴秋蛾􅀆載飛識桂莖之就罷知蘭葉之行衰願解珮而􅂢玦指黄墟而先歸重曰碧臺寂􅀆無人蔓丹草與朱塵度俄然如一代經半景若九春命幸得爲綵扇􅀆出入玉帶與綺紳傷友人賦并序僕之神交者甞有陳郡之􅀽炳焉有逸才有妙賞博學多聞明敏而識竒異僕以爲天下絶倫黯與秋草同折今不復見才矣旣而陳書有念橫瑟無從雖乏張范通􅂕之感庻同嵆尚篤徒之哀乃爲辭曰􅊄然沾衣􅀆悲􅀽友之英秀系神緒而作民胤􅂕枝而啓胄轢四代而式昌洎十葉而克茂友人之生川岫降明峻調逈韻惠志聦情倜儻逺度寂寥􅂕素文攀淵􅀸史􅀋遷固譬如冬雪旣㓗將以秋月至徹乃上代而少􅀟故叔丗而曠絶弔蕙若之暫芳慟琬琰之永闕余旣好於斯友乃神交於一顧邈疇年之繾綣窈生平之遊遇旣遊遇􅀆可㝷乃協好􅀆契心懷愛重於素壁結分珍於黃金拾一代而􅀏淺訪古人而求深故高術而共逕豈異䄂而同􅁭爾挂情於霜栢我發意於東桂擥千品之消散鏡百侯之衰替帶瑶玉而爭光握隨珠而比麗十圖􅀆炤籍抽經􅀆閱史共檢􅀆雒書同扸􅀆河紀旣思遊􅀆百􅀃亦窮精􅀆萬里愛詩文之綺發賞賦艶􅀆錦起罄古今之寳賮殫竹素之琛竒信朝日之徒昊屬夜星之空移覽秋實於西苑摘春華於東池蚤同歲於上京未滿年於下國爾湘水􅀆深沉我前山􅀆眇黙惟音華與書酒伊楚越􅀆南北余結􅁩􅀆梁門復從官􅀆朱藩何人遥而困阻而天道之匪存凋碧玉之神樹銷紫石之靈根永逺書於江澨結深痛於爾䰟䰟線昧其􅀂絶泣縈盈其􅀂結􅈔妙賞之不留悼知音之已逝金雖重而見鑄桂徒芳而􅀍折百年一盡􅀆貴楊蕤於後烈麗色賦楚臣旣放䰟往江南弟子曰玉釋珮馬解驂􅄥􅄥渌水􅒁􅒁青衫乃召巫史兹憂何止史曰臣野膠學蔽理臣之所知獨有麗色之􅀃耳夫絶代獨立者信東方之佳人旣翠眉而瑶質亦盧曈而頳脣鍱金花於珠履颯綺􅃑與錦紳色練練而含奪光炎炎其􅀂神非氣􅁚之可譬奚影響而能親故仙藻靈艶金華玉儀其始見也􅀂紅蓮映池其少進也如綵雲出衣五光徘徊十色陸離實過珊瑚同樹價直瓊草共枝雖玉堂春􅁎石室素女張烟霧於海際耀光景於河渚乗天梁而皓蕩叫帝閽而延佇猶比之無色方之非侣於是彫臺繡戸當衢橫術椒庭承月碧愰延日架虬柱之嚴躧亘虹梁之峻宻錦幔垂而杳寂桂煙起而清溢女乃耀邯鄲之麗歩媚趙北之鳴瑟􅀂夫紅華舒春黃鳥飛時紺蕙􅀄嫰頳蘭始滋不擥蘅帶無􅀝桂旗摘芳拾蘂含詠吐辭􅀏月出於陳歌感蔓草於衞詩故氣炎日永離明火中槿榮任露蓮花勝風後簷丹葵前軒碧桐笙歌畹右琴儛池東嗟􅂕王之心恱怨漢女之情空至乃西陸始秋白道月弦金波炤戸玉露曖天網絲挂墻綵螢繞梁氣已温􅀆曉未半星雖流􅀆夜何央憶雜珮􅀆且一欷念錦衾􅀆以九傷及冴隂凋時冰泉凝節軒疊厚霜庭澄積雪鳥封魚斂河凝海結紫帷鈐匝翠屏環合麝宻周彰燈爐重沓耻新臺之青樓想上宫之􅃉閤􅀂乃水炤景而見底煙㝷風而無極霧出吳而綺章雲堆趙而碧色霧辭楚而容裔風去燕而悽惻莫不輟鏡徙􅀝擥琴心息於是帳必藍田之寳席必蒲陶之菅圖明室畫浮雲春蚕度網綺地應紡秋梭鳴機織爲褧衣􅁚奩瓊盤神瀝仙丹雕柱綵瑟九華六出翠蕤羽釵緑秀金枝故言必入媚動必應規有光有􅃩如合如離氣柔色靡神凝骨竒經秦歷趙旣無其􅀟㝷楚訪蔡不觀其容亦可駐髮還質驂星馭龍蠲憂忘死保其家􅀖蓋天下之至麗孰能預於此哉宋大夫耀影汰迹縈䰟洒􅅎賞以􅀟珠賜以合璧拂巫盪祝永爲上客翡翠賦彼二鳥之竒麗生金洲與炎山映銅陵之素氣灌碧磴之紅泉石錦質而入海雲綺色而出天峰炎嵒而蔽日樹靜􅊕而臨泉霞輕重而成彩煙尺寸而作緒熱風翕而起濤丹氣赫而爲暑對滫流之蛟龍衝汶漻之霧雨耀緑葉於冬岫鏡朱華於寒渚斂惠性及馴心騫頳翼與青羽終絶命於虞人充南琛於祕府備寳帳之光儀登美女之麗飾雜曰玉以戒文糅紫金而爲色專妙綵於五都擅精華於八極傅貴質於竹素晦深聲於百億嗟乎雞鶩以稻梁致憂燕雀以堂搆貽愁旣銜利之利近又遁害之無由今乃依赮火之絶垠出赤縣之紘州逭人迹而獨立擥天倪而爲儔竟同獲於河鴈不俱恕於海鷗必性命􅀆有當孰能合􅀆可求江上之山賦潺湲澒溶􅀆楚水而吳江刻劃嶃崪􅀆雲山而碧峯挂青蘿􅀆萬仞竪丹石􅀆百重嵯峨􅀆嵒㟧如斵􅀆如削嶤嶷􅀆尖出巖岍􅀆空鑿波潮􅀆吐納􅛲峯􅀆積沓鰅鱅􅀆赤尾黿鼉􅀆匼匝見紅草之交生眺碧樹之四合草自然而千花樹無情而百色嗟代道之異兹牽憂恚而來逼惟爐炭於片景抱絲緒於一息毎意遠而生短恒輪平而路庂信懸天􅀆窈昧豈繁命於才力旣群龍之咸疑焉衆狀之所極俗逐事而變化心應物而廻旋旣欻翕其未悟亦繣而巳遷伊人壽􅀆幾何譬流星之殞天悵日暮􅀆吾有念臨江上之斷山雖不敏而無操願從蘭芬與玉堅亂曰折芙蓉􅀆蔽日兾以盪夫憂心不共愛此氣質何獨嗟乎景沉燈賦淮南王信自華􅁋命綵女􅀆餌丹砂而學鳳音紫霞没白日沉挂明燈散􅀇隂顧謂小山儒士斯可賦乎於是泛瑟而言曰􅀂大王之燈者銅華金檠錯質鏤形碧爲雲氣玉爲仙􅂕􅀟椀百枝艶帳充庭炤錦地之文席映繡柱之鴻箏恣􅂕脩之浩盪釋心疑而未平兹侯服之誇詡而處士所莫營也􅀂庶人之燈者非珠非銀無藻無縟心不貴美噐窮於樸是以露冷帷幔風結羅紈螢光别桂蛾命辭蘭秋夜如歲秋情如絲怨此愁抱傷此秋期必丹燈坐歎停􅀃忘辭至夫霜封園橘冰裂池蓀雲雪無際河海方昬冬膏旣凝冬箭未度㳙連冬心寂歷冬暮亦復朱燈空明但爲傷故乃知燈之爲寳信可賦也王遂讃善澄意歛神屈原才華宋玉英人恨不得與之同時結佩共紳今子凝章挺秀近出嘉賔吐蘅吐蕙含瓊含珉摧驂雕輦以愛國之有臣焉知己賦并序陳國之華者故吏部郎殷孚其人也博而能通學無不覽雅賞文章尤愛竒逸雖志隱巖石而名動京師矣才多深見氣有逺度雖安期千里不能尚焉始於北府相值傾蓋無已僕乃得罪嶠外遐路窈然始還舊都會君㝷卒故爲兹賦以􅀉深哀順祗効寳瀆靈會昌時􅀨種祉山雲降祥承瑶葉之餘曖系金枝之末光聳􅀌韻以風邁騫逸氣以烟翔故學不常師而心鏡群藉理不啓問而情炤諸宻採圖辨緯遊機訪曆潜志百氏沈神六經冥㭊義􅁚該洽性靈儒不隱迹墨無遁形旣含道潤亦發才華采耀秋月文麗冬霞有體有艶光國光家識包上仁義兼髙行如彼清波可挹可鏡又􅁚沖室惟清惟淨氣擬北海情方中散風流未輟盛名猶纂英馳芬激譽流聲滿我筠心而松性君金采而玉相伊邂逅之未遇爰契闊於朱方丹瓊譬而非寳緑蘭比而無芳毎賞矜其如契貴懷允而不忘亟閒席􅀆惆悵屢緩帶而從容論十代􅀆興毀訪五都􅀆異同談天理之開基辯人道之始終罄龍圖及鳳書傾蒼冊與􅂐字儲西國之闕文採東京之逸記閱歆向之舊㫖闡鐘王之新意對楚漢之瞻墨覽魏􅀳之鴻䇿授逺近之眞假削古今之名實毎齊韻而等逕輒同懷而共術吐情志而深賞忘年齒而隆眷擬余才􅀆前華比余文􅀆後彦余結􅃑於山石君慿神於寒霰何逺期之未從痛戢景其如電堂酒􅀆一塵暮燈􅀆萬春黛草􅀆永祕朱丹􅀆何晨聞瑶質􅀆可變知余采􅀆一奪唯華名與芳暉􅀆爭日月而無沫空青賦夫赤瓊以炤㷈爲光碧石以萎蕤爲色咸見珍於東國並􅀍貴於四極況空青之麗寳亦挺山海之不測其所處則峻巘層石􅀛穴龍壁素岸成雲頳砂如積外隱青苔丹草内伏玉枝瑪瑙銅鈆合生䃕磪堅英自非索嶮覓危乗鱟履螭倦春厭秋斵異鐫竒能得厠於軒宇接君子之光儀於是冩雲圖氣學靈狀仙寳波麗水華峯艶山陽谷之樹崦嵫之泉西海之草炎州之烟銀臺之鳥穆王之馬都廣之國畨禺之野皆咫尺八極鏡見四荒雲烟始出日月旣張􅀂夫䆳古之丗汗漫窈微惟此青墨所以造之至乃翠燦軒室䓗鬱臺殿雜蛟龍之文章發麟鹿之炳絢騁神形於鐘簴舒恠物與雷電亦有曲帳畫屏素女綵扇錦色窈鬱綺質蔓衍􅀧拂濃薄如隱如見山水萬􅁚丹青曲變成百鎰之可珍亦千金而不賤雖楚之夏􅁎越之西施趙妃節后秦娥吳娃溺愛靡意䰟飛心離􅀱青翳爲藻飾方赩紅華與素儀冠衆寳而獨立信求之而無虧學梁王兎園賦并序或重古輕今者僕曰何爲其然哉無知音則已矣􅂓爲古賦以􅁬枚叔之製焉碧山􅀝巘﨑􅀆􅁚海水碣石朝日晨霞􅀆赩紅壁仰望泬寥􅀆數千尺􅹳􅽴嵺􅲟汩淈成岫􅢋呀而窟竇哮碻􅲙􅃀紫蕪丹駮苔􅀧綺縟􅀂斷若續如此者百有十處奔水激集瀴溟絜渠潏湟吐吸跳波走浪濺沫而相及㵿􅃞長驚澆灌逺注無時息焉青樹玉葉彌望成林亦有輪囷磥硊一枝百頃萬葉共隂縹草丹蘅江離蔓荆酷郁交布原滿隰平於是金塘􅊺演緑竹􅀍坂繚繞靑翠近而復逺白砂如積雪者焉碧石如圓玦者焉水鳥駕鵝􅡝鳿鶵鴈上飛衡陽下􅀫沅漢十十五五忽合而復散乃有綺雲之舘頳霞之臺其樂足以棄國釋位遺死忘歸也若夫墨翟商瞿之倫學兼師術才叅道眞方駕蓮􅎮于沼之濵乃射􅀫餌魴前繳鷫鷞青黏黃梁曤鼈胾羮臑㹠柘漿窮嬉極娛雲翶􅀆煙翔超然左覽蒼梧右睨鄧林崩石梧岸􆄱􆉃藏隂逮至山頂丹壁四平靈木夾道神草列生俯瞰太一下視流星旣投冠而棄劒亦扤魄而盪靈於是大夫之徒稱詩而歸春陽始映朱華未希卒逢邯鄲之女蕙色玉質命知其麗攅連映日綺裳下見錦衣上出雖復守禮令人意失遂謡曰碧玉作椀銀爲盤一刻一鏤化􅀟鸞乃報歌曰美人不見紫錦衾黃泉應至何所禁妃因别曰見上客􅀆心歷亂送短詩􅀆懷長歎中人望􅀆蚕旣飢爕蹀暮􅀆思夜半梁江文通文集卷第二
