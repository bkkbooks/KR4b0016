body:
  text: 赤虹賦并序東南嶠外爰有九石之山乃紅塵十里青崿百仞苔滑臨水石險帶溪自非巫咸采藥群帝上下者皆斂意焉於時夏蓮始舒春蓀未歇肅舲波渚緩拽汀潭正逢巖崖相照雨雲爛色俄而雄虹赫然暈光耀水偃蹇山頂舄奕江湄僕追而察之實雨日隂陽之氣信可觀也又憶昔登爐峯上手接白雲今行九石下親弄綘霓二難再感而作賦曰迤邐崎礒兮大極之連山鰅鱅虎豹兮玉虺騰軒孟夏茵蒀兮荷葉承蓮悵何意之容與兮兾暫緩此憂年失代上之異人遲山中之虛迹掇仙草於危峯鐫神丹於崩石視鱣岫之吐翕看黿梁之交積於是紫油上河絳氣下漢白日無餘碧雲卷半殘雨蕭索光煙艷爛水學金波石似瓊岸錯龜鱗之崚崚繞蛟色之漫漫俄而赤霓電出蚴蚪神驤曖昧以變依俙不常非虛非實乍隂乍光赩赫山頂照燎水陽雖圖緯之有載曠代識而未逢既咨嗟而躑躅聊周流而從容想畨禺之廣野意丹山之喬峯稟傳説之一星乘夏后之兩龍彼靈物之詎幾象火滅而山紅餘形可覽殘色未去耀萎𬎼而在草映靑蔥而結樹昏青苔於丹渚曖朱草於石路霞晃朗而下飛日通籠而上度俯形命之窘局哀時俗之不固定赤舄之易遺乃鼎湖之可慕既以為朱鬐白毳之駕方曈一角之人帝臺北荒之際弇山西海之濵流沙之野折木之津雲或怪綵煙或異鱗必雜霓之氣隂陽之神焉四時賦北客長欷深壁寂思空牀連流圭窬淹滯綱絲蔽戶青苔繞梁春華虛艷秋月徒光臨飛鳥而魂絶視浮雲而意長測代序而饒感知四時之足傷若乃旭日始暖蕙草可織園桃紅點流水碧色思應都兮心斷憐故人兮無極至若炎雲峯起芳樹未移澤蘭生坂朱荷出池憶上國之綺樹想金陵之蕙枝若夫秋風一至白露團團明月生波螢火迎寒眷庭中之梧桐念機上之羅紈至於冬隂北邊永夜不曉平蕪際海千里飛鳥何嘗不夢帝城之阡陌憶故都之臺沼是以􅎮琴情動戞瑟涕落逐長夜而心殞隨白日而形削故秦人秦聲楚音楚奏聞歌更泣見悲已疚實由魂氣愴斷外物非救參四時而皆難况僕人之末陋也金燈草賦山華綺錯陸葉錦名金燈麗草鑄氣含英若其碧莖凌露玉根升霜翠葉暮媚紫榮晨光非錦罽之可學詎瓊瑾之能方乃御秋風之獨秀值秋露之餘芬出萬枝而更明冠衆花而不群既艷溢於時暮方照麗於霜分是以移馥蘭畹徙色曲池軼長洲兮杜若跨幽渚兮芳籬映霞光而爍爚懷風氣而參差故植君玉臺生君椒室炎蕚耀天朱英亂日永緒恨於君前不遺風霜之蕭瑟藉綺帳與羅袿信草木之願畢橫吹賦并序驃騎公以劒卒十萬禦荆人於外郊鐡馬煩而人聳色綵旄耀而士銜威軍容有橫吹僕感而為之賦云北隂之竹兮百尺而不見日石硿礲而成象山沓合而為一雲徑徑而孤去風時時而寒出木斂柯而攢抏草騫葉而蕭瑟故左﨑嶬右硱磳樹嵓崿水泓澄鎮雄蛟及雌虺獨鴟與單鷹白山皓赤山赩匝流沙經西極原陸窈灌莽深人聲絶馬迹沉寂然四顧增欷纍吟雖欲止而不能禁此竹方可為器乃出天下之英音於是帶以泯色扣以瓊文潤如沉水華若浮雲赤紫駮星含露分其聲也則鞅鬱有意摧萃不群超遙衝山﨑曲抱津綿羃順序周流銜吕故西骨秦氣悲憾如懟北質燕聲酸極無巳斷絶百意繚繞萬情吟黃煙及白草泣虜軍與漢兵於是海外之雲處處而秋色河中之鴈一一而學飛素野黯以風暮金天赩以霜威衣𬒮動兮霧入冠弓刀徑兮馬毛寒五方軍兮出不及雜色騎兮往來還瞻如雲兮志如星山可動兮石可銘功一堅兮迹不奪魂既英兮鬼亦靈奏此吹兮有曲可歌盡而淚續重一命而若煙知半氣之如燭美人戀而嬋媛壯夫去而躑躅故感魂傷情獲賞彌倍妙器竒製見貴歷代所以韻起西國響流東都浮江繞泗歷楚傳吳故函夏以為寶飾京關以為戎儲至于具曹象弭之威織文魚服之容鄞山錫刃耶溪銅鋒皆陸斷犀象水斬蛟龍載雲旗之逶迤扈屯騎之溶溶啾寥亮於前衡嘒陸離於後陳視眄眩而或近聽嘹嘈而逺震奏白登之二曲起關山之一引吐哀也則瓊瑕失綵銜樂也則鉛堊生潤採菱謝而自罷緑水慙而不進代能識此聲者長滅淫而何吝扇上綵畫賦臨淄之雅女宋鄭之妙工織素麗於日月傳畫明之綵虹洛陽之伎極江南之巧窮故飾以赤野之玉文以紫山之金空青出峨嵋之阻雌黃出嶓冡之隂丹石發王屋之岫碧髓挺青蛉之岑粉則南陽鉛澤墨則上黨松心山乃嶄巖鬱峍路必􅺋㟿﨑嶔馭龍所不逺至駕鳯未之前尋乃雜族以為此扇為君翳素女與玉琴玉琴兮散聲素女兮弄情旻天兮舒縹暮雲兮含頳窗中暖兮露始滴池上凝兮月又明玉琴兮珠徽素女兮錦衣促織兮始鳴秋蛾兮載飛識桂莖之就罷知蘭葉之行衰願解珮而捐玦指黃墟而先歸重曰碧臺寂兮無人蔓丹草與朱塵度俄然如一代經半景若九春命幸得為綵扇兮出入玉帶與綺紳傷友人賦并序僕之神交者嘗有陳郡之袁炳焉有逸才有妙賞博學多聞明敏而識竒異僕以為天下絶倫黯與秋草同折今不復見才矣既而陳書有念橫瑟無從雖乏張范通靈之感庶同嵆尚篤徒之哀乃為辭曰泫然沾衣兮悲袁友之英秀系神緒而作民胤靈枝而啓胄轢四代而式昌洎十葉而克茂友人之生川岫降明峻調逈韻惠志聰情倜儻逺度寂寥靈素文攀淵卿史類遷固譬如冬雪既潔將以秋月至徹乃上代而少雙故叔丗而曠絶弔蕙若之暫芳慟琬琰之永闕余既好於斯友乃神交於一顧邈疇年之繾綣窈生平之遊遇既遊遇兮可尋乃協好兮契心懷愛重於素壁結分珍於黃金拾一代而笑淺訪古人而求深故高術而共徑豈異袖而同襟爾挂情於霜柏我發意於東桂攬千品之消散鏡百侯之衰替帶瑶玉而爭光握隨珠而比麗十圖兮照籍抽經兮閲史共檢兮雒書同扸兮河紀既思遊兮百説亦窮精兮萬里愛詩文之綺發賞賦艷兮錦起罄古今之寶賮殫竹素之琛竒信朝日之徒昊屬夜星之空移覽秋實於西苑摘春華於東池蚤同歲於上京未滿年於下國爾湘水兮深沉我前山兮眇默惟音華與書酒伊楚越兮南北余結誼兮梁門復從官兮朱藩何人遙而困阻而天道之匪存凋碧玉之神樹銷紫石之靈根永逺書於江澨結深痛於爾魂魂線昧其若絶泣縈盈其若結吝妙賞之不留悼知音之已逝金雖重而見鑄桂徒芳而𬒳折百年一盡兮貴楊蕤於後烈麗色賦楚臣既放魂往江南弟子曰玉釋珮馬解驂𪷟𪷟渌水􅒁􅒁青衫乃召巫史兹憂何止史曰臣野膠學蔽理臣之所知獨有麗色之説耳夫絶代獨立者信東方之佳人既翠眉而瑶質亦盧曈而頳脣鍱金花於珠履颯綺𬒮與錦紳色練練而含奪光炎炎其若神非氣象之可譬奚影響而能親故仙藻靈艷金華玉儀其始見也若紅蓮映池其少進也如綵雲出衣五光徘徊十色陸離實過珊瑚同樹價直瓊草共枝雖玉堂春姬石室素女張煙霧於海際耀光景於河渚乘天梁而皓蕩叫帝閽而延佇猶比之無色方之非侣於是雕臺繡戶當衢橫術椒庭承月碧愰延日架虬柱之嚴屣亘虹梁之峻密錦幔垂而杳寂桂煙起而清溢女乃耀邯鄲之麗步媚趙北之鳴瑟若夫紅華舒春黃鳥飛時紺蕙𥘉嫩頳蘭始滋不攬蘅帶無倚桂旗摘芳拾蘂含詠吐辭笑月出於陳歌感蔓草於衛詩故氣炎日永離明火中槿榮任露蓮花勝風後簷丹葵前軒碧桐笙歌畹右琴儛池東嗟靈王之心恱怨漢女之情空至乃西陸始秋白道月弦金波照戶玉露曖天網絲挂墻綵螢繞梁氣已溫兮曉未半星雖流兮夜何央憶雜珮兮且一欷念錦衾兮以九傷及冴隂凋時冰泉凝節軒疊厚霜庭澄積雪鳥封魚斂河凝海結紫帷鈐匝翠屏環合麝密周彰燈爐重沓耻新臺之青樓想上宫之邃閣若乃水照景而見底煙尋風而無極霧出吳而綺章雲堆趙而碧色霧辭楚而容裔風去燕而悽惻莫不輟鏡徙倚攬琴心息於是帳必藍田之寶席必蒲陶之菅圖明室畫浮雲春蠶度網綺地應紡秋梭鳴機織為褧衣象奩瓊盤神瀝仙丹雕柱綵瑟九華六出翠蕤羽叉緑秀金枝故言必入媚動必應規有光有豔如合如離氣柔色靡神凝骨竒經秦歷趙既無其雙尋楚訪蔡不觀其容亦可駐髮還質驂星馭龍蠲憂忘死保其家邦蓋天下之至麗孰能預於此哉宋大夫耀影汰迹縈魂灑魄賞以雙珠賜以合璧拂巫蕩祝永為上客翡翠賦彼二鳥之竒麗生金洲與炎山映銅陵之素氣灌碧磴之紅泉石錦質而入海雲綺色而出天峰炎嵒而蔽日樹靜暝而臨泉霞輕重而成彩煙尺寸而作緒熱風翕而起濤丹氣赫而為暑對滫流之蛟龍衝汶漻之霧雨耀緑葉於冬岫鏡朱華於寒渚斂惠性及馴心騫頳翼與青羽終絶命於虞人充南琛於祕府備寶帳之光儀登美女之麗飾雜曰玉以戒文糅紫金而為色專妙綵於五都擅精華於八極傅貴質於竹素晦深聲於百億嗟乎雞鶩以稻梁致憂燕雀以堂搆貽愁既銜利之利近又遁害之無由今乃依赮火之絶垠出赤縣之紘州逭人迹而獨立攬天倪而為儔竟同獲於河鴈不俱恕於海鷗必性命兮有當孰能合兮可求江上之山賦潺湲澒溶兮楚水而吳江刻劃嶄崒兮雲山而碧峯挂青蘿兮萬仞竪丹石兮百重嵯峨兮嵒崿如斫兮如削嶤嶷兮尖出巖岍兮空鑿波潮兮吐納􅛲峯兮積沓鰅鱅兮赤尾黿鼉兮匼匝見紅草之交生眺碧樹之四合草自然而千花樹無情而百色嗟代道之異兹牽憂恚而來逼惟爐炭於片景抱絲緒於一息每意遠而生短恆輪平而路庂信懸天兮窈昧豈繁命於才力既群龍之咸疑焉衆狀之所極俗逐事而變化心應物而回旋既欻翕其未悟亦繣而巳遷伊人壽兮幾何譬流星之殞天悵日暮兮吾有念臨江上之斷山雖不敏而無操願從蘭芬與玉堅亂曰折芙蓉兮蔽日兾以蕩夫憂心不共愛此氣質何獨嗟乎景沉燈賦淮南王信自華淫命綵女兮餌丹砂而學鳳音紫霞沒白日沉挂明燈散玄隂顧謂小山儒士斯可賦乎於是泛瑟而言曰若大王之燈者銅華金檠錯質鏤形碧為雲氣玉為仙靈雙碗百枝艷帳充庭照錦地之文席映繡柱之鴻箏恣靈修之浩蕩釋心疑而未平兹侯服之誇詡而處士所莫營也若庶人之燈者非珠非銀無藻無縟心不貴美器窮於朴是以露冷帷幔風結羅紈螢光别桂蛾命辭蘭秋夜如歲秋情如絲怨此愁抱傷此秋期必丹燈坐歎停説忘辭至夫霜封園橘冰裂池蓀雲雪無際河海方昏冬膏既凝冬箭未度涓連冬心寂歷冬暮亦復朱燈空明但為傷故乃知燈之為寶信可賦也王遂讃善澄意斂神屈原才華宋玉英人恨不得與之同時結佩共紳今子凝章挺秀近出嘉賔吐蘅吐蕙含瓊含珉摧驂雕輦以愛國之有臣焉知己賦并序陳國之華者故吏部郎殷孚其人也博而能通學無不覽雅賞文章尤愛竒逸雖志隱巖石而名動京師矣才多深見氣有逺度雖安期千里不能尚焉始於北府相值傾蓋無已僕乃得罪嶠外遐路窈然始還舊都會君尋卒故為兹賦以寄深哀順祗效寶瀆靈會昌時雨種祉山雲降祥承瑶葉之餘曖系金枝之末光聳孤韻以風邁騫逸氣以煙翔故學不常師而心鏡群藉理不啓問而情照諸密採圖辨緯遊機訪曆潛志百氏沈神六經冥析義象該洽性靈儒不隱迹墨無遁形既含道潤亦發才華采耀秋月文麗冬霞有體有艷光國光家識包上仁義兼髙行如彼清波可挹可鏡又象沖室惟清惟淨氣擬北海情方中散風流未輟盛名猶纂英馳芬激譽流聲滿我筠心而松性君金采而玉相伊邂逅之未遇爰契闊於朱方丹瓊譬而非寶緑蘭比而無芳每賞矜其如契貴懷允而不忘亟間席兮惆悵屢緩帶而從容論十代兮興毀訪五都兮異同談天理之開基辨人道之始終罄龍圖及鳳書傾蒼册與篆字儲西國之闕文採東京之逸記閲歆向之舊旨闡鐘王之新意對楚漢之瞻墨覽魏晉之鴻䇿授逺近之真假削古今之名實每齊韻而等徑輒同懷而共術吐情志而深賞忘年齒而隆眷擬余才兮前華比余文兮後彥余結𬒮於山石君慿神於寒霰何逺期之未從痛戢景其如電堂酒兮一塵暮燈兮萬春黛草兮永祕朱丹兮何晨聞瑶質兮可變知余采兮一奪唯華名與芳暉兮爭日月而無沫空青賦夫赤瓊以照㷈為光碧石以萎蕤為色咸見珍於東國並𬒳貴於四極況空青之麗寶亦挺山海之不測其所處則峻巘層石龜穴龍壁素岸成雲頳砂如積外隱青苔丹草內伏玉枝瑪瑙銅鉛合生𥒪崔堅英自非索嶮覓危乘鱟履螭倦春厭秋斫異鐫竒能得厠於軒宇接君子之光儀於是寫雲圖氣學靈狀仙寶波麗水華峯艷山陽谷之樹崦嵫之泉西海之草炎州之煙銀臺之鳥穆王之馬都廣之國畨禺之野皆咫尺八極鏡見四荒雲煙始出日月既張若夫邃古之丗汗漫窈微惟此青墨所以造之至乃翠燦軒室蔥鬱臺殿雜蛟龍之文章發麟鹿之炳絢騁神形於鐘簴舒怪物與雷電亦有曲帳畫屏素女綵扇錦色窈鬱綺質蔓衍點拂濃薄如隱如見山水萬象丹青曲變成百鎰之可珍亦千金而不賤雖楚之夏姬越之西施趙妃節后秦娥吳娃溺愛靡意魂飛心離候青翳為藻飾方赩紅華與素儀冠衆寶而獨立信求之而無虧學梁王兔園賦并序或重古輕今者僕曰何為其然哉無知音則已矣聊為古賦以奮枚叔之製焉碧山倚巘﨑兮象海水碣石朝日晨霞兮赩紅壁仰望泬寥兮數千尺􅹳􅽴嵺􅲟汩淈成岫􅢋呀而窟竇哮碻􅲙確紫蕪丹駮苔點綺縟若斷若續如此者百有十處奔水激集瀴溟潔渠潏湟吐吸跳波走浪濺沫而相及㵿漾長驚澆灌逺注無時息焉青樹玉葉彌望成林亦有輪囷磊硊一枝百頃萬葉共隂縹草丹蘅江離蔓荆酷郁交布原滿隰平於是金塘湎演緑竹𬒳坂繚繞靑翠近而復逺白砂如積雪者焉碧石如圓玦者焉水鳥駕鵝􅡝鳿雛鴈上飛衡陽下宿沅漢十十五五忽合而復散乃有綺雲之館頳霞之臺其樂足以棄國釋位遺死忘歸也若夫墨翟商瞿之倫學兼師術才參道真方駕蓮􅎮于沼之濵乃射宿餌魴前繳鷫鷞青黏黃梁曤鱉胾羮臑豚柘漿窮嬉極娛雲翶兮煙翔超然左覽蒼梧右睨鄧林崩石梧岸􆄱􆉃藏隂逮至山頂丹壁四平靈木夾道神草列生俯瞰太一下視流星既投冠而棄劒亦扤魄而蕩靈於是大夫之徒稱詩而歸春陽始映朱華未希卒逢邯鄲之女蕙色玉質命知其麗攢連映日綺裳下見錦衣上出雖復守禮令人意失遂謡曰碧玉作碗銀為盤一刻一鏤化雙鸞乃報歌曰美人不見紫錦衾黃泉應至何所禁妃因别曰見上客兮心歷亂送短詩兮懷長歎中人望兮蠶既飢燮蹀暮兮思夜半梁江文通文集卷第二
