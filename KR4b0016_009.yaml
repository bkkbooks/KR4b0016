body:
  text: 蕭讓太傅相國齊公十郡九錫表備九錫之禮非常之冊分天而降冠古之典𨳩河而出遥然以慙䰟交象魏中謝臣聞日月權輿二儀所以剋靈君臣設極三統所以式固惟生與位謂之大寳辨諸文而尊卑旣炳觀群龍而貴賤可正雖復殷因於夏王資於帝至乎建侯分職體國經野其揆一焉是以二周之始山河愈廣兩漢之𥘉封賞彌盛然表東海者實牧野之日贍魯邦者乃負圖之辰西都英相信命丗之功關中上宰亦龕亂之力秬鬯彤弓本西伯之賞虎賁戎路又晉公之典若乃衣裳盟會九合一匡猶慙德斯禮也臣實鄙才靡識大體徒以忠貞爲槩而勞不足銘雖以丹素爲誠而功無可勒豈有經天緯地之略探隱炤寂之智哉抑亦何術以堪盛休是以覽雲際而懷古慿軒榥而未寧也伏惟陛下神華馭丗理無不鏡賜臣待謗今職守其私滿則天下有道庶人不疑矣第二表臣公言臣近勵心罄辭冩情畢議眇望神藻鑒見丹襟而帝閽以祕論誥方明中庶卷容左右軫慮中謝臣以爲麗天秉經君上之彛憲儀地執緯臣下之恒軌故皇極載凝庶士交慎昔者重黎勤官裁居炎冥之職羲叔能任方掌日月之序至乎御龍勤夏未聞冠俗之爵大彭翼商豈見超丗之典以古先哲后如兹之慎賞也臣乃謬貽國寄志在靜難若夫野戰虹蜺伏順者易爲威城攻鯨虺奉國者理必全雲氣薄蝕下民咸貴其明恃險輿馬舟中皆可異議故昌邑有歸邸吳楚無旋師斯激芬楊蕤物同其幸焚惡去醜丗共其庇實爲仰慿俯順之効臣亦何力之有焉竊謂祿爲十郡必俟禹迹之勤錫以九命乃須周公之美况吕梁不鑿而噐重玄珪越裳未獻而賦擬千乗京關識其崇貴畿服知其忝冐鏡前脩而慙形覿往德而聳慮畏崖之請取誓深水審量之祈呈炤皦景伏願陛下逺牽雄範近覽英規慿霞停詔臨風輟恩豈伊愚臣方獨昌化具日遺氓咸蒙其賴矣𬒳百僚敦勸受表臣公言臣欵誠素履頻載縑翰天飾髙奬累降史筆即日尚書臣某等至重宣詔㫖猥辱百僚省睇未交心靈巳悸中謝臣聞良宰謀朝不必借威貞臣衛主脩巳則足故驕滿之失取鏡函關謙測之美見炤伊闕臣本庸人識無逺度籍𨳩闢之辰遭攙搶之運姦回内奰則戮力瓊都諸侯放命則抗節瑶祀秉號仗義幸不辱威皆爲冕旒遥鑒之明群士畫圖之助臣寧望伊摰叔且之爵吕牙申明之賞哉方欲謝簮東都濯冠汾陽不悟盛禮華典復臻於兹靜黙廻環祗畏躑躅猶謂遇聦明之朝當時雍之丗陛下詠堯風之化歌卿雲之詩日月華采萬方獲性疊慮仰祈必蒙題品而威嚴窈絶斯兾遂阻鑾輿玉駕復許敦幸重臣愆悔無地自安便當謹恭鴻命竭身爲限蕭拜相國齊公十郡九錫章殊命寳典鬱降雲天采詔軒騎光流城禦震驚華禮神氣交越中謝臣才謝深英噐慙逺度進寡兵車召陵之盟退靡朝歌河内之會無束馬山戎之績懸車流沙之功故望寵未安踐榮加懼況納陛朱戸事絶群班金璽綠綬儀叅鴻典聞命屏營以憂以墜近申微欵日月之鑒旣阻方懼難慊蘭芳之旨愈峻遂致百辟卿后踟蹰於衛闕鑾輅旗旂方幸於臣府悵然遥慮將貽厚戾文章徒單迄無蠲省而天威咫尺丹懷罔固輙肅恭文物翹拜榮禮違距以深追増怵迫德輶寵盛於斯爲微非臣鄙虚所能酬對蕭相國讓進爵爲王第二表臣結慮歸請三辰未鏡傾䰟仰視九天弥阻重炳徽䇿再晣光誥理晦情震若渉嚴淵中謝臣業不出丗績未逮古謬藉明政陳力就列艱多智寡翊賛罔樹若乃洪範不脩鍾綴旒之日九黎亂政當摧軸之辰雖瀝命奉時蘭禍提下亟防明之陋貽慙昔人杜險之蔽取愧前英故十萬之師無集槀行之邸千金之貴恒單白藏之府戈􅊑發於江湖戎車出於石城然後雲徹席卷䖍劉巨禍臣實恧焉不悟上賞亟降華爵必集雖延首紫局翹意宸居執爲守約之志旣謝簡鑒避賢辭智之請終無𨳩允故受任專征逺邇知寵肇封四履候甸推禮昔虞思勤夏不列殊物之錫晉叔匡周豈頒上公之典燕藩懿親裁蒙衮舄之榮梁國戚屬方忝旌旗之貴而臣包括庶揆揔納儀形蓋出近古非三代之逺體也今復乃踰九命爰超五等域中之稱麗天作則探情顧抱豈所允安者哉伏願陛下一檢丹崖遂臣慊心無使怵迫深貽庇矣蕭相國拜齊王表臣無佐夏匡殷之功威晉服楚之績業不題於宗噐聲靡記於彞典而超居上禮邈乗峻爵靜念隆替焦原非譬中謝臣以爲衆官咸事帝謨所以式序群后剋讓王猷所以載穆况臣訪德語勤未洎伊稷之能藉靈懷寵以濫周邵之秩故駐䰟仰請瀝意歸聞理竭素牒事罄丹史具徽太微備簡玉繩而才輶志淺隔景絶炤朱輪之使日月亟䊸金鑾之尊旦夕將拂廵情覽識豈伊寧處今便肅典内軒恭服外屏大夫有命古或無違王假有廟今臣爲叨三省空懦震據于心齊王謝冕旒諸法物表臣王言以軒冕雲蹕旣非常之飾宫懸玉戚乃配天之禮故呈襟効慮必期蠲亮重𬒳還旨芳訊愈越鏡伏殊私情影逺震中謝昔大啓營丘未備樹羽之賞先宅曲阜始兼龍旂之貴况道狹慶隆身薄噐尊粉璽爭輝璪火鏡耀夫太常圖列星之采華蓋觀古人之情所以聳絶百縣崇隔萬㝢鳳閣因此而神瓊都由兹而麗故愧功慙德違儀避誠不遥孚理無夐逹遂貽嚴誥爰斷辭表驚慄遲廻祈鑒何地便當肅對王休敬昭異寵佩服盛文以慨以懼齊王讓禪表逺規唐虞永揖之典近謩漢魏高樹之禮旣覽金水昬明之數又協雲電隆替之徴激風太上扇采至公聞命驚爽心靈殞越中謝臣聞天地草昧而樹之君所以平對二儀顯臨萬國膺符受曆惣明司幽軒轅陟祚首出庶物顓頊登庸作爲民紀雖五德迭興十代繼運非賢非睿莫預斯位若乃與能之交禪錫之會豈伊虚薄所可尊擬昔傅巖佐商秩終上公磻溪翼周名極列伯臣才非若人功愧逺聖獄訟不徃謳歌寧歸河乏馬圖之寳天無乗龍之錫元首股肱誓不可異而曠棄之軌忽臻於兹慙慨憂灼罔識其際伏願陛下貴舜禹之心臣守巢由之節則道燿日月澤浸飛泳聲振開闢仁動今古四三王而六五帝不亦休哉遣大使廵詔門下昔明王馭丗廵嶽采政睿后司朝觀俗調化故生無鬱滯物獲脩通釐風拯患於兹爲急朕以輶薄昧于大道因璿璣之曆遵三德之運𬗟鑒前哲寤寐永歎思所以闢訪治蠹詢求民瘼才寡務殷若無津漈故以情深危薄心疚夙夜矣可普遣大使分行四方推賢薦能問疾舉滯若其采野不闢犴訟有虧妨氓利害擾黷政經者具以奏聞如其讜言嘉話真士智才亦依名騰上隨事均量務取厥中朕將親覽以弘逺化賜赦交州詔門下交部昔值時詖負海不朝因迷遂往歸欵莫由今創制萬㝢烟煴造物原形四裔澤浹中畿慜彼邊氓未均王化宣弘逺仁蕩以更始可曲赦彼州統内咸同曠㤗李叔獻一人即撫南土其股肱文武詳材選推并遣大使宣揚朝㫖斷募士詔門下設募取將懸賞購士蓋出權宜非曰經制頃者民罹氛藹丗襲艱阻因時流故浸以成俗斯風蕩而未返且滋長逋逸開罪山湖遂乃鯨刑不辱草竊無咎平政察洽萌合甄革自今已後可悉斷衆募封江冠軍等詔門下締基緯業序功攸急𨳩曆闡祚酬庸爲先故以式藹曩書載炳前軌文仲假等或成亮艱危効彰屯詖皆績幹兩宣勒國兼立宜各分珪社以酬厥勞謐大赦詔門下朕思弘風敎而刑圄猶積永言前烈兢歎載懷今履端告始郡后執䞇治洽樂交華夷同㤗雖和慙擊石采愧卿雲然景業𥘉基義深恒典慶動玄靈歡溢都縣憫彼幽黔猶隔兹澤思我兆民共熈至化北伐詔門下朕統曆馭政志包函夏庶惣文軌無思不服而逖焉狡虜乆爲邊虞及宋末不庭授策乖律北州外淪威風内毀鑒彼隆替慨歎盈懷冕旒濟河翦彼凶狄咸秩中岳望祀汾隂則聲敎鬯矣猶以經綸惟始恩化甫洽勞民擾衆爲政所重故方輟六師按經九伐今淮泗告驚羽書馳聞醜羯妖燼送死北垂徴天人之數撫自來之會無勞逺兵剿撲爲易蓋因兹大號蕩其巢藪可遣使某官組甲十萬鐡騎千馬斜趣潁洛衝其要津某官某虎旅八萬舳舮數千㳂淮長驅稜威青汴某官某舟師五萬直出淮淝某官控江右之銳駱驛旣進某官某率羽林勁男爲水陸形援某官某甲等並率義勇之衆㸦盡椅角之機戎車戒路事冝惣一使持節都督南徐兖二州諸軍事後軍將軍南徐州刺史長沙王晃出次江都爲衆軍節度驍雄竟奮火烈風掃剋定中原肅清河洛便可内外纂嚴以時備辨王僕射爲左僕射詔門下端貳樞祕寔惟國禎緝典宣機所寄時彦尚書右僕射領吏部尚書南昌縣開國公儉噐懷明亮風情峻逺業積珪璋才兼經緯况乃節亮帷幄譽敷端揆升授之宜蓋允具瞻可左僕射王撫軍爲安東吳興詔門下震澤殷奥撫馭須才都官尚書撫軍潯陽郡開國公敬則志幹貞烈秉情開敏忠勤之至形乎出内必能綏懷大邦尅隆美政曲赦丹陽等四郡詔門下朕興言民瘼昧旦求政所以庶存簡惠緝兹治道而玉燭未調祥風尚鬱京輔及二吳昔歲水災秋登旣罕今兹厲疾罹患者多納隍之歎爲矜良深可曲赦楊州所統丹陽吳興南徐州所統義興等四郡其遭水左劇之縣自今年以前三調未充而虚例巳畢官長局吏應共備賞者雖即事爲愆情在可亮外詳所際以弘優澤王僕射領太子詹事詔門下管司東朝歷代所重自非國華莫允斯任侍中尚書左僕射南昌縣開國公儉鑒識清贍理懷秀澈績亮朝端譽敷僉議賛業攸光物聽斯緝冝惣二官以穆彛序何詹事爲吏部尚書詔門下官人之職實難其選所以弼諧彛品謨明庻績今思治惟急彌不可曠侍中太子詹事戢業履脩平體識詳隱自升官闥美譽咸聞必能無懈于位爕兹流序王侍中爲南蠻校尉詔門下荆楚殷曠任重寄深毗左之選非良勿授侍中領祕書監驍騎將軍奐秉心貞元志局𨳩亮績譽之美在公屢彰必能賛政南紀播惠西夏王光祿爲征南湘州詔門下衡岳名區荆湘奥壤自頃凋弊綏撫須賢侍中光祿大夫丹陽尹僧文德履淹䆳識局詳正冲素之朝望攸歸歷職之庸載懷僉聽往任沅湘餘惠在民今宜重敷善政申此㦤績柳僕射爲南兖州詔門下河兖衝要維扞中畿司牧之任宜詳其授後將軍領軍新除尚書左僕射溳陽郡國公丗隆業體淹濟思情通敏功書王府積彰累任必能宣弘恩政威懷萬里雖哀疾毀頓而禮有權奪王僕射加兵詔門下散騎常侍尚書左僕射太子詹事南昌縣𨳩國公儉忠欵昭著任寄隆深旣光朝猷允屬民聽冝增威飾以崇望實可加兵二百立學詔門下夫膠庠之典彞倫攸先所以昭振才端啓發性緒弘丗字氓納之軌儀是故五禮之迹可傅六樂之容不泯朕自膺曆受圖志闡經訓且有群寮奏議橫集以戎車屢警文敎未敷思樂辟雍永言多慨今關燧無虞時和歲稔逺邇同風華夷慕義便可式遵前凖脩建敎學精選儒官廣延國胄王鎭軍爲中書令右光祿詔門下綸言要密歷選爲難優秩崇顯允在舊德使持節都督江州豫州之新蔡晉熈二郡諸軍事鎭南將軍江州刺史延之業履冲約秉情閑素譽彰頻試績著累朝自居南服徽庸剋舉冝升寵章管兼樞祕張令爲太常領國子祭酒詔門下庠議旣敷縉紳攸屬師氏之任冝歸儒素散騎常侍中書令驍騎將軍楊州大中正緒噐識清簡理懷恬約譽洽朝聞聲緝民聽必能闡揚玄宗式範胄子兼掌宗伯望實惟冝蕭冠軍進號征虜詔門下維翰之重實資名品使持節都督郢州司州之義陽諸軍事冠軍將軍郢州刺史南昌縣𨳩國侯鸞體局弘濟噐操端敏自蒞任夏首美政殷流必能聿宣國化以庇人瘼冝崇顯秩允兹聲望禇侍中爲征比長史詔門下蕃佐須才非良莫寄侍中領歩兵校尉炫識業清悟思懷掩暢出内之譽日聞其美冝弼諧親屏以申茂績梁江文通集卷第九
