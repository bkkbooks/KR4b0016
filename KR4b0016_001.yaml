body:
  text: 賦恨賦試望平原蔓草縈骨拱木斂魂人生到此天道寧論於是僕本恨人心驚不已直念古者伏恨而死假如秦帝按劒諸侯西馳削平天下同文共規華山為城紫淵為池雄圖既溢武力未畢方架黿鼉以為梁巡海右以送日一旦魂斷宫車晚出若乃趙王既虜遷於房陵薄暮心動昧旦神興别艷姬與美女喪金輿及玉乘置酒欲飲悲來填膺千秋萬歲為恨難勝至如李君降北名辱身冤拔劒擊柱弔影慙魂情往上郡心存鴈門烈帛繫書誓還漢恩朝露溘至握手何言若夫明妃去時仰天太息紫臺稍逺關山無極搖風忽起白日西匿隴鴈少飛岱雲寡色望君王兮何期終蕪絶兮異域至乃敬通見抵罷歸田里閉關却掃塞門不仕左對孺人顧弄稚子脫略公卿跌宕文史齎志沒地長懷無已及夫中散下獄神氣激揚濁醪夕引素琴晨張秋日蕭索浮雲無光鬱青霞之竒意入修夜之不陽或有孤臣危涕孽子墜心遷客海上流戍隴隂此人但聞悲風䫻起泣下霑襟亦復含酸茹歎銷落湮沉若乃騎疊迹車屯軌黃塵匝地歌吹四起無不煙斷火絶閉骨泉裏已矣哉春草暮兮秋風驚秋風罷兮春草生綺羅畢兮池館盡琴瑟滅兮丘壟平自古皆有死莫不飲恨而吞聲去故鄉賦日色暮兮隱吳山之丘墟北風析兮絳花落流水散兮翠􅶼踈愛桂枝而不見悵浮雲而離居乃凌大壑越滄淵沄沄積􅤆水橫斷山窮隂匝海平蕪帶天於是泣故關之已盡傷故國之無際出汀州而解冠入溆浦而捐視協韻聽蒹葭之蕭瑟知霜露之流滯對江皋而自憂弔海濵而傷歲撫尺書而無恱倚樽酒而不持去室宇而逺客遵蘆葦以為期情嬋娟而未罷愁爛漫而方滋切趙瑟以橫涕吟燕笳而坐悲少歌曰芳洲之草行欲暮桂水之波不可渡絶丗獨立兮報君子之一顧是時霜翦蕙兮風摧芷平原晚兮黃雲起寧歸骨於松柏不買名於城市若濟河無梁兮沉此心於千里重曰江南之杜蘅兮色以陳願使黃鵠兮報佳人橫羽觴而淹望撫玉琴兮何親瞻層山而蔽日流餘涕以沾巾恐髙臺之易晏與螻蟻而為塵倡婦自悲賦并序漢有其録而亡其文泣蕙草之飄落憐佳人之埋暮乃為辭焉粵自趙東來舞漢宫瑶序金陳桂枝嬌風素壁翠樓明月徒秋歌聲忽散傷人復愁君王更衣露色未稀侍青鑾以雲聳夾丹輦以霞飛願南山之無隙指壽陵以同歸俄而緑衣坐奪白華卧進屑骨不憐抵金誰吝九重已關髙門自蕪青苔積兮銀閣澀網羅生兮玉梯虛度九冬而廓處遙十秋以分居傷營魂之已盡畏松柏之無餘歸故鄉之末光實夫君之晚滋去柏梁以淹袂出桂苑而斂眉視朱殿以再暮撫嬪華而一疑於是怨帝關之遂岨悵平原之何極霜繞衣而葭冷風飄輪而景􅉴御思趙而不顧馬懷燕而未息泣逺山之異峯望浮雲之雜色若使明鏡前兮碎孤鴈之錦翼乃為詩曰曲臺歌未徒黃壤哭已親玉玦歸無色羅衣會成塵驕才雄力君何怨徒念薄命之苦辛哀千里賦蕭蕭江隂兮荆山之岑北繞琅琊碣石南馳九疑桂林山則異嶺竒峯橫嶼帶江雜樹億尺紅霞萬重水則逺天相逼浮雲共色沄沄無底溶溶不測其中險如孟門豁若長河參差巨石縱橫龜鼉若乃夏后未鑿秦皇未闢㟻岩生岸迆邐成迹馳湍走浪漂沙擊石伊孟冬之初立出首夏以歸來自出國而辭友永懷慕而抱哀魂終朝以三奪心一夜而九摧徒望悲其何及銘此恨於黃埃於時鴻鴈既鳴秋光亦窮水黯黯兮蓮葉動山蒼蒼兮樹色紅思雲車兮沅北望霓裳兮澧東惜重華之已沒念芳草之坐空既而悄愴成憂憫默自憐信規行之未曠知矩步之已難雖河北之爽塏猶橘柚之不遷及年歲之未晏願匡坐於霸山青苔賦并序余鑿山楹為室有苔焉意之所之故為是作云嗟青苔之依依兮無色類而可方必居間而就寂以幽意之深傷故其處石則松栝交隂泉雨長注絶澗俯視崩壁仰顧悲凹嶮兮唯流水而馳騖遂能﨑屈上生班駮下布異人貴其貞精道士恱其回趣咀松屑以高想捧丹經而永慕若其在水則鏡帶湖沼錦匝池林春塘秀色陽烏好隂青郊未謝兮白日照路貫千里兮緑草深乃生水而搖蕩遂出波而沉淫假青條兮捴翠借黃花兮舒金遊梁之客徒馬疲而不能去兔園之女雖蠶飢而不自禁至於修臺廣廡幽閣間楹流黃以織琴瑟且鳴户牖祕兮不可見履𬒮動兮覺人聲乃蕪階翠地繞壁點墻春禽忠兮蘭莖紫秋蟲吟兮蕙實黃晝遙遙而不暮夜永永以空長零露下兮在梧楸有美一人兮欷以傷若乃崩隍十仞毀冢萬年當其志力雄俊才圖驕堅錦衣被地鞍馬耀天淇上相送江南採蓮妖童出鄭美女生燕而頓死艷氣於一旦埋玉玦於窮泉寂兮如何苔積網羅視青蘪之杳杳痛百代兮恨多故其所詣必感所感必哀哀以情起感以怨來魂慮斷絶精念徘徊者也彼木蘭與豫章既中繩而獲夭及薜荔與蘪蕪又懷芬而見表至哉青苔之無用吾孰知其多少石劫賦并序海人有食石劫一名紫􅡖蚌蛤類也春而發華有足異者戲書為短賦我海若之小臣具品色於滄溟既爐天而銅物亦吸化而染靈比文豹而無恤方珠蛤而自寧兾湖濤之蔽迹願洲渚以淪形故其所巡左委羽右窮髮日照水而東升山出波而隱沒光避伏而不耀智埋冥而難發何弱命之不禁遂永至於夭閼已矣哉請去海人之仄陋充公子之嘉客儻委身於玉盤從風雨而可惜水上神女賦江上丈人遊宦荆吳首衛國望燕途歷秦關出宋都遍覽下蔡之女具恱淇上之妹未有粉白黛黑鬼神之所無也乃造南中渡炎洲徑玉澗越金流路逶迤而無軌野忽漭而鮮儔山反覆而參錯氷澆灌而縈薄石五采而橫峯雲千色而承蕚日炯炯而舒光雨屑屑而稍落紫莖繞徑始參差紅荷緣水才灼爍忽而精飛視亂意走心移綺靡菱蓋悵望黃枝一麗女兮碧渚之崖曖曖也非雲非霧如煙如霞諸光諸色雜卉雜華的的也象圭象璧若虛若實綾錦共文瑶貝合質逐乃紅唇寫朱真眉學月美目艷起秀色爛發窈窕暫見偃蹇還沒冶異絶俗竒麗不常青娥羞艷素女慙光笑李后於漢主耻西施於越王神翻覆而愈恱志離合而感傷女遂俯整玉軼仰肅金鑣或採丹葉或拾翠條守明璣而為誓解琅玕而相要情乍合而還散色半親而復嬌聳軿車於水際亭雲霓於山椒奄人祇之仿像共光氣而寂寥於時也綵霞繞繞卿雲縵縵石瓊文而翕赩山龍鱗而照爛苔緑根而攢集草紅葩而舒散日炫晃以朧光樹葳㽔而蔥粲無西海之浩蕩見若木之千尋非丹山之赫曦聞琴瑟之空音理洞徹於俗聽物驚怪於丗心恨精影之不滯悼光晷之難惜閲有無於俄頃驗變化於咫尺視空同而失貌察倐忽而亡迹野田田而虛翠水湛湛而空碧乃唱桂棹凌衝波背橘浦向椒阿硉矹木石洪漭蛟鼉顧御僕而情饒巡左右而怨多弔石渚而一欷悵沙洲而少歌茍懸天兮有命永離決兮若何退以為妙聲無形竒色非質麗於嬪嬙精於琴瑟尋漢女而空佩觀清角而無匹嬪楊不足聞知夔牙焉能委悉何如明月之忌玄雲秋露之慙白日愁知形有之留滯非英靈之所要術也泣賦秋日之光流兮以傷霧離披而殺草風清泠而繞堂視左右而不臑具衣冠而自涼默而登高谷坐景山倚桐柏對石泉直視百里處處秋煙閴寂以思情緒留連江之永矣蓮欲紅南有喬木葉以窮心蒙蒙兮恍惚魄漫漫兮西東詠河兖之故俗眷徐楊之遺風眷徐楊兮阻關梁詠河兖兮路未央道尺折而寸斷魂十逝而九傷欷潺湲兮沫袖泣嗚唈兮染裳若夫景公齊山荆卿燕市孟嘗聞琴馬遷廢史少卿悼躬夷甫傷子皆泣緒如絲詎能仰視鏡終古而若斯况余輩情之所使哉待罪江南思北歸賦伊小人之簿伎奉君子而輸力接河漢之雄才攬日月之英色絶雲氣而厲響負青天而撫翼德𬒳命而不渝恩潤身而無極何規矩之守任信愚陋而不肖愧金碧之琳琅慙丹艧之照曜樊天綱而自離徒夜分而誰弔遭大道之隆盛雖草木而勿履誤銜造於逺國出顛沛之願始去三輔之臺殿辭五都之城市惟江南兮丘墟遙萬里兮長蕪帶封狐兮上景連雄虺兮蒼梧當青春而離散方仲冬而遂徂寒蒹葭於余馬傷霧露於農夫跨金峯與翠鑾涉桂水與碧湍雲清泠而多緒風蕭條而無端猿之吟兮日光逈狖之啼兮月色寒究煙霞之繚繞具林石之巑岏於是臨虹霓以築室鑿山楹以為柱上皓皓以臨月下淫淫而愁雨奔水潦於逺谷汩木石於深嶼鷹隼戰而櫓巢黿鼉布而穴處若季冬之嚴月風搖木而騷屑玄雲合而為凍黃煙起而成雪虎踡局而斂步蛟夔尼而失穴至江籬兮始秀或杜衡兮𥘉滋桂含香兮作葉藕生蓮兮吐絲俯金波兮百丈見碧沙兮來往霧葐蒀兮半出雲雜錯兮飛上石照爛兮各色峯近逺兮異象及回風之搖蕙天潭潭而下露木蕭梢而可哀草林離而欲暮夜燈光之寥逈歷隱憂而不去心湯湯而誰告魄寂寂而何語情枯稿而不反神翻覆而亡據夫以雄才不丗之主猶儲精於沛鄉竒略獨出之君尚婉戀於樊陽潘去洛而掩涕陸出吳而增傷况北州之賤士為炎土之流人共魍魎而相偶與蠨蛸而為鄰秋露下兮點劒舄青苔生兮綴衣巾步庭廡兮多蒿棘顧左右兮絶親賔憂而填骨思兮亂神願歸靈於上國雖坎軻而不惜身别賦黯然銷魂者唯别而已矣况秦吳兮絶國復燕宋兮千里或春苔兮始生乍秋風兮暫起是以行子腸斷百感悽惻風蕭蕭而異響雲漫漫而竒色舟凝滯於水濵車逶迤於山側棹容與而詎前馬寒鳴而不息掩金觴而誰御橫玉筯而沾軾居人愁卧脫若有亡日下壁而沉彩月上軒而飛光見紅蘭之受露望青楸之罹霜巡層楹而空掩撫錦幕以虛涼知離夢之躑躅意別魂之飛楊故别雖一緒事乃萬族至若龍馬銀鞍朱軒繡軸悵飲東都送客金谷琴羽張兮簫鼓陳燕趙歌兮傷美人珠與玉兮艷暮秋羅與綺兮嬌上春驚駟馬之素沫聳淵魚之赤鱗造擕手而銜涕各寂寞而傷神乃有劒客慙恩少年報士韓國趙厠吳宫燕市割慈忍愛離邦去里瀝泣共訣刎血相視驅征馬而不觀見行塵之時起方銜感於一劒非買價於泉裏金石震而色變骨肉悲而心死或乃邊郡未和負羽從軍遼水無極鴈山慘雲閨中風暖陌上草薰日出天而耀景露下地而騰文鏡朱塵之照爛襲青氣之煙煴攀桃李兮不忍別送愛子兮沾羅裙至如一赴絶國詎相見期視喬木兮故里訣北梁兮永辭顧左右兮魄動視親賔兮淚滋可班荆兮增恨唯樽酒兮敘悲值秋鴈兮飛日當白露兮下時怨復怨兮逺山曲去復去兮長河湄又若君居淄右妾家河陽同瓊珮之晨照共金爐之夕香君結綬兮千里惜瑶草之徒芳慙幽宫之琴瑟晦高臺之流黃春閨閟此青苔色秋帳含兹明月光夏簟青兮晝不暮冬缸凝兮夜何長織錦曲兮泣已盡回文詩兮影獨傷儻有華隂上士服食還仙術將妙而猶學道巳寂而未傳守丹竈而不顧錬金鼎而方堅駕鶴上漢驂鸞騰天暫遊萬里少別千年惟丗間兮重別謝主人兮依然下有芍藥之詩佳人之歌桑中衛女上宫陳娥春草碧色春水渌波送君南浦傷如之何乃至秋露如珠秋月如圭明月白露兮隂景往來與子之別思心徘徊是以別方不定別理千名有別必怨有怨必盈使人意奪神駭心折骨驚雖淵雲之墨妙嚴樂之筆精金閨之諸彥蘭臺之群英賦有凌雲之稱辨有雕龍之聲詎能摹暫離之狀寫永訣之情者乎蓮華賦并序余有蓮華一池愛之如金宇宙之麗難息絶氣聊書竹素儻不滅焉撿水陸之具品閲山海之異名珍爾秀之不定乃天地之精英殖東國之流詠出西極而擅名方翠羽而結葉比碧石而為莖蘂金光而絶色藕冰拆而玉清載紅蓮以吐秀披絳華以舒英故香氛感俗淑氣參靈躑躅人丗茵蒀祗冥青桂羞烈沉水慙馨於是生乎澤陂出乎江隂見綵霞之夕照覿雕雲之晝臨既翕赩於洲漲亦映曖於川潯奪夜月及熒光掩朝日與赩火出金沙而延曜𬒳渌波而覃拖冠百草而絶群出異類之衆夥故仙聖傳圖英隱流記一為道沴二為丗瑞發靑蓮於王宮驗竒花於陸地若其江淡澤芬則照電爍日池光沼緑則明璧洞室矅長洲而瓊文映青崖而火質或慿天淵之清峭或殖疏圃之蒙密故河北棹歌之姝江南採菱之女春水厲兮楫潺湲秋風駃兮舟容與著縹芰兮出波攬緗蓮兮映渚迎佳人兮北燕送上客兮南楚知荷華之將晏惜玉手之空佇乃為謡曰秋鴈度兮芳草殘琴柱急兮江上寒願一見兮道我意千里逺兮長路難若其華實各名根葉異辭既號芙渠亦曰澤芝麗詠楚賦艷歌陳詩非獨瑞草爰兼上藥味靈丹沙氣驗青㬦乃可棄劒海岫龍舉雲蕚畫臺殿兮霞蔚圖縑縞兮炳爍永含靈於洲渚長不絶兮川壑丹沙可學賦并序咸曰金不可鑄僕不信也試為此辭精思云爾惟雲場之少折乃人徑之多憂雖瑶笙及金瑟雜翠帳與丹幬吞悲欣於得失銜哀樂於春秋煥如星絶黯如火滅星絶難光火滅可傷故從師而問道兾幽路之或晹測神宗之無緩踐雲根之不賖信名山及石室驗青傾與丹沙撝五難之重滯攬九仙之輕華故抱魄寂處凝神空居泯邈深晝窈鬱重虛覘炫耀而可見聽沉寥而有餘於是乘河漢之光氣騎烈星之綵色輟隂陽於形有傅變化於心識浮恍惚而無涯泛靈怪而未極架日月之精照騫蛟龍之毛翼遂乃氣穆肅而神奔骨窈窈而鬼怪綴葳蕤而成冠點雜錯而為珮出湎泣而遐鶩貫𪷟鴻而上厲鳳之來兮蔽日鸞之集兮為群左昆吾之炎景右崦嵫之卿雲爛七采之照耀漫五色之煴煙非丗俗之質見焉鬼神之嘗聞既而曖碧臺之錯落耀金宫之玲瓏幻蓮華於繡闥化蒲桃於錦屏赩丹光而電烻颯翠氛而杳冥軒僘惘於冤虹階侘際於奔鯨惑龍宫之殿稱迷忉利之宫名故靈偃蹇兮姣服女嬋姢兮可觀秀青色之泯靡熳美目之波瀾襞日月之纂組襲星宿之羅紈百味酒兮靈之集河供鯉兮靈之安却文甫之玉質笑陳王之妙顔所以樂精玄於太一妙宫徴於清都簫含聲而逺近琴吐音而有無奏神鼓於玉𬒮舞靈衣於金𥚑韻躑躅而易變律參差而難圖非南風之能擬詎濮水之可摹於是流漾不一遨曹無邊娥眉既散鍾鼓都捐乘綵霞於西海駟行雨於丹淵山差池而鏡壑水清明而抱天山含玉以永歲水藏圭以窮年擬若木以寫意拾瑶草而悠然遂乃凝虛飲一守仙閉方智寂術盡魄兀心亡白生不能關其説惠子無以挫其芒源其耻市朝之失道疾讒嬖之不祥却文綵之媱冶去利劒之鏗鎗懅生死於半氣惜百年於一光故以鑄金為器丹沙為漿慙吝既盡妖怨當忘吾師以為可學而公子謂之不良歟靈丘竹賦登﨑嶇之碧巘入朱宫之玲瓏臨曲江之回蕩望南山之蔥青鬱奉華之石岸赩夏彩於沙汀逺亘紫林祕野近匝玉苑禁垌於是緑筠繞岫翠篁綿嶺參差黛色陸離紺影上謐謐而留間下微微而停靖蒙朱霞之丹氣曖白日之素景故非英非蘂非香非馥而珍跨仙草寶踰靈木夾池水而檀欒繞園塘而橚植既間霜而無凋亦中暑而增肅每冠名於華戎將擅竒於水陸况有朝雲之館行雨之宫窗崢嶸而緑色戶踟蹰而臨空綺疏蔽而停日朱簾開而留風𬒳􅌲簵之窈蔚結篠蕩之溟𪷟或産鳷鵲之右或居寒露之東此皆金輿之所出入瑶輦之所周通梁江文通文集卷第一江文通文集校補烏程蔣氏密韻樓藏明翻宋書棚本江文通集中有校補蓋馮己蒼依元人鈔本手校而葉石君過録者也明刻亦源於宋豈明人校刻不免竄改致失其真歟今移録校語附於卷後江集當以此為致佳之本矣庚申六月無錫孫育修記卷一倡婦思悲賦露色未晞稀哀千里賦嶄㟻岩生岸靑苔賦春禽思忠兮水上神女賦日炯炯而光舒舒光待罪江南思北歸賦寒蕪蒹葭于余馬涉桂水與急碧湍鷹隼戰而橧櫓巢蛟夔尼而共失穴共魍魎而相偶偶作憂而填谷骨丹砂可學賦騎烈列星之綵色骨窈窕窈而見怪却交文甫之玉質卷二赤虹賦騎傅稟傳説之一星金燈草賦紫縈榮晨光橫吹賦赤赮紫駮至于貝胄具曹象弭之威傷友人賦庶同嵇尚駕從篤徒之哀握隨隋珠而比麗卜十圖兮照籍信朝口之徒􅉴昊攬覽秋實於西苑貴楊蕤􅺙於後烈麗色賦露霧辭楚而容裔莫不輟鏡徙徒倚春蠶度繭網不覿觀其容江上之山賦巖岍兮穴空鑿亦緯翻繣而已遷雖不敏而無操懆空靑賦𥒪確崔堅英卷三就謝主簿宿北風縹漂夜色寧濕阻岨雲梁燈夜和殷長史客子依仿永夜感春冰遙和謝中書流瀾爛新光生暮意歌上春眷遊黃蘖山殘屼㞦十代木還故國請學碧山草靈萆傷內弟劉常侍蘭杜社信嘉名從蕭驃騎新亭帝壘卷四惜晚春應劉祕書玉瀝歷乃共酌應劉豫章別裂分分郊外望秋答殷博士雲稍精無永滯冬盡難離和丘長史山川吐幽氣當春四韻同左丞刻左上僅空一字淡煙漾璇景班媫妤好詠扇王侍中懷德崤函蕩丘墟阮步兵詠懷飄飄可終年極張黃門苦雨有淹弇興春節盧侍郎感交勉􅊵力在無逸許徵君自序苕苕寄意勝勝景謝臨川遊山山嶠矯備盈缺幸遊見建德鄉謝法曹贈別子襟矜怨勿往凝睇涕在何辰王徵君養疾微刻本無微字鮑參軍戎行執軌羈輕去鄉悼室人十首湘醽徒有約酌漱漱䔩蓛淸衾單卷五報袁叔明書平原彯影色與交友論隱書而飄彯然十載此空格在輒被語句下刻空三格心頑質堅頑校作性斂眉骨折奏記詣南徐州新安王長匱芹斤藻之德到主簿日事詣右軍建平王從後軍車於河楚竟不能曜丹臒雘被黜為吳興令辭箋詣建平王山川間聞之詣建平王上書隱於簾篇肆之間昔上將之恥絳降侯到功曹參軍箋詣驃騎竟陵王既乏之修短之術馳淄澠繩之幣身蒙靑雘㬦拜正員外郎表由學末未徒奉春役丹殿卷六始安王拜征虜將軍丹陽平章爽泗元鈔空四格無此二字始安王拜征虜將軍南兗州刺史章職右南刻脫建平王拜右衛將軍荆州刺史章祇祑漳土士建平王謝賜石硯視等啓建平王慶改號啓既覯昭招晨建平王慶江皇后正位章翬翠珩照品黎玄滲湊仁建平王讓鎮南徐州刺史啓頻瀉四析折卷七勑為朝賢答劉休範書道鬱刻本脫終尚書符喑嗚則别左右激電投救命軍門皎激然無二蕭領軍讓司空並敦勸啓蕭領軍拜侍中刺史章此二篇馮氏云元鈔本失落未校蕭驃騎上頓表親駕悚悚蕭驃騎築新亭壘埋枯骸教並為收改蕭驃騎讓太尉增封第三表未嘗不麗選刻本脫台吳鄧之盛功中原源久蕪卷八蕭太尉上便宜表管君晏之制書約性撝偽操思裁奢奓忲太讓太傅揚州牧表祗畏險驗盛刻本脫凝煙露之潤蕭重讓揚州表乃假翼於皇極管庫之寮家寂寞尚據晦撓橈臣實空懦儒蕭被侍中敦勸表巡今令逾疑視聽敬其炎貴蕭被尚書敦勸重讓表燈燼罕空舉蕭讓劍履殊禮表且今令所慮受蕭拜太尉揚州牧表而神居寂阻寧班衮司之上臣績不照刻脫蕭大尉子姪為領軍江州兗州豫州淮南黃門謝啓臣頻結崇寵籠蕭太傅謝追贈父祖表星􅉴日不追澤演慶丹刻慶字下有世字謙刻本脫請靡諒蕭太傅東耕教産殷刻作絃縣蕭太傅辭輿馬駕親幸表刻作紫靑變禮蕭讓前部羽葆鼓吹表常䘖刻作耀謝開府辟召表臣府自辟刻作僚賢刻作賓資山東之英既乖刻作覆業蕭上銅鍾芝草衆瑞表炳柄據有徵刻本脫東太守臣朏腦解所統武進令臣刻作紀法宗卷九蕭讓太傅相國齊公十郡九錫表秬鬯彤弓第二表恃險與輿馬具曰日遺氓被百僚敦勸受表諸侯方放命伊摯叔旦且之爵呂牙申伯明之賞齊王謝冕旒諸法物表光先宅曲阜粉枌璽爭輝遣大使巡詔若無津際漈斷募士詔且旦滋長逋逸封江冠軍等詔皆績繢幹兩宣謐抄無此字北伐詔無勞遂遠兵駱驛繼既進肅淸河洛路曲赦丹陽等四郡詔昧旦且求政王光祿為征南湘州詔沖素之刻脫褚侍中為征北長史詔思懷淹掩暢卷十齊太祖高皇帝誄叫怨然靑墀街號耀盛國圖方匿匱淫祀若旍瀉家提國襄衍文任卷文武陰圖食昴昂樊稚斫櫬彼皇維玄英最節宋故尚書左丞孫緬墓志文齊影儒口哲宋故安成王右常侍劉喬墓志文雲意霜拍美懋徒鐫蕭太傅東耕祝呪文山桃引露霧如電白雲蕭簫瑟玉池上秦泰女搆象臺流梵音兮至南案溟訪道經信若人兮先覺鏡論語憲媯禹而折法山中楚辭欷沿油川流帶石兮蔽日白魂兮歸來抄本魂字上空三格牲出入歌辭山中楚辭下祝詳史具禮備樂荐有牲在陳有鼓在懸騰燭象星奔水類電郊燎速駕馭彼乘駽以伺質明以佇神宴薦豆呈毛血歌辭時恭時祀有物有則伊我上聖實挹明德犧象交陳鬱尊四塞黍唯嘉穀酒唯玄默薦通蒼祗慶覃黎黑願靈之降祚家佑國奏宣列之樂歌辭殷崇配天界尊明祀瑞合汾陰慶同泰畤靑幕雲舒丹殿霞起二曜維新五精告始于以享之景福是履江文通集後序余先人避地蕭山因而老焉視蕭山不啻桑梓也所居之東一里許曰江寺蓋梁左衛將軍文通別業其子昭玄捨為浮屠前有夢筆橋乃後人想像其陳迹為之文不足徵殆千年矣頃歲余領國子學閲崇文閣舊書得江文通集欣然曰夢筆之驗其在是乎録以示僧有成輩咸願刻之以傳余按文通濟陽考城人今考城已不知有文通矣唯蕭山故居獨存毋乃文通為東海郡丞或吳興令時往來所寓耶逸事寥寥不可考矣然名藍上人猶能追慕前修紀録製作為可尚已自今潘水之涘豈無懷錦韜筆褒然文鳴者出焉則文通過化餘澤久而益溥亦有成諸同袍樂善之著也工告訖功謹志于左至正四年良月初吉中大夫蘄州路總管兼管內勸農事趙翁跋戊子秋仲之晦初得元人抄本至季秋之十二日始校完元本多樂府三章此本不知何以刪去而元本所缺此本又以意填增文理荒悖可笑今盡之凡者元本所無也旁注者元本如而文可兩通者也孱守老人旁注字今未過録銅劍讚一卷梁江淹撰永明初始造舊宮鑿東北之地皆平岡迤隴尤多古冢墓有人得銅劍長尺五寸余既借看歎其古異客有謂余曰古時乃以銅為兵乎其可得而聞不余笑而應曰此證據甚多殆不俟言卿既欲知輒具言之余按山海經曰昆吾之山其上多赤銅郭璞注曰此山出金如火以之切玉如割泥也周穆王時西戎獻之尸子所為昆吾之劍也越絶書曰赤墐之山破而出錫若邪之溪涸而出銅歐冶鑄以為純鉤之劍又汲冡中得一銅劍長三尺五及今所記干將者亦皆非鐵明古者以銅錫為兵器也周書稱穆王時征犬戎得昆吾之劍火浣布長尺有咫又有鍊銅赤刀割玉如泥焉又左傳僖公十八年鄭伯始朝于楚楚賜之金既而悔之盟曰無以鑄兵故以鑄三種杜預注云楚金利故也古者以銅為兵故禹貢云荆揚貢金三品余以為古者語質而難解今者語文而又了獨詩云元龜象齒其實象牙也書曰厥包橘柚乃黃柑也金品上則黃中則赤下則黑黑金是鐵赤金是銅黃金是金黃金可為寶赤金可為兵黑金可為器韓子稱昔智伯繇之伐趙襄子初晉陽襄子金將盡問於張孟談孟談對曰吾聞董安于治晉陽也公室悉以銅為柱質君可發而用之於是發之有餘金矣謂此據蓋可知焉又昔夏后氏使九牧貢金鑄九鼎於荆山之下于昆吾氏之墟白若甘攙之地圖其山川奇怪以形於鼎使民知神姦不逢其害以定其祥鼎成三足而方不炊而自沸不舁而自藏不遷而自行九鼎既成定之國都桀有昏德鼎遷於商殷紂暴虐鼎遷於周每人主休明鼎雖小而重其姦回昏亂雖大而輕及周顯王三十二年姬德大衰乃淪入泗水秦始皇之初見於彭城二十七年始皇東遊大發徒出之而不能得焉後漢武帝賓禮百神于汾陰得大鼎時人以為九鼎其詳不可得而審也且荆軻刺秦王之日七首擊銅柱銅柱火出則古者非直以銅為七首亦以為殿柱也且始王之世長狄十二見於臨洮身長三丈足迹六尺於是始皇斂天下之兵鑄而象之故西京賦云高門有閌列坐金狄是也又造阿房之宮其門悉用鎡石鎡石吸鐵以防外兵之入焉以此推之明知春秋迄於戰國戰國至於秦時攻爭紛亂兵革互興銅既不充給故以鐵足之鑄銅既難求鐵甚易是故銅兵轉少鐵兵轉多年甚一年歲甚一歲漸染流遷遂成風俗所以鐵工比肩而銅工稍絶二漢之世逾見其微及漢建安二十四年魏文帝為太子時鑄三寶刀二七首天下百鍊之精利而悉是鑄鐵不能復鑄銅矣按張華博物志亦稱鑄銅之工不復可得唯蜀地羌中時有解者由此言之斯妙久絶余謂不復能鑄銅者正當不能使利如霜雪光似雲霞陸斬犀兜水斷蛟龍豈復不能鑄銅爐鋺燈耶然今太極殿前兩大銅鏡即周景王鑄也製作精巧獨絶晚世今之作必不及古猶今鏡不及古鏡今鐘不及古鐘矣昔余為吳興令鑿池又獲銅箭鏑數十枚時有人復於彼山中伐木得銅斧一口古銅鑄為兵豈為一據故備言其詳以發子之蒙矣古貴銅賤銅非獨此事按皇覽帝王冢墓記稱吳王闔閭冢銅槨三重汞池六尺玉鳧之流扁諸之劍三盤郢魚腸之劍在焉秦始皇冢亦以銅槨水銀為江河關東賊發之至銅槨而取銅深大不可多得因此穴塞漢陳思王冢時奢侈皆生葬取愛幸奴婢蓄穀為銅窗以通殉葬者氣息兼以水火守冢給呼召數十年乃不復聞聲矣晚世之葬無復此例然猶自大奢大富大盛或傾一國之財或竭一家之寶或爭為宏麗或競相高尚前漢奢於後漢魏時富於晉世中原既夷至於江左時天下凋喪制度日衰富貴之家猶或厚葬然論古論曩亦減損千萬倍矣世愈貧狹哀禮愈薄又往古之事棺皆不用釘悉用細腰其細腰之法長七寸廣三寸厚二寸五分狀如木稱兩頭大而中央小仍鑿棺際而安之因普漆其外一棺凡用細腰五十四枚大略如此亦可謂至巧矣其法既絶亦有銅釘銅釘之體皆如今柘釘形也銅釘既滑多被發掘自義熙以來乃以柘代銅爰及明器之屬亦多減省必不得已乃用烏牙焉相與皆用素棺不得施漆及自棺之外一無所設既由貧富之懸兼以避患之及耳故為此讚以明古今銅鐵之兵忍刃葬送之事焉乃成讚曰悠悠開闢或聖或賢蚩尤鑄銅為兵幾年天生五才實此為先既古既曩誰測誰傳紛綸百代事無不異况乃金鐵國之利器風胡專精歐冶妙思於昔則出於今則祕聞之釋經萬物淡薄在古必厚在今必惡徒侈徒異徒鏟徒削聊舉一概以明鴻略右銅劍讚一卷陳留靑雲寺伯宇記康熙二年仲春望後五日孫凱之示余校正本對録孫本係故友馮已蒼所藏從元抄本校者也其銅劍讚馮以意附之耳馮遭酷令所誅書籍盡散今見其書如見故人不勝悵歎云南陽葉石君記
